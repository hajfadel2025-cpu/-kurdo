<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المندوبين</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #9b59b6;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-danger{background:#e74c3c}
        .btn-sm{padding:5px 10px;font-size:12px}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-user-tie"></i> إدارة المندوبين</h2>
    
    <div class="form-card">
        <h3>➕ إضافة مندوب جديد</h3>
        <div class="form-grid">
            <input type="text" id="mandubName" placeholder="اسم المندوب *">
            <input type="text" id="mandubPhone" placeholder="رقم الهاتف">
            <input type="text" id="mandubRegion" placeholder="المنطقة">
            <input type="number" id="commissionRate" placeholder="نسبة العمولة %" step="0.5">
        </div>
        <button onclick="addMandub()" style="margin-top:15px;"><i class="fas fa-save"></i> إضافة مندوب</button>
    </div>
    
    <table>
        <thead><tr><th>المندوب</th><th>الهاتف</th><th>المنطقة</th><th>العمولة</th><th>إجراءات</th></tr></thead>
        <tbody id="mandubsList"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user => { if(!user) window.location.href="login.html"; else loadMandubs(); });
    
    async function loadMandubs() {
        const snapshot = await db.collection('users').where('accountType', '==', 'مندوب').get();
        let html = '';
        snapshot.forEach(doc => {
            const m = doc.data();
            html += `<tr><td><strong>${m.employeeName || m.name}</strong></td><td>${m.phone || '-'}</td><td>${m.region || '-'}</td><td>${m.commissionRate || 0}%</td><td><button class="btn-sm btn-danger" onclick="deleteMandub('${doc.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('mandubsList').innerHTML = html || '<tr><td colspan="5">لا يوجد مندوبين</td></tr>';
    }
    
    window.addMandub = async () => {
        const name = document.getElementById('mandubName').value.trim();
        if(!name) return alert('اسم المندوب مطلوب');
        await db.collection('users').add({
            employeeName: name, name, phone: document.getElementById('mandubPhone').value,
            region: document.getElementById('mandubRegion').value,
            commissionRate: parseFloat(document.getElementById('commissionRate').value) || 0,
            accountType: 'مندوب', createdAt: new Date()
        });
        alert('تمت الإضافة');
        document.getElementById('mandubName').value = '';
        document.getElementById('mandubPhone').value = '';
        document.getElementById('mandubRegion').value = '';
        document.getElementById('commissionRate').value = '';
        loadMandubs();
    };
    
    window.deleteMandub = async (id) => {
        if(confirm('حذف المندوب؟')) { await db.collection('users').doc(id).delete(); loadMandubs(); }
    };
</script>
</body>
</html>
