<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المندوبين - مكتب حاج فاضل</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; }
        h2 { color: #1e3c72; margin-bottom: 20px; border-right: 4px solid #3498db; padding-right: 15px; }
        .form-card { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-danger { background: #e74c3c; }
        .btn-sm { padding: 5px 10px; font-size: 12px; margin: 2px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
        .balance-positive { color: green; font-weight: bold; }
        .balance-negative { color: red; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>👥 إدارة المندوبين</h2>
    
    <div class="form-card">
        <div class="form-grid">
            <div class="form-group"><label>اسم المندوب</label><input type="text" id="name" placeholder="الاسم الكامل"></div>
            <div class="form-group"><label>رقم الهاتف</label><input type="text" id="phone" placeholder="رقم الهاتف"></div>
            <div class="form-group"><label>المنطقة</label><input type="text" id="region" placeholder="المنطقة"></div>
            <div class="form-group"><label>نسبة العمولة %</label><input type="number" id="commissionRate" value="0" step="0.5"></div>
            <div class="form-group"><button id="saveBtn">➕ إضافة مندوب</button><button id="cancelBtn" style="background:#95a5a6; display:none;">❌ إلغاء</button></div>
        </div>
    </div>
    
    <div style="overflow-x: auto;">
        <table>
            <thead><tr><th>الاسم</th><th>الهاتف</th><th>المنطقة</th><th>العمولة</th><th>المبيعات</th><th>العمولة المستحقة</th><th>المدفوع</th><th>الرصيد</th><th>الإجراءات</th></tr></thead>
            <tbody id="mandubsTable"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let editingId = null;
    
    auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; });
    
    // عرض المندوبين من Firestore
    db.collection('users').where('accountType', '==', 'مندوب').onSnapshot(snapshot => {
        const tbody = document.getElementById('mandubsTable');
        if (snapshot.empty) { tbody.innerHTML = '<tr><td colspan="9">لا يوجد مندوبين</td></tr>'; return; }
        
        let html = '';
        snapshot.forEach(doc => {
            const m = doc.data();
            const balance = (m.totalCommission || 0) - (m.totalPaid || 0);
            html += `<tr>
                <td>${m.employeeName || m.name || '-'}</td>
                <td>${m.phone || '-'}</td>
                <td>${m.region || '-'}</td>
                <td>${m.commissionRate || 0}%</td>
                <td>${(m.totalSales || 0).toFixed(2)}</td>
                <td>${(m.totalCommission || 0).toFixed(2)}</td>
                <td>${(m.totalPaid || 0).toFixed(2)}</td>
                <td class="${balance >= 0 ? 'balance-positive' : 'balance-negative'}">${balance.toFixed(2)}</td>
                <td>
                    <button class="btn-sm" onclick='editMandub("${doc.id}","${(m.employeeName || m.name || '').replace(/'/g, "\\'")}","${m.phone || ''}","${m.region || ''}",${m.commissionRate || 0})'>✏️</button>
                    <button class="btn-sm btn-danger" onclick='deleteMandub("${doc.id}")'>🗑️</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    });
    
    // حفظ مندوب
    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const region = document.getElementById('region').value.trim();
        const commissionRate = parseFloat(document.getElementById('commissionRate').value) || 0;
        
        if (!name) { alert('الرجاء إدخال اسم المندوب'); return; }
        
        const data = { employeeName: name, name, phone, region, accountType: 'مندوب', commissionRate, totalSales: 0, totalCommission: 0, totalPaid: 0, updatedAt: new Date() };
        
        try {
            if (editingId) { await db.collection('users').doc(editingId).update(data); alert('تم التحديث'); cancelEdit(); }
            else { await db.collection('users').add({ ...data, createdAt: new Date() }); alert('تمت الإضافة'); clearForm(); }
        } catch(e) { alert('خطأ: ' + e.message); }
    };
    
    window.editMandub = (id, name, phone, region, rate) => {
        editingId = id;
        document.getElementById('name').value = name;
        document.getElementById('phone').value = phone;
        document.getElementById('region').value = region;
        document.getElementById('commissionRate').value = rate;
        document.getElementById('saveBtn').innerHTML = '✏️ تحديث';
        document.getElementById('cancelBtn').style.display = 'inline-block';
    };
    
    window.deleteMandub = async (id) => {
        if (confirm('هل أنت متأكد؟')) { await db.collection('users').doc(id).delete(); alert('تم الحذف'); }
    };
    
    window.cancelEdit = () => { editingId = null; clearForm(); document.getElementById('saveBtn').innerHTML = '➕ إضافة مندوب'; document.getElementById('cancelBtn').style.display = 'none'; };
    
    function clearForm() { document.getElementById('name').value = ''; document.getElementById('phone').value = ''; document.getElementById('region').value = ''; document.getElementById('commissionRate').value = '0'; }
</script>
</body>
</html>
