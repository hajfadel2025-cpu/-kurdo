<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموردين - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #9b59b6;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-danger{background:#e74c3c}
        .btn-sm{padding:5px 10px;font-size:12px}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-truck"></i> إدارة الموردين</h2>
    
    <div class="form-card">
        <h3>➕ إضافة مورد جديد</h3>
        <div class="form-grid">
            <input type="text" id="supName" placeholder="اسم المورد *">
            <input type="text" id="supPhone" placeholder="رقم الهاتف">
            <input type="text" id="supAddress" placeholder="العنوان">
            <input type="text" id="supEmail" placeholder="البريد الإلكتروني">
        </div>
        <button onclick="addSupplier()" style="margin-top:15px;"><i class="fas fa-save"></i> إضافة مورد</button>
    </div>
    
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>المورد</th><th>الهاتف</th><th>العنوان</th><th>الرصيد</th><th>إجراءات</th></tr></thead>
            <tbody id="suppliersList"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else loadSuppliers();});
    
    async function loadSuppliers(){
        const snapshot=await db.collection('suppliers').get();
        let html='';
        snapshot.forEach(doc=>{
            const s=doc.data();
            html+=`<tr><td><strong>${s.name}</strong></td><td>${s.phone||'-'}</td><td>${s.address||'-'}</td><td>${(s.balance||0).toFixed(2)} د.ع</td><td><button class="btn-sm btn-danger" onclick="deleteSupplier('${doc.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('suppliersList').innerHTML=html||'<tr><td colspan="5">لا يوجد موردين</td></tr>';
    }
    
    window.addSupplier=async()=>{
        const name=document.getElementById('supName').value.trim();
        if(!name) return alert('اسم المورد مطلوب');
        await db.collection('suppliers').add({
            name:name,
            phone:document.getElementById('supPhone').value,
            address:document.getElementById('supAddress').value,
            email:document.getElementById('supEmail').value,
            balance:0,
            createdAt:new Date()
        });
        alert('تمت الإضافة');
        document.getElementById('supName').value='';
        document.getElementById('supPhone').value='';
        document.getElementById('supAddress').value='';
        document.getElementById('supEmail').value='';
        loadSuppliers();
    };
    
    window.deleteSupplier=async(id)=>{if(confirm('حذف المورد؟')){await db.collection('suppliers').doc(id).delete(); loadSuppliers();}};
</script>
</body>
</html>
