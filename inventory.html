<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المخزون المتكامل - مكتب حاج فاضل</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        
        h1, h2 { color: #1e3c72; border-right: 4px solid #2a5298; padding-right: 15px; margin-bottom: 20px; }
        
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card .number { font-size: 28px; font-weight: bold; }
        .stat-card .label { font-size: 12px; opacity: 0.9; }
        .stat-card.danger { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        .form-card { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #e67e22; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-bar input, .search-bar select { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 10px 8px; text-align: center; }
        th { background: #1e3c72; color: white; }
        tr:nth-child(even) { background: #f8f9fa; }
        tr:hover { background: #e8f4fd; }
        
        .stock-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; }
        .stock-good { background: #27ae60; color: white; }
        .stock-low { background: #e67e22; color: white; }
        .stock-critical { background: #e74c3c; color: white; }
        .stock-out { background: #95a5a6; color: white; }
        
        .low-stock { background: #ffeaa7 !important; }
        .actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .close-modal { cursor: pointer; font-size: 24px; color: #999; }
        .close-modal:hover { color: #e74c3c; }
        
        @media (max-width: 768px) { .container { padding: 15px; } th, td { font-size: 10px; padding: 5px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 نظام إدارة المخزون المتكامل</h1>
        
        <!-- Stats -->
        <div class="stats-container">
            <div class="stat-card"><div class="number" id="totalProducts">0</div><div class="label">عدد المنتجات</div></div>
            <div class="stat-card"><div class="number" id="totalValue">0 د</div><div class="label">قيمة المخزون</div></div>
            <div class="stat-card danger"><div class="number" id="lowStockCount">0</div><div class="label">منتجات منخفضة</div></div>
        </div>
        
        <!-- Add/Edit Product -->
        <div class="form-card">
            <h2>➕ إضافة / تعديل منتج</h2>
            <div class="form-grid">
                <div class="form-group"><label>📝 اسم المنتج *</label><input type="text" id="productName" placeholder="اسم المنتج"></div>
                <div class="form-group"><label>🔢 الكمية</label><input type="number" id="productQuantity" value="0" min="0"></div>
                <div class="form-group"><label>💰 سعر الشراء</label><input type="number" id="productCostPrice" step="0.01"></div>
                <div class="form-group"><label>💵 سعر البيع</label><input type="number" id="productSellingPrice" step="0.01"></div>
                <div class="form-group"><label>📂 الفئة</label><input type="text" id="productCategory" placeholder="فئة المنتج"></div>
            </div>
            <div style="margin-top:15px">
                <button id="submitBtn" onclick="saveProduct()">➕ إضافة منتج</button>
                <button id="cancelEditBtn" onclick="cancelEdit()" style="background:#95a5a6; display:none;">❌ إلغاء</button>
            </div>
        </div>
        
        <!-- Search -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 بحث عن منتج...">
            <select id="stockFilter"><option value="all">جميع المنتجات</option><option value="low">منخفض المخزون</option><option value="out">نفذت الكمية</option></select>
            <button onclick="showLowStockReport()" style="background:#e67e22">⚠️ تقرير المخزون</button>
        </div>
        
        <!-- Products Table -->
        <table>
            <thead><tr><th>المنتج</th><th>الفئة</th><th>الكمية</th><th>الحالة</th><th>سعر الشراء</th><th>سعر البيع</th><th>الربح</th><th>الإجراءات</th></tr></thead>
            <tbody id="productsTableBody"></tbody>
        </table>
    </div>
    
    <!-- Low Stock Modal -->
    <div id="reportModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>📊 تقرير المخزون المنخفض</h3><span class="close-modal" onclick="closeReport()">&times;</span></div><div id="reportContent"></div></div></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
            authDomain: "haj-fadel-accounting.firebaseapp.com",
            projectId: "haj-fadel-accounting",
            storageBucket: "haj-fadel-accounting.firebasestorage.app",
            messagingSenderId: "449205985318",
            appId: "1:449205985318:web:2dece1e1412165b01f46e7"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let allProducts = [];
        let editingId = null;
        const LOW_STOCK = 20;
        const CRITICAL = 5;
        
        // Check authentication
        auth.onAuthStateChanged((user) => {
            if (!user) window.location.href = "login.html";
        });
        
        // Real-time listener for products
        db.collection('inventory').onSnapshot((snapshot) => {
            allProducts = [];
            snapshot.forEach(doc => {
                allProducts.push({ id: doc.id, ...doc.data() });
            });
            displayProducts(allProducts);
            updateStats();
        });
        
        function updateStats() {
            document.getElementById('totalProducts').innerText = allProducts.length;
            let totalValue = allProducts.reduce((sum, p) => sum + ((p.costPrice || 0) * (p.quantity || 0)), 0);
            document.getElementById('totalValue').innerText = totalValue.toFixed(2) + ' د';
            let lowCount = allProducts.filter(p => (p.quantity || 0) <= LOW_STOCK && (p.quantity || 0) > 0).length;
            document.getElementById('lowStockCount').innerText = lowCount;
        }
        
        function getStockBadge(quantity) {
            if (quantity <= 0) return '<span class="stock-badge stock-out">❌ نفذت</span>';
            if (quantity <= CRITICAL) return '<span class="stock-badge stock-critical">⚠️ حرج</span>';
            if (quantity <= LOW_STOCK) return '<span class="stock-badge stock-low">⚠️ منخفض</span>';
            return '<span class="stock-badge stock-good">✅ جيد</span>';
        }
        
        function displayProducts(products) {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const stockFilter = document.getElementById('stockFilter')?.value || 'all';
            
            let filtered = products;
            if (searchTerm) filtered = filtered.filter(p => (p.itemName || p.name || '').toLowerCase().includes(searchTerm));
            if (stockFilter === 'low') filtered = filtered.filter(p => (p.quantity || 0) <= LOW_STOCK && (p.quantity || 0) > 0);
            if (stockFilter === 'out') filtered = filtered.filter(p => (p.quantity || 0) <= 0);
            
            const tbody = document.getElementById('productsTableBody');
            if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="8">لا توجد منتجات</td></tr>'; return; }
            
            tbody.innerHTML = '';
            filtered.forEach(p => {
                const quantity = p.quantity || 0;
                const profit = (p.sellingPrice || 0) - (p.costPrice || 0);
                const lowClass = quantity <= LOW_STOCK ? 'low-stock' : '';
                tbody.innerHTML += `
                    <tr class="${lowClass}">
                        <td><strong>${p.itemName || p.name}</strong></td>
                        <td>${p.category || '-'}</td>
                        <td>${quantity}</td>
                        <td>${getStockBadge(quantity)}</td>
                        <td>${(p.costPrice || 0).toFixed(2)}</td>
                        <td>${(p.sellingPrice || 0).toFixed(2)}</td>
                        <td style="color:${profit >= 0 ? '#27ae60' : '#e74c3c'}">${profit.toFixed(2)}</td>
                        <td class="actions">
                            <button class="btn-sm" onclick='editProduct("${p.id}")' style="background:#3498db">✏️</button>
                            <button class="btn-sm btn-danger" onclick='deleteProduct("${p.id}")'>🗑️</button>
                        </td>
                    </tr>
                `;
            });
        }
        
        window.saveProduct = async function() {
            const name = document.getElementById('productName').value.trim();
            const quantity = parseInt(document.getElementById('productQuantity').value) || 0;
            const sellingPrice = parseFloat(document.getElementById('productSellingPrice').value) || 0;
            const costPrice = parseFloat(document.getElementById('productCostPrice').value) || 0;
            const category = document.getElementById('productCategory').value.trim();
            
            if (!name) { alert('الرجاء إدخال اسم المنتج'); return; }
            
            const productData = { itemName: name, quantity, sellingPrice, costPrice, category: category || 'أخرى', updatedAt: new Date() };
            
            try {
                if (editingId) {
                    await db.collection('inventory').doc(editingId).update(productData);
                    alert('تم تحديث المنتج بنجاح');
                    cancelEdit();
                } else {
                    await db.collection('inventory').add({ ...productData, createdAt: new Date() });
                    alert('تم إضافة المنتج بنجاح');
                    clearForm();
                }
            } catch(e) { console.error(e); alert('حدث خطأ'); }
        };
        
        window.deleteProduct = async function(id) {
            const product = allProducts.find(p => p.id === id);
            if (!confirm(`⚠️ هل أنت متأكد من حذف "${product?.itemName || product?.name}" نهائياً؟\nلن يظهر هذا المنتج في المبيعات بعد الآن.`)) return;
            try {
                await db.collection('inventory').doc(id).delete();
                alert('تم حذف المنتج بنجاح');
            } catch(e) { console.error(e); alert('حدث خطأ'); }
        };
        
        window.editProduct = function(id) {
            const p = allProducts.find(p => p.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('productName').value = p.itemName || p.name;
            document.getElementById('productQuantity').value = p.quantity || 0;
            document.getElementById('productSellingPrice').value = p.sellingPrice || 0;
            document.getElementById('productCostPrice').value = p.costPrice || 0;
            document.getElementById('productCategory').value = p.category || '';
            document.getElementById('submitBtn').innerHTML = '✏️ تحديث منتج';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
        };
        
        window.cancelEdit = function() {
            editingId = null;
            clearForm();
            document.getElementById('submitBtn').innerHTML = '➕ إضافة منتج';
            document.getElementById('cancelEditBtn').style.display = 'none';
        };
        
        function clearForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productQuantity').value = '0';
            document.getElementById('productSellingPrice').value = '';
            document.getElementById('productCostPrice').value = '';
            document.getElementById('productCategory').value = '';
        }
        
        window.showLowStockReport = function() {
            const lowProducts = allProducts.filter(p => (p.quantity || 0) <= LOW_STOCK);
            if (lowProducts.length === 0) { alert('لا توجد منتجات منخفضة المخزون'); return; }
            let html = '<table style="width:100%"><tr><th>المنتج</th><th>الكمية</th><th>سعر البيع</th></tr>';
            lowProducts.forEach(p => { html += `<tr><td>${p.itemName || p.name}</td><td>${p.quantity || 0}</td><td>${(p.sellingPrice || 0).toFixed(2)}</td></tr>`; });
            html += '</table>';
            document.getElementById('reportContent').innerHTML = html;
            document.getElementById('reportModal').style.display = 'flex';
        };
        
        window.closeReport = function() { document.getElementById('reportModal').style.display = 'none'; };
        
        // Filters
        document.getElementById('searchInput')?.addEventListener('input', () => displayProducts(allProducts));
        document.getElementById('stockFilter')?.addEventListener('change', () => displayProducts(allProducts));
    </script>
</body>
</html>
