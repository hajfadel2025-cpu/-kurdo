<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأصناف - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1400px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #e74c3c;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        .search-bar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .search-bar input,.search-bar select{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-danger{background:#e74c3c}
        .btn-sm{padding:5px 10px;font-size:12px}
        .btn-warning{background:#e67e22}
        .badge{padding:3px 8px;border-radius:12px;font-size:10px}
        .badge-green{background:#e8f8f5;color:#27ae60}
        .badge-red{background:#fee;color:#e74c3c}
        .badge-orange{background:#ffeaa7;color:#e67e22}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-boxes"></i> إدارة الأصناف</h2>
    
    <div class="form-card">
        <h3>➕ إضافة صنف جديد</h3>
        <div class="form-grid">
            <input type="text" id="itemName" placeholder="اسم الصنف *">
            <input type="text" id="barcode" placeholder="الباركود">
            <select id="category"><option value="">الفئة</option><option value="مواد غذائية">مواد غذائية</option><option value="إلكترونيات">إلكترونيات</option><option value="ملابس">ملابس</option><option value="أخرى">أخرى</option></select>
            <select id="unit"><option value="قطعة">قطعة</option><option value="كرتون">كرتون</option><option value="كيلو">كيلو</option><option value="متر">متر</option><option value="لتر">لتر</option></select>
            <input type="number" id="quantity" placeholder="الكمية" value="0">
            <input type="number" id="costPrice" placeholder="سعر الشراء" step="0.01">
            <input type="number" id="sellingPrice" placeholder="سعر البيع" step="0.01">
            <input type="number" id="minStock" placeholder="حد الطلب الأدنى" value="10">
        </div>
        <button onclick="addItem()" style="margin-top:15px;"><i class="fas fa-save"></i> إضافة صنف</button>
    </div>
    
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث عن صنف...">
        <select id="categoryFilter"><option value="all">جميع الفئات</option></select>
        <select id="stockFilter"><option value="all">جميع الأصناف</option><option value="low">منخفضة المخزون</option></select>
    </div>
    
    <table>
        <thead><tr><th>الصنف</th><th>الباركود</th><th>الفئة</th><th>الوحدة</th><th>الكمية</th><th>سعر الشراء</th><th>سعر البيع</th><th>الحالة</th><th>إجراءات</th></tr></thead>
        <tbody id="inventoryList"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {apiKey:"AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",authDomain:"haj-fadel-accounting.firebaseapp.com",projectId:"haj-fadel-accounting",storageBucket:"haj-fadel-accounting.firebasestorage.app",messagingSenderId:"449205985318",appId:"1:449205985318:web:2dece1e1412165b01f46e7"};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allItems=[];
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else loadItems();});
    
    async function loadItems(){
        const snapshot=await db.collection('inventory').get();
        allItems=[]; let html='';
        snapshot.forEach(doc=>{allItems.push({id:doc.id,...doc.data()});});
        displayItems(allItems);
        // تحديث فئات الفلتر
        const cats=new Set(allItems.map(i=>i.category).filter(Boolean));
        const filter=document.getElementById('categoryFilter');
        filter.innerHTML='<option value="all">جميع الفئات</option>';
        cats.forEach(c=>filter.innerHTML+=`<option value="${c}">${c}</option>`);
    }
    
    function displayItems(items){
        const search=document.getElementById('searchInput').value.toLowerCase();
        const catFilter=document.getElementById('categoryFilter').value;
        const stockFilter=document.getElementById('stockFilter').value;
        let filtered=items.filter(i=>{
            let match=true;
            if(search && !(i.itemName||'').toLowerCase().includes(search)) match=false;
            if(catFilter!=='all' && i.category!==catFilter) match=false;
            if(stockFilter==='low' && (i.quantity||0)>10) match=false;
            return match;
        });
        let html='';
        filtered.forEach(p=>{
            const qty=p.quantity||0;
            let badge=qty<=3?'<span class="badge badge-red">حرج</span>':qty<=10?'<span class="badge badge-orange">منخفض</span>':'<span class="badge badge-green">جيد</span>';
            html+=`<tr><td><strong>${p.itemName||p.name}</strong></td><td>${p.barcode||'-'}</td><td>${p.category||'-'}</td><td>${p.unit||'قطعة'}</td><td>${qty}</td><td>${(p.costPrice||0).toFixed(2)}</td><td>${(p.sellingPrice||0).toFixed(2)}</td><td>${badge}</td><td><button class="btn-sm btn-warning" onclick="editItem('${p.id}')">✏️</button><button class="btn-sm btn-danger" onclick="deleteItem('${p.id}')">🗑️</button></td></tr>`;
        });
        document.getElementById('inventoryList').innerHTML=html||'<tr><td colspan="9">لا توجد أصناف</td></tr>';
    }
    
    window.addItem=async()=>{
        const name=document.getElementById('itemName').value.trim();
        if(!name) return alert('اسم الصنف مطلوب');
        await db.collection('inventory').add({
            itemName:name,name:name,
            barcode:document.getElementById('barcode').value,
            category:document.getElementById('category').value||'أخرى',
            unit:document.getElementById('unit').value,
            quantity:parseInt(document.getElementById('quantity').value)||0,
            costPrice:parseFloat(document.getElementById('costPrice').value)||0,
            sellingPrice:parseFloat(document.getElementById('sellingPrice').value)||0,
            minStock:parseInt(document.getElementById('minStock').value)||10,
            createdAt:new Date()
        });
        alert('تمت الإضافة');
        document.getElementById('itemName').value='';
        document.getElementById('barcode').value='';
        document.getElementById('quantity').value='0';
        document.getElementById('costPrice').value='';
        document.getElementById('sellingPrice').value='';
        loadItems();
    };
    
    window.deleteItem=async(id)=>{if(confirm('حذف الصنف؟')){await db.collection('inventory').doc(id).delete(); loadItems();}};
    window.editItem=(id)=>{alert('سيتم إضافة التعديل قريباً');};
    
    document.getElementById('searchInput').addEventListener('input',()=>displayItems(allItems));
    document.getElementById('categoryFilter').addEventListener('change',()=>displayItems(allItems));
    document.getElementById('stockFilter').addEventListener('change',()=>displayItems(allItems));
</script>
</body>
</html>
