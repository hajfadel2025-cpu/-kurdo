<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المخازن - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #3498db;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-danger{background:#e74c3c}
        .btn-sm{padding:5px 10px;font-size:12px}
        .badge{padding:3px 10px;border-radius:12px;font-size:11px}
        .badge-success{background:#d4edda;color:#155724}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-warehouse"></i> إدارة المخازن</h2>
    
    <div class="form-card">
        <h3>➕ إضافة مخزن جديد</h3>
        <div class="form-grid">
            <input type="text" id="warehouseName" placeholder="اسم المخزن *">
            <input type="text" id="warehouseLocation" placeholder="الموقع">
            <select id="warehouseStatus">
                <option value="نشط">نشط</option>
                <option value="غير نشط">غير نشط</option>
            </select>
        </div>
        <button onclick="addWarehouse()" style="margin-top:15px;"><i class="fas fa-save"></i> إضافة مخزن</button>
    </div>
    
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>اسم المخزن</th><th>الموقع</th><th>الحالة</th><th>عدد المنتجات</th><th>إجراءات</th></tr></thead>
            <tbody id="warehousesList"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else loadWarehouses();});
    
    async function loadWarehouses(){
        const snapshot=await db.collection('warehouses').get();
        let html='';
        for(const doc of snapshot.docs){
            const w=doc.data();
            // عدد المنتجات في هذا المخزن
            const itemsSnap=await db.collection('inventory').where('warehouseId','==',doc.id).get();
            html+=`<tr><td><strong>${w.name}</strong></td><td>${w.location||'-'}</td><td><span class="badge ${w.status==='نشط'?'badge-success':'badge-warning'}">${w.status||'نشط'}</span></td><td>${itemsSnap.size}</td><td><button class="btn-sm btn-danger" onclick="deleteWarehouse('${doc.id}')">حذف</button></td></tr>`;
        }
        document.getElementById('warehousesList').innerHTML=html||'<tr><td colspan="5">لا يوجد مخازن</td></tr>';
    }
    
    window.addWarehouse=async()=>{
        const name=document.getElementById('warehouseName').value.trim();
        if(!name) return alert('اسم المخزن مطلوب');
        await db.collection('warehouses').add({
            name:name,
            location:document.getElementById('warehouseLocation').value,
            status:document.getElementById('warehouseStatus').value,
            createdAt:new Date()
        });
        alert('تمت الإضافة');
        document.getElementById('warehouseName').value='';
        document.getElementById('warehouseLocation').value='';
        loadWarehouses();
    };
    
    window.deleteWarehouse=async(id)=>{if(confirm('حذف المخزن؟')){await db.collection('warehouses').doc(id).delete(); loadWarehouses();}};
</script>
</body>
</html>
