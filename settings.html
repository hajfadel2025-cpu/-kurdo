<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإعدادات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #7f8c8d;padding-right:15px;margin-bottom:20px}
        .settings-section{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .settings-section h3{color:#1e3c72;margin-bottom:15px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
        input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        .btn-danger{background:#e74c3c}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-sm{padding:5px 10px;font-size:12px}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-cog"></i> الإعدادات والصلاحيات</h2>
    
    <div class="settings-section">
        <h3>👤 إضافة مستخدم جديد</h3>
        <div class="form-grid">
            <input type="text" id="userName" placeholder="اسم المستخدم *">
            <input type="email" id="userEmail" placeholder="البريد الإلكتروني *">
            <input type="password" id="userPassword" placeholder="كلمة المرور *">
            <select id="userRole">
                <option value="مدير">مدير</option>
                <option value="مندوب">مندوب مبيعات</option>
                <option value="محاسب">محاسب</option>
                <option value="مشرف مخزن">مشرف مخزن</option>
            </select>
        </div>
        <button onclick="addUser()" style="margin-top:15px;"><i class="fas fa-user-plus"></i> إضافة مستخدم</button>
    </div>
    
    <div class="settings-section">
        <h3>📋 قائمة المستخدمين</h3>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>الاسم</th><th>البريد الإلكتروني</th><th>الدور</th><th>إجراءات</th></tr></thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>
    
    <div class="settings-section">
        <h3>⚙️ إعدادات النظام</h3>
        <div class="form-grid">
            <div><label>العملة الافتراضية</label><select id="currency"><option value="د.ع">دينار عراقي</option><option value="$">دولار</option><option value="TL">ليرة تركية</option></select></div>
            <div><label>نسبة الضريبة</label><input type="number" id="taxRate" value="0" step="0.1"></div>
            <div><label>نسبة الخصم الافتراضية</label><input type="number" id="defaultDiscount" value="0" step="0.1"></div>
        </div>
        <button onclick="saveSettings()" style="margin-top:15px;"><i class="fas fa-save"></i> حفظ الإعدادات</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else loadUsers();});
    
    async function loadUsers(){
        const snapshot=await db.collection('users').get();
        let html='';
        snapshot.forEach(doc=>{
            const u=doc.data();
            html+=`<tr><td>${u.employeeName||u.name||'-'}</td><td>${u.email||'-'}</td><td>${u.accountType||u.role||'-'}</td><td><button class="btn-sm btn-danger" onclick="deleteUser('${doc.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('usersList').innerHTML=html||'<tr><td colspan="4">لا يوجد مستخدمين</td></tr>';
    }
    
    window.addUser=async()=>{
        const name=document.getElementById('userName').value.trim();
        const email=document.getElementById('userEmail').value.trim();
        const password=document.getElementById('userPassword').value;
        const role=document.getElementById('userRole').value;
        if(!name||!email||!password) return alert('املأ جميع الحقول');
        try{
            const userCred=await auth.createUserWithEmailAndPassword(email,password);
            await db.collection('users').doc(userCred.user.uid).set({
                employeeName:name,name:name,
                email:email,
                accountType:role,
                role:role==='مدير'?'admin':'user',
                createdAt:new Date()
            });
            alert('تم إضافة المستخدم');
            document.getElementById('userName').value='';
            document.getElementById('userEmail').value='';
            document.getElementById('userPassword').value='';
            loadUsers();
        }catch(e){alert('خطأ: '+e.message);}
    };
    
    window.deleteUser=async(id)=>{if(confirm('حذف المستخدم؟')){await db.collection('users').doc(id).delete(); loadUsers();}};
    
    window.saveSettings=async()=>{
        await db.collection('settings').doc('main').set({
            currency:document.getElementById('currency').value,
            taxRate:parseFloat(document.getElementById('taxRate').value)||0,
            defaultDiscount:parseFloat(document.getElementById('defaultDiscount').value)||0,
            updatedAt:new Date()
        });
        alert('تم حفظ الإعدادات');
    };
</script>
</body>
</html>
