<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المبيعات المتكامل - مكتب حاج فاضل</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1, h2 {
            color: #1a2a6c;
            border-right: 4px solid #fdbb4d;
            padding-right: 15px;
            margin-bottom: 20px;
        }
        
        /* بطاقات الإحصائيات */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card.sales {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .stat-card.commission {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
        }
        
        /* نموذج البيع */
        .form-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #11998e;
        }
        
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        
        .btn-primary {
            background: #3498db;
        }
        
        .btn-danger {
            background: #e74c3c;
        }
        
        .btn-warning {
            background: #e67e22;
        }
        
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .btn-save {
            background: #27ae60;
            font-size: 16px;
            padding: 12px 30px;
        }
        
        /* شريط البحث */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-bar input, .search-bar select {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        
        /* الجدول */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 13px;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 10px 8px;
            text-align: center;
        }
        
        th {
            background: #1a2a6c;
            color: white;
            font-weight: 600;
        }
        
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        
        tr:hover {
            background: #e8f4fd;
        }
        
        .commission-cell {
            color: #27ae60;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* نافذة الفاتورة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #fdbb4d;
        }
        
        .close-modal {
            cursor: pointer;
            font-size: 24px;
            color: #999;
        }
        
        .close-modal:hover {
            color: #e74c3c;
        }
        
        /* سلة المنتجات */
        .cart-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .cart-summary {
            background: #1a2a6c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .commission-preview {
            background: #f093fb;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
            text-align: center;
        }
        
        .print-area {
            direction: rtl;
            padding: 20px;
        }
        
        .invoice {
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            th, td {
                font-size: 10px;
                padding: 5px;
            }
        }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set, get, update } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
            authDomain: "haj-fadel-accounting.firebaseapp.com",
            projectId: "haj-fadel-accounting",
            storageBucket: "haj-fadel-accounting.firebasestorage.app",
            messagingSenderId: "449205985318",
            appId: "1:449205985318:web:2dece1e1412165b01f46e7"
        };

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const salesRef = ref(database, "sales");
        const inventoryRef = ref(database, "inventory");
        
        // بيانات مؤقتة
        let allProducts = [];
        let allMandubs = [];
        let allCustomers = [];
        let currentCart = [];
        let currentInvoice = {
            mandubId: '',
            customerId: '',
            paymentMethod: 'cash',
            items: [],
            total: 0,
            commission: 0
        };
        
        // ==================== تحميل البيانات الأساسية ====================
        
        async function loadProducts() {
            const snapshot = await get(inventoryRef);
            if (snapshot.exists()) {
                const data = snapshot.val();
                allProducts = [];
                for (let id in data) {
                    allProducts.push({ id, ...data[id] });
                }
                updateProductSelect();
            }
        }
        
        async function loadMandubs() {
            const snapshot = await get(ref(database, "mandubs"));
            if (snapshot.exists()) {
                const data = snapshot.val();
                allMandubs = [];
                for (let id in data) {
                    allMandubs.push({ id, ...data[id] });
                }
                updateMandubSelect();
            }
        }
        
        async function loadCustomers() {
            const snapshot = await get(ref(database, "customers"));
            if (snapshot.exists()) {
                const data = snapshot.val();
                allCustomers = [];
                for (let id in data) {
                    allCustomers.push({ id, ...data[id] });
                }
                updateCustomerSelect();
            }
        }
        
        function updateProductSelect() {
            const select = document.getElementById('productSelect');
            if (!select) return;
            select.innerHTML = '<option value="">-- اختر منتج --</option>';
            allProducts.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = `${p.name} - ${p.sellingPrice || 0} د - متوفر: ${p.quantity || 0}`;
                option.disabled = (p.quantity || 0) <= 0;
                select.appendChild(option);
            });
        }
        
        function updateMandubSelect() {
            const select = document.getElementById('mandubSelect');
            if (!select) return;
            select.innerHTML = '<option value="">-- اختر مندوب --</option>';
            allMandubs.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = `${m.name} (نسبة العمولة: ${m.commissionRate || 0}%)`;
                select.appendChild(option);
            });
        }
        
        function updateCustomerSelect() {
            const select = document.getElementById('customerSelect');
            if (!select) return;
            select.innerHTML = '<option value="cash">-- عميل نقدي --</option>';
            allCustomers.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.name} (الرصيد: ${(c.currentDebt || 0).toFixed(2)} د)`;
                select.appendChild(option);
            });
        }
        
        // ==================== سلة المشتريات ====================
        
        window.addToCart = function() {
            const productId = document.getElementById('productSelect').value;
            const quantity = parseInt(document.getElementById('productQuantity').value) || 1;
            
            if (!productId) {
                alert('اختر منتجاً أولاً');
                return;
            }
            
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            if (quantity > (product.quantity || 0)) {
                alert(`الكمية المتوفرة: ${product.quantity || 0}`);
                return;
            }
            
            // التحقق إذا كان المنتج موجود بالفعل في السلة
            const existingItem = currentCart.find(item => item.productId === productId);
            if (existingItem) {
                existingItem.quantity += quantity;
                existingItem.total = existingItem.quantity * existingItem.price;
            } else {
                currentCart.push({
                    productId: productId,
                    productName: product.name,
                    price: product.sellingPrice || 0,
                    quantity: quantity,
                    total: (product.sellingPrice || 0) * quantity
                });
            }
            
            updateCartDisplay();
            calculateTotal();
            
            // تفريغ الحقول
            document.getElementById('productSelect').value = '';
            document.getElementById('productQuantity').value = '1';
        }
        
        window.removeFromCart = function(index) {
            currentCart.splice(index, 1);
            updateCartDisplay();
            calculateTotal();
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            if (!container) return;
            
            if (currentCart.length === 0) {
                container.innerHTML = '<div class="cart-item" style="text-align:center; color:#999;">السلة فارغة</div>';
                return;
            }
            
            let html = '';
            currentCart.forEach((item, index) => {
                html += `
                    <div class="cart-item">
                        <span><strong>${item.productName}</strong></span>
                        <span>${item.price} د × ${item.quantity}</span>
                        <span>${item.total.toFixed(2)} د</span>
                        <button class="btn-sm btn-danger" onclick="removeFromCart(${index})">✖</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function calculateTotal() {
            const total = currentCart.reduce((sum, item) => sum + item.total, 0);
            currentInvoice.total = total;
            document.getElementById('totalAmount').textContent = total.toFixed(2);
            calculateCommission();
        }
        
        function calculateCommission() {
            const mandubId = document.getElementById('mandubSelect')?.value;
            const mandub = allMandubs.find(m => m.id === mandubId);
            const rate = mandub?.commissionRate || 0;
            const commission = currentInvoice.total * (rate / 100);
            currentInvoice.commission = commission;
            document.getElementById('commissionAmount').textContent = commission.toFixed(2);
            document.getElementById('commissionRate').textContent = rate + '%';
        }
        
        // ==================== حفظ الفاتورة ====================
        
        window.saveInvoice = async function() {
            const mandubId = document.getElementById('mandubSelect').value;
            const customerId = document.getElementById('customerSelect').value;
            const paymentMethod = document.getElementById('paymentMethod').value;
            
            if (!mandubId) {
                alert('الرجاء اختيار المندوب');
                return;
            }
            
            if (currentCart.length === 0) {
                alert('الرجاء إضافة منتجات إلى الفاتورة');
                return;
            }
            
            if (paymentMethod === 'credit' && customerId === 'cash') {
                alert('للبيع بالدين، الرجاء اختيار عميل');
                return;
            }
            
            const mandub = allMandubs.find(m => m.id === mandubId);
            const commission = currentInvoice.total * ((mandub?.commissionRate || 0) / 100);
            
            try {
                // 1. تحديث المخزن (تخفيض الكميات)
                for (const item of currentCart) {
                    const product = allProducts.find(p => p.id === item.productId);
                    if (product) {
                        const newQuantity = (product.quantity || 0) - item.quantity;
                        await update(ref(database, `inventory/${item.productId}`), {
                            quantity: newQuantity,
                            lastUpdate: new Date().toISOString()
                        });
                    }
                }
                
                // 2. إنشاء رقم فاتورة
                const invoiceNumber = 'INV-' + Date.now();
                
                // 3. حفظ الفاتورة
                const invoiceData = {
                    invoiceNumber: invoiceNumber,
                    mandubId: mandubId,
                    mandubName: mandub?.name || '',
                    customerId: customerId === 'cash' ? null : customerId,
                    customerName: customerId === 'cash' ? 'عميل نقدي' : (allCustomers.find(c => c.id === customerId)?.name || ''),
                    paymentMethod: paymentMethod,
                    items: currentCart,
                    total: currentInvoice.total,
                    commissionRate: mandub?.commissionRate || 0,
                    commission: commission,
                    date: new Date().toLocaleDateString('ar-EG'),
                    timestamp: Date.now()
                };
                
                await push(salesRef, invoiceData);
                
                // 4. إذا كان بيع بالدين، تحديث رصيد العميل
                if (paymentMethod === 'credit' && customerId !== 'cash') {
                    const customerSnapshot = await get(ref(database, `customers/${customerId}`));
                    if (customerSnapshot.exists()) {
                        const customer = customerSnapshot.val();
                        const newDebt = (customer.currentDebt || 0) + currentInvoice.total;
                        const newTotalPurchases = (customer.totalPurchases || 0) + currentInvoice.total;
                        await update(ref(database, `customers/${customerId}`), {
                            currentDebt: newDebt,
                            totalPurchases: newTotalPurchases,
                            lastUpdate: new Date().toISOString()
                        });
                        
                        // تسجيل معاملة الدين
                        await push(ref(database, `debts/${customerId}`), {
                            type: 'debt',
                            amount: currentInvoice.total,
                            note: `فاتورة ${invoiceNumber}`,
                            date: new Date().toLocaleDateString('ar-EG'),
                            timestamp: Date.now()
                        });
                    }
                }
                
                // 5. تحديث إحصائيات المندوب
                const mandubSnapshot = await get(ref(database, `mandubs/${mandubId}`));
                if (mandubSnapshot.exists()) {
                    const mandubData = mandubSnapshot.val();
                    const newTotalSales = (mandubData.totalSales || 0) + currentInvoice.total;
                    const newTotalCommission = (mandubData.totalCommission || 0) + commission;
                    const newBalance = newTotalCommission - (mandubData.totalPaid || 0);
                    await update(ref(database, `mandubs/${mandubId}`), {
                        totalSales: newTotalSales,
                        totalCommission: newTotalCommission,
                        balance: newBalance,
                        lastUpdate: new Date().toISOString()
                    });
                }
                
                alert(`✅ تم حفظ الفاتورة بنجاح\nرقم الفاتورة: ${invoiceNumber}\nالعمولة: ${commission.toFixed(2)} دينار`);
                
                // تفريغ السلة والنموذج
                currentCart = [];
                updateCartDisplay();
                document.getElementById('mandubSelect').value = '';
                document.getElementById('customerSelect').value = 'cash';
                document.getElementById('productSelect').value = '';
                document.getElementById('productQuantity').value = '1';
                document.getElementById('totalAmount').textContent = '0';
                document.getElementById('commissionAmount').textContent = '0';
                
                // إعادة تحميل البيانات
                await loadProducts();
                await loadMandubs();
                await loadCustomers();
                loadSalesList();
                
            } catch (error) {
                console.error("خطأ:", error);
                alert('حدث خطأ في حفظ الفاتورة');
            }
        }
        
        // ==================== عرض فاتورة ====================
        
        window.viewInvoice = function(invoice) {
            let itemsHtml = '';
            invoice.items.forEach(item => {
                itemsHtml += `
                    <tr>
                        <td>${item.productName}</td>
                        <td>${item.price} د</td>
                        <td>${item.quantity}</td>
                        <td>${item.total.toFixed(2)} د</td>
                    </tr>
                `;
            });
            
            const modalContent = `
                <div class="print-area">
                    <div style="text-align:center; margin-bottom:20px;">
                        <h3>📄 مكتب حاج فاضل</h3>
                        <p>فاتورة مبيعات</p>
                        <p><strong>رقم الفاتورة:</strong> ${invoice.invoiceNumber}</p>
                        <p><strong>التاريخ:</strong> ${invoice.date}</p>
                    </div>
                    <hr>
                    <p><strong>المندوب:</strong> ${invoice.mandubName}</p>
                    <p><strong>العميل:</strong> ${invoice.customerName || 'عميل نقدي'}</p>
                    <p><strong>طريقة الدفع:</strong> ${invoice.paymentMethod === 'cash' ? 'نقدي' : 'أجل (دين)'}</p>
                    <table style="width:100%; border-collapse:collapse; margin:15px 0;">
                        <thead>
                            <tr style="background:#f0f0f0;">
                                <th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th>
                            </tr>
                        </thead>
                        <tbody>${itemsHtml}</tbody>
                        <tfoot>
                            <tr style="background:#f0f0f0;">
                                <td colspan="3"><strong>الإجمالي</strong></td>
                                <td><strong>${invoice.total.toFixed(2)} د</strong></td>
                            </tr>
                            <tr>
                                <td colspan="3">نسبة العمولة</td>
                                <td>${invoice.commissionRate}%</td>
                            </tr>
                            <tr>
                                <td colspan="3">قيمة العمولة</td>
                                <td class="commission-cell">${invoice.commission.toFixed(2)} د</td>
                            </tr>
                        </tfoot>
                    </table>
                    <hr>
                    <div style="text-align:center; margin-top:20px;">
                        <p>شكراً لتعاملكم معنا</p>
                    </div>
                </div>
            `;
            
            document.getElementById('invoiceContent').innerHTML = modalContent;
            document.getElementById('invoiceModal').style.display = 'flex';
        }
        
        window.printInvoice = function() {
            const printContent = document.getElementById('invoiceContent').innerHTML;
            const originalContent = document.body.innerHTML;
            document.body.innerHTML = printContent;
            window.print();
            document.body.innerHTML = originalContent;
            location.reload();
        }
        
        window.closeInvoiceModal = function() {
            document.getElementById('invoiceModal').style.display = 'none';
        }
        
        // ==================== عرض قائمة الفواتير ====================
        
        async function loadSalesList() {
            const tbody = document.getElementById('salesTableBody');
            if (!tbody) return;
            
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>';
            
            try {
                const snapshot = await get(salesRef);
                if (!snapshot.exists()) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">لا توجد فواتير</td></tr>';
                    return;
                }
                
                const data = snapshot.val();
                const salesList = [];
                for (let id in data) {
                    salesList.push({ id, ...data[id] });
                }
                salesList.reverse(); // الأحدث أولاً
                
                tbody.innerHTML = '';
                salesList.forEach(sale => {
                    const row = `
                        <tr>
                            <td>${sale.invoiceNumber || sale.id.slice(-6)}</td>
                            <td>${sale.mandubName || '-'}</td>
                            <td>${sale.customerName || 'نقدي'}</td>
                            <td>${sale.total.toFixed(2)} د</td>
                            <td>${sale.commissionRate}%</td>
                            <td class="commission-cell">${(sale.commission || 0).toFixed(2)} د</td>
                            <td class="actions">
                                <button class="btn-sm" onclick='viewInvoice(${JSON.stringify(sale).replace(/'/g, "&apos;")})' style="background:#3498db">👁️ عرض</button>
                             </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
                
                updateSalesStats(salesList);
                
            } catch (error) {
                console.error("خطأ:", error);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:red;">خطأ في التحميل</td></tr>';
            }
        }
        
        function updateSalesStats(salesList) {
            const totalSales = salesList.reduce((sum, s) => sum + s.total, 0);
            const totalCommission = salesList.reduce((sum, s) => sum + (s.commission || 0), 0);
            
            document.getElementById('totalSales').textContent = totalSales.toFixed(2) + ' د';
            document.getElementById('totalCommission').textContent = totalCommission.toFixed(2) + ' د';
            document.getElementById('invoiceCount').textContent = salesList.length;
        }
        
        // ==================== فلترة الفواتير ====================
        
        window.filterSales = async function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const snapshot = await get(salesRef);
            if (!snapshot.exists()) return;
            
            const data = snapshot.val();
            const filtered = [];
            for (let id in data) {
                const sale = data[id];
                if (sale.invoiceNumber?.toLowerCase().includes(searchTerm) ||
                    sale.mandubName?.toLowerCase().includes(searchTerm) ||
                    sale.customerName?.toLowerCase().includes(searchTerm)) {
                    filtered.push({ id, ...sale });
                }
            }
            
            const tbody = document.getElementById('salesTableBody');
            tbody.innerHTML = '';
            filtered.reverse().forEach(sale => {
                const row = `
                    <tr>
                        <td>${sale.invoiceNumber || sale.id.slice(-6)}</td>
                        <td>${sale.mandubName || '-'}</td>
                        <td>${sale.customerName || 'نقدي'}</td>
                        <td>${sale.total.toFixed(2)} د</td>
                        <td>${sale.commissionRate}%</td>
                        <td class="commission-cell">${(sale.commission || 0).toFixed(2)} د</td>
                        <td class="actions">
                            <button class="btn-sm" onclick='viewInvoice(${JSON.stringify(sale).replace(/'/g, "&apos;")})' style="background:#3498db">👁️ عرض</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }
        
        // ==================== ربط الأحداث ====================
        
        document.getElementById('mandubSelect')?.addEventListener('change', calculateCommission);
        
        // تحميل البيانات عند بدء التشغيل
        async function init() {
            await loadProducts();
            await loadMandubs();
            await loadCustomers();
            loadSalesList();
            
            // تحديث البيانات كل 5 ثواني
            setInterval(async () => {
                await loadProducts();
                await loadMandubs();
                await loadCustomers();
                updateProductSelect();
                updateMandubSelect();
                updateCustomerSelect();
                loadSalesList();
            }, 5000);
        }
        
        init();
        
    </script>
</head>
<body>

<div class="container">
    <h1>🧾 نظام المبيعات المتكامل - مكتب حاج فاضل</h1>
    
    <!-- بطاقات الإحصائيات -->
    <div class="stats-container">
        <div class="stat-card sales">
            <div class="number" id="totalSales">0 د</div>
            <div class="label">إجمالي المبيعات</div>
        </div>
        <div class="stat-card commission">
            <div class="number" id="totalCommission">0 د</div>
            <div class="label">إجمالي العمولات</div>
        </div>
        <div class="stat-card">
            <div class="number" id="invoiceCount">0</div>
            <div class="label">عدد الفواتير</div>
        </div>
    </div>
    
    <!-- نموذج البيع -->
    <div class="form-card">
        <h2>➕ فاتورة مبيعات جديدة</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>👤 المندوب *</label>
                <select id="mandubSelect">
                    <option value="">-- اختر مندوب --</option>
                </select>
            </div>
            <div class="form-group">
                <label>👥 العميل</label>
                <select id="customerSelect">
                    <option value="cash">-- عميل نقدي --</option>
                </select>
            </div>
            <div class="form-group">
                <label>💳 طريقة الدفع</label>
                <select id="paymentMethod">
                    <option value="cash">نقدي</option>
                    <option value="credit">أجل (دين)</option>
                </select>
            </div>
        </div>
        
        <div class="form-grid" style="margin-top: 15px;">
            <div class="form-group">
                <label>📦 المنتج</label>
                <select id="productSelect">
                    <option value="">-- اختر منتج --</option>
                </select>
            </div>
            <div class="form-group">
                <label>🔢 الكمية</label>
                <input type="number" id="productQuantity" value="1" min="1">
            </div>
            <div class="form-group">
                <label>&nbsp;</label>
                <button onclick="addToCart()" style="background:#3498db">➕ إضافة إلى السلة</button>
            </div>
        </div>
        
        <!-- سلة المشتريات -->
        <div style="margin-top: 20px;">
            <h4>🛒 سلة المشتريات</h4>
            <div id="cartItems"></div>
        </div>
        
        <!-- ملخص الفاتورة -->
        <div class="cart-summary" style="margin-top: 15px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>💰 إجمالي الفاتورة:</span>
                <span id="totalAmount">0</span>
            </div>
            <div class="commission-preview">
                <span>💵 العمولة المتوقعة: <span id="commissionAmount">0</span> دينار</span>
                <span style="margin-right: 20px;">(نسبة <span id="commissionRate">0</span>)</span>
            </div>
        </div>
        
        <div style="margin-top: 15px; text-align: center;">
            <button class="btn-save" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
        </div>
    </div>
    
    <!-- شريط البحث -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث عن فاتورة (رقم أو مندوب أو عميل)...">
        <button onclick="filterSales()" style="background:#3498db">بحث</button>
        <button onclick="location.reload()" style="background:#95a5a6">عرض الكل</button>
    </div>
    
    <!-- جدول الفواتير -->
    <table>
        <thead>
            <tr>
                <th>رقم الفاتورة</th>
                <th>المندوب</th>
                <th>العميل</th>
                <th>الإجمالي</th>
                <th>نسبة العمولة</th>
                <th>قيمة العمولة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="salesTableBody">
            <tr><td colspan="7" style="text-align:center;">جاري التحميل...</td></tr>
        </tbody>
    </table>
</div>

<!-- نافذة عرض الفاتورة -->
<div id="invoiceModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3>📄 الفاتورة</h3>
            <span class="close-modal" onclick="closeInvoiceModal()">&times;</span>
        </div>
        <div id="invoiceContent"></div>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="printInvoice()" style="background:#3498db">🖨️ طباعة</button>
            <button onclick="closeInvoiceModal()">إغلاق</button>
        </div>
    </div>
</div>

</body>
</html>
