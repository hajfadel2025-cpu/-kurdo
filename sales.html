<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المبيعات المتكامل | مكتب حاج فاضل</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        /* ===== الوضع المظلم/الفاتح ===== */
        :root {
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --border: #e0e0e0;
            --shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            --gradient-btn: linear-gradient(135deg, #667eea, #764ba2);
        }

        [data-theme="dark"] {
            --bg-card: rgba(30,30,46,0.95);
            --text-primary: #f0f0f0;
            --text-secondary: #aaa;
            --border: #444;
        }

        body.dark {
            background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }

        /* تبويبات */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 28px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        /* الشبكة الرئيسية */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 25px;
            padding: 25px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .card h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
            border-right: 4px solid #667eea;
            padding-right: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--gradient-btn);
            color: white;
            width: 100%;
        }

        .btn-success {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            width: 100%;
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        /* سلة المشتريات */
        .cart-items {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }

        .cart-item-quantity button {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 8px;
        }

        .btn-remove {
            background: #ff4444;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .cart-total {
            padding-top: 15px;
            border-top: 2px solid var(--border);
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .discount-section {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }

        /* التنبيهات */
        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        /* قوائم */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* رسالة واتساب */
        .whatsapp-preview {
            background: #075e5410;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            border: 1px solid #25D366;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 مكتب حاج فاضل | نظام المبيعات المتكامل</h1>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 الوضع المظلم</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('sales')">🧾 المبيعات</button>
            <button class="tab-btn" onclick="showTab('products')">🏪 المنتجات</button>
            <button class="tab-btn" onclick="showTab('reports')">📊 التقارير</button>
        </div>

        <!-- تبويب المبيعات -->
        <div id="salesTab" class="tab-content active">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><h3>📊 عدد الفواتير</h3><div class="number" id="invoiceCount">0</div></div>
                <div class="stat-card"><h3>💰 إجمالي المبيعات</h3><div class="number" id="totalSales">0 د.ع</div></div>
                <div class="stat-card"><h3>🏪 المنتجات</h3><div class="number" id="productCount">0</div></div>
                <div class="stat-card"><h3>👥 العملاء</h3><div class="number" id="customerCount">0</div></div>
            </div>

            <div class="main-grid">
                <div class="card">
                    <h2>🧾 فاتورة جديدة</h2>
                    <div id="alert" class="alert"></div>

                    <div class="form-group">
                        <label>👤 العميل</label>
                        <select id="customerSelect">
                            <option value="">-- اختر عميل --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>💰 طريقة الدفع</label>
                        <select id="paymentMethod">
                            <option value="نقدي">نقدي</option>
                            <option value="أجل">أجل</option>
                            <option value="شبكة">شبكة</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>📦 المنتج</label>
                        <select id="productSelect">
                            <option value="">-- اختر منتج --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>🔢 الكمية</label>
                        <input type="number" id="quantity" value="1" min="1">
                    </div>

                    <button class="btn-primary" onclick="addToCart()">➕ إضافة للسلة</button>
                </div>

                <div class="card">
                    <h2>🛒 سلة المشتريات</h2>
                    <div id="cartItems" class="cart-items"><p style="text-align:center;color:#999;">السلة فارغة</p></div>

                    <div class="discount-section">
                        <label>🎁 خصم</label>
                        <div style="display:flex; gap:10px;">
                            <input type="number" id="discountValue" placeholder="القيمة" style="flex:1;">
                            <select id="discountType" style="width:auto;">
                                <option value="percentage">%</option>
                                <option value="fixed">💰 د.ع</option>
                            </select>
                        </div>
                        <button class="btn-primary" style="margin-top:10px; background:#ff9800;" onclick="applyDiscount()">تطبيق الخصم</button>
                    </div>

                    <div class="cart-total">
                        المجموع: <span id="subTotal">0.00</span> د.ع<br>
                        <span id="discountDisplay" style="color:#ff4444;"></span>
                        <strong>الإجمالي: <span id="cartTotal">0.00</span> د.ع</strong>
                    </div>

                    <button class="btn-success" onclick="saveInvoice()">💾 حفظ الفاتورة وإرسال واتساب</button>
                </div>
            </div>
        </div>

        <!-- تبويب المنتجات (مبسط) -->
        <div id="productsTab" class="tab-content">
            <div class="card">
                <h2>🏪 إدارة المنتجات</h2>
                <div id="productsList"></div>
            </div>
        </div>

        <!-- تبويب التقارير -->
        <div id="reportsTab" class="tab-content">
            <div class="card">
                <h2>📊 التقارير</h2>
                <div id="reportsContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات Firebase - غيّرها إلى إعدادات مشروعك ==========
        const firebaseConfig = {
            apiKey: "AIzaSyDummyExample123456789",  // ⚠️ استبدل هذا بإعدادات Firebase الحقيقية
            authDomain: "your-project.firebaseapp.com",
            projectId: "haji-fadel-accounting",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ========== البيانات ==========
        let inventory = [];
        let cart = [];
        let customers = [];
        let invoices = [];
        let currentDiscount = { value: 0, type: 'percentage' };

        // ========== تحميل البيانات من Firestore ==========
        async function loadData() {
            await loadCustomers();
            await loadProducts();
            await loadInvoices();
            updateStatistics();
            updateCustomerSelect();
            updateProductSelect();
        }

        async function loadCustomers() {
            const snapshot = await db.collection('customers').get();
            customers = [];
            snapshot.forEach(doc => {
                customers.push({ id: doc.id, ...doc.data() });
            });
            document.getElementById('customerCount').innerText = customers.length;
        }

        async function loadProducts() {
            const productsRef = db.collection('products');
            const snapshot = await productsRef.get();
            if (!snapshot.empty) {
                inventory = [];
                snapshot.forEach(doc => {
                    inventory.push({ id: doc.id, ...doc.data() });
                });
            } else {
                // منتجات افتراضية
                inventory = [
                    { id: 'p1', name: 'خبز', price: 600, stock: 50 },
                    { id: 'p2', name: 'حليب', price: 1200, stock: 30 },
                    { id: 'p3', name: 'سكر', price: 800, stock: 25 },
                    { id: 'p4', name: 'رز', price: 1500, stock: 40 },
                ];
                for (const p of inventory) {
                    await db.collection('products').doc(p.id).set(p);
                }
            }
            document.getElementById('productCount').innerText = inventory.length;
            updateProductSelect();
            displayProducts();
        }

        async function loadInvoices() {
            const snapshot = await db.collection('invoices').orderBy('timestamp', 'desc').limit(100).get();
            invoices = [];
            snapshot.forEach(doc => {
                invoices.push({ id: doc.id, ...doc.data() });
            });
        }

        function displayProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            let html = '<table style="width:100%"><tr><th>المنتج</th><th>السعر</th><th>المخزون</th></tr>';
            inventory.forEach(p => {
                html += `<tr><td>${p.name}</td><td>${p.price} د.ع</td><td>${p.stock}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        function updateCustomerSelect() {
            const select = document.getElementById('customerSelect');
            select.innerHTML = '<option value="">-- اختر عميل --</option>';
            customers.forEach(c => {
                select.innerHTML += `<option value="${c.id}" data-name="${c.customerName}" data-phone="${c.phone}" data-debt="${c.totalDebt || 0}">${c.customerName} - رصيد: ${c.totalDebt || 0} د.ع</option>`;
            });
        }

        function updateProductSelect() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">-- اختر منتج --</option>';
            inventory.forEach(p => {
                if (p.stock > 0) {
                    select.innerHTML += `<option value="${p.id}" data-price="${p.price}" data-stock="${p.stock}">${p.name} - ${p.price} د.ع (${p.stock})</option>`;
                }
            });
        }

        // ========== السلة ==========
        function addToCart() {
            const productId = document.getElementById('productSelect').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const product = inventory.find(p => p.id === productId);
            if (!productId || !product) { showAlert('اختر منتجاً', 'error'); return; }
            if (quantity > product.stock) { showAlert(`المتوفر: ${product.stock}`, 'error'); return; }

            const existing = cart.find(i => i.productId === productId);
            if (existing) {
                if (existing.quantity + quantity > product.stock) { showAlert('كمية غير متوفرة', 'error'); return; }
                existing.quantity += quantity;
                existing.total = existing.price * existing.quantity;
            } else {
                cart.push({ productId, name: product.name, price: product.price, quantity, total: product.price * quantity });
            }
            updateCartDisplay();
            document.getElementById('quantity').value = 1;
            showAlert(`تمت الإضافة`, 'success');
        }

        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            let subTotal = 0;
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align:center;">السلة فارغة</p>';
                document.getElementById('subTotal').innerText = '0.00';
                updateTotalWithDiscount();
                return;
            }
            let html = '';
            cart.forEach((item, idx) => {
                subTotal += item.total;
                html += `<div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.price} د.ع</div>
                    <div>الكمية: <button onclick="changeQty(${idx}, -1)">-</button> ${item.quantity} <button onclick="changeQty(${idx}, 1)">+</button></div>
                    <div>${item.total.toFixed(2)} د.ع</div>
                    <button class="btn-remove" onclick="removeFromCart(${idx})">✖</button>
                </div>`;
            });
            container.innerHTML = html;
            document.getElementById('subTotal').innerText = subTotal.toFixed(2);
            updateTotalWithDiscount();
        }

        function changeQty(idx, delta) {
            const newQty = cart[idx].quantity + delta;
            if (newQty < 1) { removeFromCart(idx); return; }
            const product = inventory.find(p => p.id === cart[idx].productId);
            if (newQty > product.stock) { showAlert('الكمية غير متوفرة', 'error'); return; }
            cart[idx].quantity = newQty;
            cart[idx].total = cart[idx].price * newQty;
            updateCartDisplay();
        }

        function removeFromCart(idx) { cart.splice(idx, 1); updateCartDisplay(); }

        function applyDiscount() {
            const val = parseFloat(document.getElementById('discountValue').value);
            if (isNaN(val) || val < 0) { showAlert('أدخل قيمة صحيحة', 'error'); return; }
            currentDiscount = { value: val, type: document.getElementById('discountType').value };
            updateTotalWithDiscount();
            showAlert(`خصم ${val}${currentDiscount.type === 'percentage' ? '%' : ' د.ع'}`, 'success');
        }

        function updateTotalWithDiscount() {
            const sub = parseFloat(document.getElementById('subTotal').innerText);
            let disc = 0;
            if (currentDiscount.type === 'percentage') disc = sub * (currentDiscount.value / 100);
            else disc = currentDiscount.value;
            const final = Math.max(0, sub - disc);
            document.getElementById('cartTotal').innerText = final.toFixed(2);
            document.getElementById('discountDisplay').innerHTML = disc > 0 ? `الخصم: -${disc.toFixed(2)} د.ع<br>` : '';
        }

        // ========== حفظ الفاتورة وإرسال واتساب ==========
        async function saveInvoice() {
            if (cart.length === 0) { showAlert('السلة فارغة', 'error'); return; }
            const customerId = document.getElementById('customerSelect').value;
            if (!customerId) { showAlert('اختر العميل', 'error'); return; }

            const customer = customers.find(c => c.id === customerId);
            const subTotal = parseFloat(document.getElementById('subTotal').innerText);
            let discAmount = 0;
            if (currentDiscount.type === 'percentage') discAmount = subTotal * (currentDiscount.value / 100);
            else discAmount = currentDiscount.value;
            const finalTotal = Math.max(0, subTotal - discAmount);

            // خصم الكميات من المخزون
            for (const item of cart) {
                const product = inventory.find(p => p.id === item.productId);
                if (product) {
                    product.stock -= item.quantity;
                    await db.collection('products').doc(product.id).update({ stock: product.stock });
                }
            }

            const invoice = {
                number: 'INV-' + Date.now(),
                date: new Date().toLocaleString('ar-IQ'),
                customerId: customerId,
                customerName: customer.customerName,
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart.map(i => ({ name: i.name, price: i.price, quantity: i.quantity, total: i.total })),
                subTotal: subTotal,
                discount: { value: currentDiscount.value, type: currentDiscount.type, amount: discAmount },
                total: finalTotal,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection('invoices').add(invoice);
            
            // تحديث دين العميل إذا كان الدفع آجل
            const paymentMethod = document.getElementById('paymentMethod').value;
            if (paymentMethod === 'أجل') {
                const newDebt = (customer.totalDebt || 0) + finalTotal;
                await db.collection('customers').doc(customerId).update({ totalDebt: newDebt });
            }

            // تحديث المخزون محلياً
            updateProductSelect();
            
            // ========== إرسال واتساب ==========
            const phone = customer.phone;
            if (phone) {
                let message = `📄 *فاتورة مكتب حاج فاضل*%0A`;
                message += `📅 التاريخ: ${invoice.date}%0A`;
                message += `👤 العميل: ${customer.customerName}%0A`;
                message += `🧾 رقم الفاتورة: ${invoice.number}%0A`;
                message += `━━━━━━━━━━━━━━%0A`;
                message += `*المنتجات:*%0A`;
                cart.forEach(item => {
                    message += `• ${item.name} x${item.quantity} = ${(item.price * item.quantity).toFixed(2)} د.ع%0A`;
                });
                message += `━━━━━━━━━━━━━━%0A`;
                message += `💰 المجموع: ${subTotal.toFixed(2)} د.ع%0A`;
                if (discAmount > 0) message += `🎁 الخصم: -${discAmount.toFixed(2)} د.ع%0A`;
                message += `💵 *الإجمالي: ${finalTotal.toFixed(2)} د.ع*%0A`;
                message += `💳 طريقة الدفع: ${paymentMethod}%0A`;
                message += `━━━━━━━━━━━━━━%0A`;
                message += `شكراً لتسوقكم مع مكتب حاج فاضل 🌟`;
                
                const whatsappUrl = `https://wa.me/${phone}?text=${message}`;
                window.open(whatsappUrl, '_blank');
                showAlert(`تم فتح واتساب للعميل ${customer.customerName}`, 'success');
            } else {
                showAlert('لا يوجد رقم جوال للعميل', 'error');
            }

            // تفريغ السلة
            cart = [];
            currentDiscount = { value: 0, type: 'percentage' };
            document.getElementById('discountValue').value = '';
            updateCartDisplay();
            await loadInvoices();
            updateStatistics();
            showAlert(`✅ تم حفظ الفاتورة ${invoice.number}`, 'success');
        }

        // ========== إحصائيات ==========
        async function updateStatistics() {
            await loadInvoices();
            let total = 0;
            invoices.forEach(inv => total += inv.total);
            document.getElementById('totalSales').innerText = total.toFixed(2) + ' د.ع';
            document.getElementById('invoiceCount').innerText = invoices.length;
            
            // تقرير مبسط
            const reportsDiv = document.getElementById('reportsContent');
            if (reportsDiv) {
                reportsDiv.innerHTML = `<h3>📈 آخر الفواتير</h3><ul>`;
                invoices.slice(0, 10).forEach(inv => {
                    reportsDiv.innerHTML += `<li>${inv.number} - ${inv.customerName} - ${inv.total} د.ع</li>`;
                });
                reportsDiv.innerHTML += `</ul><p>💰 إجمالي المبيعات: ${total.toFixed(2)} د.ع</p>`;
            }
        }

        // ========== واجهة ==========
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            event.target.classList.add('active');
            if (tab === 'reports') updateStatistics();
        }

        function showAlert(msg, type) {
            const a = document.getElementById('alert');
            a.className = `alert alert-${type}`;
            a.innerText = msg;
            a.style.display = 'block';
            setTimeout(() => a.style.display = 'none', 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.theme-toggle');
            if (document.body.classList.contains('dark')) {
                document.body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '☀️ الوضع الفاتح';
            } else {
                document.body.removeAttribute('data-theme');
                btn.innerHTML = '🌙 الوضع المظلم';
            }
        }

        // بدء التشغيل
        window.onload = () => {
            loadData();
            showAlert('مرحباً بك في نظام المبيعات - واتساب تلقائي', 'success');
        };
    </script>
</body>
</html>
