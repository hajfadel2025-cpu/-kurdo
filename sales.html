<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; border-radius: 20px; padding: 25px; }
        h2 { color: #1e3c72; border-right: 4px solid #3498db; padding-right: 15px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; background: #f8f9fa; padding: 10px; margin: 5px 0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-cart-shopping"></i> فاتورة مبيعات</h2>
    
    <div class="form-grid">
        <select id="customerId"><option value="">اختر العميل</option></select>
        <input type="text" id="invoiceNumber" placeholder="رقم الفاتورة">
        <input type="date" id="invoiceDate">
        <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
    </div>
    
    <div class="form-grid">
        <select id="productId"><option value="">اختر منتج</option></select>
        <input type="number" id="qty" placeholder="الكمية">
        <input type="number" id="price" placeholder="سعر البيع">
        <button onclick="addToCart()">➕ إضافة</button>
    </div>
    
    <h3>سلة المبيعات</h3>
    <div id="cartList"></div>
    <h3>الإجمالي: <span id="totalAmount">0.00</span> د.ع</h3>
    <button onclick="saveSale()">💾 حفظ فاتورة البيع</button>
    
    <h3>سجل فواتير المبيعات</h3>
    <table id="salesTable"><thead><tr><th>رقم</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th></tr></thead><tbody></tbody></table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let cart = [];
    let products = [];
    let customers = [];
    
    auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; else loadData(); });
    
    async function loadData() {
        await loadCustomers();
        await loadProducts();
        await loadSales();
    }
    
    async function loadCustomers() {
        const snapshot = await db.collection('customers').get();
        customers = [];
        let html = '<option value="">اختر العميل</option>';
        snapshot.forEach(doc => { customers.push({ id: doc.id, ...doc.data() }); html += `<option value="${doc.id}">${doc.data().customerName}</option>`; });
        document.getElementById('customerId').innerHTML = html;
    }
    
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        products = [];
        let html = '<option value="">اختر منتج</option>';
        snapshot.forEach(doc => { products.push({ id: doc.id, ...doc.data() }); html += `<option value="${doc.id}">${doc.data().itemName} (المتبقي: ${doc.data().quantity || 0})</option>`; });
        document.getElementById('productId').innerHTML = html;
    }
    
    window.addToCart = () => {
        const productId = document.getElementById('productId').value;
        const product = products.find(p => p.id === productId);
        if (!product) return alert('اختر منتج');
        const qty = parseInt(document.getElementById('qty').value);
        const price = parseFloat(document.getElementById('price').value);
        if (!qty || !price) return alert('أدخل الكمية والسعر');
        if (qty > (product.quantity || 0)) return alert(`الكمية المطلوبة أكبر من المتوفر (المتوفر: ${product.quantity})`);
        cart.push({ productId, name: product.itemName, qty, price, total: qty * price });
        renderCart();
    };
    
    function renderCart() {
        let html = '';
        let total = 0;
        cart.forEach((item, i) => {
            total += item.total;
            html += `<div class="cart-item"><span>${item.name} x ${item.qty}</span><span>${item.total.toFixed(2)} د.ع</span><button onclick="removeItem(${i})">❌</button></div>`;
        });
        document.getElementById('cartList').innerHTML = html;
        document.getElementById('totalAmount').innerText = total.toFixed(2);
    }
    
    window.removeItem = (i) => { cart.splice(i,1); renderCart(); };
    
    window.saveSale = async () => {
        const customerId = document.getElementById('customerId').value;
        if (!customerId || cart.length === 0) return alert('اختر عميل وأضف منتجات');
        const total = cart.reduce((s,i)=>s+i.total,0);
        const batch = db.batch();
        
        // 1. خصم الكمية من المخزن
        for (let item of cart) {
            const productRef = db.collection('inventory').doc(item.productId);
            const docSnap = await productRef.get();
            const oldQty = docSnap.data().quantity || 0;
            batch.update(productRef, { quantity: oldQty - item.qty });
        }
        
        // 2. تحديث رصيد العميل (دين)
        const customerRef = db.collection('customers').doc(customerId);
        const custSnap = await customerRef.get();
        const oldDebt = custSnap.data().totalDebt || 0;
        const paymentMethod = document.getElementById('paymentMethod').value;
        if (paymentMethod === 'أجل') {
            batch.update(customerRef, { totalDebt: oldDebt + total });
        }
        
        // 3. حفظ فاتورة البيع
        const saleRef = db.collection('sales').doc();
        batch.set(saleRef, {
            customerId, customerName: customers.find(c=>c.id===customerId).customerName,
            date: document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0],
            invoiceNumber: document.getElementById('invoiceNumber').value,
            paymentMethod: paymentMethod,
            items: cart, total, timestamp: new Date()
        });
        
        await batch.commit();
        alert('تم حفظ فاتورة البيع وتحديث المخزن');
        cart = []; renderCart();
        loadProducts(); loadSales();
    };
    
    async function loadSales() {
        const snapshot = await db.collection('sales').orderBy('timestamp','desc').get();
        let html = '';
        snapshot.forEach(doc => {
            const s = doc.data();
            html += `<tr><td>${s.invoiceNumber||'-'}</td><td>${s.customerName}</td><td>${s.date}</td><td>${s.total.toFixed(2)}</td></tr>`;
        });
        document.querySelector('#salesTable tbody').innerHTML = html;
    }
</script>
</body>
</html>
