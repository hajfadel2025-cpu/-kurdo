<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#0c1445,#1a2a6c);padding:20px;min-height:100vh}
        .container{max-width:1200px;margin:auto;background:white;border-radius:25px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
        h2{color:#0c1445;border-right:4px solid #f39c12;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        .form-group label{display:block;font-size:12px;color:#495057;margin-bottom:5px;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #e9ecef;border-radius:10px;font-size:14px}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#667eea}
        button{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;font-size:14px}
        button:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.2)}
        .btn-success{background:#27ae60;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-primary{background:#667eea;color:white}
        .btn-sm{padding:5px 12px;font-size:11px}
        .cart-item{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #eee;flex-wrap:wrap;gap:10px;align-items:center;background:white;border-radius:8px;margin-bottom:5px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th,td{padding:10px;text-align:center;border-bottom:1px solid #eee}
        th{background:#0c1445;color:white}
        tr:hover{background:#f8f9fa}
        .badge{padding:4px 12px;border-radius:20px;font-size:11px;display:inline-block}
        .badge-success{background:#d4edda;color:#155724}
        .badge-warning{background:#fff3cd;color:#856404}
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .filter-bar input,.filter-bar select{padding:10px;border:2px solid #e9ecef;border-radius:10px;flex:1;min-width:150px}
        .table-wrapper{overflow-x:auto;border-radius:15px;border:1px solid #e9ecef}
        .stock-good{color:#27ae60;font-weight:bold}
        .stock-warning{color:#e74c3c;font-weight:bold}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-shopping-cart"></i> المبيعات</h2>
    
    <!-- فاتورة جديدة -->
    <div class="form-card">
        <h3 id="formTitle">➕ فاتورة جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>👤 العميل</label>
                <select id="customerId"><option value="">-- اختر عميل --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
            <div class="form-group"><label>💳 طريقة الدفع</label>
                <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
            </div>
        </div>
        <input type="hidden" id="editInvoiceId">
        <button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;background:#e67e22;margin-top:10px;">❌ إلغاء</button>
    </div>
    
    <!-- إضافة منتج -->
    <div class="form-card">
        <h3>➕ إضافة منتج</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر البيع</label><input type="number" id="salePrice" step="0.01"></div>
        </div>
        <div style="margin-top:10px;font-size:14px;"><span id="stockDisplay">📊 المخزون: <span class="stock-good">0</span></span></div>
        <button onclick="addToCart()" style="margin-top:15px;background:#667eea;color:white;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <!-- السلة -->
    <h3>🛒 السلة <span id="cartCount">(0)</span></h3>
    <div id="cart" style="max-height:200px;overflow-y:auto;margin-bottom:15px;border:1px solid #eee;border-radius:12px;padding:10px;"></div>
    <div style="margin:15px 0;padding:15px;background:#f8f9fa;border-radius:12px;">
        <strong>الإجمالي: <span id="cartTotal" style="font-size:22px;color:#27ae60;">0.00</span> د.ع</strong>
    </div>
    
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
        <button onclick="saveSale()" class="btn-success"><i class="fas fa-save"></i> حفظ</button>
        <button onclick="exportExcel()" class="btn-info"><i class="fas fa-file-excel"></i> Excel</button>
    </div>
    
    <!-- بحث -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث...">
        <select id="paymentFilter"><option value="all">الكل</option><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
    </div>
    
    <!-- سجل المبيعات -->
    <h3>📋 سجل المبيعات</h3>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>#</th><th>التاريخ</th><th>رقم</th><th>العميل</th><th>المبلغ</th><th>الدفع</th><th>إجراءات</th></tr></thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [], allCustomers = [], allSales = [];
    let cart = [], editingId = null;
    
    // التحقق من تسجيل الدخول
    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "login.html";
        } else {
            console.log("✅ مستخدم مسجل:", user.email);
            loadAllData();
        }
    });
    
    // جلب جميع البيانات
    async function loadAllData() {
        await loadProducts();
        await loadCustomers();
        await loadSales();
    }
    
    // ========== جلب المنتجات ==========
    async function loadProducts() {
        try {
            const snapshot = await db.collection('inventory').get();
            allProducts = [];
            snapshot.forEach(doc => {
                allProducts.push({ id: doc.id, ...doc.data() });
            });
            console.log("✅ تم جلب المنتجات:", allProducts.length);
            
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">-- اختر منتج --</option>';
            allProducts.forEach(p => {
                const stock = p.quantity || 0;
                select.innerHTML += `<option value="${p.id}" data-price="${p.sellingPrice || 0}" data-stock="${stock}">${p.itemName || p.name} (${stock})</option>`;
            });
            
            document.getElementById('productSelect').onchange = function() {
                const price = this.options[this.selectedIndex]?.getAttribute('data-price') || 0;
                const stock = this.options[this.selectedIndex]?.getAttribute('data-stock') || 0;
                document.getElementById('salePrice').value = price;
                document.getElementById('stockDisplay').innerHTML = `📊 المخزون: <span class="${stock <= 0 ? 'stock-warning' : 'stock-good'}">${stock}</span>`;
            };
        } catch(e) {
            console.error("❌ خطأ في جلب المنتجات:", e);
        }
    }
    
    // ========== جلب العملاء ==========
    async function loadCustomers() {
        try {
            const snapshot = await db.collection('customers').get();
            allCustomers = [];
            let html = '<option value="">-- اختر عميل --</option>';
            snapshot.forEach(doc => {
                allCustomers.push({ id: doc.id, ...doc.data() });
                html += `<option value="${doc.id}">${doc.data().customerName || doc.data().name}</option>`;
            });
            document.getElementById('customerId').innerHTML = html;
            console.log("✅ تم جلب العملاء:", allCustomers.length);
        } catch(e) {
            console.error("❌ خطأ في جلب العملاء:", e);
        }
    }
    
    // ========== إضافة للسلة ==========
    window.addToCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return alert('❌ اختر منتجاً');
        
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('salePrice').value);
        if (!qty || qty <= 0) return alert('❌ أدخل كمية صحيحة');
        if (!price || price <= 0) return alert('❌ أدخل سعر بيع صحيح');
        
        const stock = product.quantity || 0;
        if (stock === 0) return alert('❌ المنتج غير متوفر في المخزن');
        if (qty > stock) return alert(`⚠️ الكمية غير متوفرة\nالمتوفر: ${stock}`);
        
        const existing = cart.find(i => i.productId === productId);
        if (existing) {
            if (existing.quantity + qty > stock) {
                return alert(`⚠️ الكمية الإجمالية (${existing.quantity + qty}) أكبر من المتوفرة (${stock})`);
            }
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            cart.push({
                productId,
                name: product.itemName || product.name,
                price,
                quantity: qty,
                total: price * qty
            });
        }
        renderCart();
        document.getElementById('quantity').value = '1';
    };
    
    // عرض السلة
    function renderCart() {
        const container = document.getElementById('cart');
        let total = 0;
        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">السلة فارغة</p>';
            document.getElementById('cartTotal').innerText = '0.00';
            document.getElementById('cartCount').innerText = '(0)';
            return;
        }
        let html = '';
        cart.forEach((item, idx) => {
            total += item.total;
            html += `<div class="cart-item">
                <div><strong>${item.name}</strong> × ${item.quantity}</div>
                <div>${item.price.toFixed(2)} د.ع</div>
                <div style="font-weight:bold;color:#1a2a6c;">${item.total.toFixed(2)} د.ع</div>
                <div>
                    <button onclick="changeQty(${idx}, -1)" class="btn-sm" style="background:#3498db;color:white;">-</button>
                    <button onclick="changeQty(${idx}, 1)" class="btn-sm" style="background:#3498db;color:white;">+</button>
                    <button onclick="removeFromCart(${idx})" class="btn-sm" style="background:#e74c3c;color:white;">✖</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerText = total.toFixed(2);
        document.getElementById('cartCount').innerText = `(${cart.length})`;
    }
    
    window.changeQty = (idx, delta) => {
        const newQty = cart[idx].quantity + delta;
        if (newQty < 1) { removeFromCart(idx); return; }
        const product = allProducts.find(p => p.id === cart[idx].productId);
        if (product && newQty > (product.quantity || 0)) {
            alert(`⚠️ الكمية غير متوفرة، المتوفر: ${product.quantity}`);
            return;
        }
        cart[idx].quantity = newQty;
        cart[idx].total = cart[idx].price * newQty;
        renderCart();
    };
    
    window.removeFromCart = (idx) => {
        cart.splice(idx, 1);
        renderCart();
    };
    
    // ========== حفظ الفاتورة ==========
    window.saveSale = async () => {
        const customerId = document.getElementById('customerId').value;
        const customer = allCustomers.find(c => c.id === customerId);
        if (!customerId) return alert('❌ اختر العميل');
        if (cart.length === 0) return alert('❌ لا توجد منتجات');
        
        const total = cart.reduce((s, i) => s + i.total, 0);
        try {
            const batch = db.batch();
            for (const item of cart) {
                const productRef = db.collection('inventory').doc(item.productId);
                const docSnap = await productRef.get();
                const oldQty = docSnap.data().quantity || 0;
                batch.update(productRef, { quantity: oldQty - item.quantity });
            }
            
            if (document.getElementById('paymentMethod').value === 'أجل') {
                const custRef = db.collection('customers').doc(customerId);
                const custSnap = await custRef.get();
                batch.update(custRef, { totalDebt: (custSnap.data().totalDebt || 0) + total });
            }
            
            const saleRef = editingId ? db.collection('sales').doc(editingId) : db.collection('sales').doc();
            const data = {
                customerId,
                customerName: customer?.customerName || customer?.name || '',
                invoiceNumber: document.getElementById('invoiceNumber').value || 'INV-' + Date.now(),
                date: document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0],
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart,
                total,
                timestamp: new Date()
            };
            
            if (editingId) {
                await saleRef.update({ ...data, updatedAt: new Date() });
                alert('✅ تم تحديث الفاتورة');
                cancelEdit();
            } else {
                await saleRef.set(data);
                alert('✅ تم حفظ الفاتورة');
            }
            
            cart = [];
            renderCart();
            document.getElementById('customerId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceDate').value = '';
            await loadProducts();
            await loadSales();
        } catch (error) {
            alert('❌ خطأ: ' + error.message);
        }
    };
    
    // ========== تحميل المبيعات ==========
    async function loadSales() {
        try {
            const snapshot = await db.collection('sales').orderBy('timestamp', 'desc').get();
            allSales = [];
            snapshot.forEach(doc => allSales.push({ id: doc.id, ...doc.data() }));
            
            const search = document.getElementById('searchInput').value.toLowerCase();
            const paymentFilter = document.getElementById('paymentFilter').value;
            let filtered = allSales;
            if (search) {
                filtered = filtered.filter(s =>
                    (s.invoiceNumber || '').toLowerCase().includes(search) ||
                    (s.customerName || '').toLowerCase().includes(search)
                );
            }
            if (paymentFilter !== 'all') {
                filtered = filtered.filter(s => s.paymentMethod === paymentFilter);
            }
            
            const tbody = document.getElementById('salesBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7">لا توجد مبيعات</td></tr>';
                return;
            }
            
            let html = '';
            filtered.forEach((s, idx) => {
                html += `<tr>
                    <td>${idx + 1}</td>
                    <td>${s.date || '-'}</td>
                    <td>${s.invoiceNumber || '-'}</td>
                    <td>${s.customerName || '-'}</td>
                    <td>${(s.total || 0).toFixed(2)}</td>
                    <td><span class="badge ${s.paymentMethod === 'نقدي' ? 'badge-success' : 'badge-warning'}">${s.paymentMethod || '-'}</span></td>
                    <td>
                        <button class="btn-sm btn-warning" onclick="editInvoice('${s.id}')">✏️</button>
                        <button class="btn-sm btn-danger" onclick="deleteInvoice('${s.id}')">🗑️</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        } catch(e) {
            console.error("❌ خطأ في جلب المبيعات:", e);
        }
    }
    
    // ========== تعديل الفاتورة ==========
    window.editInvoice = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        editingId = id;
        document.getElementById('customerId').value = invoice.customerId || '';
        document.getElementById('invoiceNumber').value = invoice.invoiceNumber || '';
        document.getElementById('invoiceDate').value = invoice.date || '';
        document.getElementById('paymentMethod').value = invoice.paymentMethod || 'نقدي';
        cart = invoice.items.map(item => ({ ...item }));
        renderCart();
        document.getElementById('formTitle').innerHTML = '✏️ تعديل فاتورة';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    window.cancelEdit = () => {
        editingId = null;
        cart = [];
        renderCart();
        document.getElementById('formTitle').innerHTML = '➕ فاتورة جديدة';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('customerId').value = '';
        document.getElementById('invoiceNumber').value = '';
        document.getElementById('invoiceDate').value = '';
    };
    
    // ========== حذف الفاتورة ==========
    window.deleteInvoice = async (id) => {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذه الفاتورة؟')) return;
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        try {
            if (invoice.items) {
                for (const item of invoice.items) {
                    const productRef = db.collection('inventory').doc(item.productId);
                    const docSnap = await productRef.get();
                    if (docSnap.exists) {
                        await productRef.update({ quantity: (docSnap.data().quantity || 0) + item.quantity });
                    }
                }
            }
            if (invoice.paymentMethod === 'أجل' && invoice.customerId) {
                const customerRef = db.collection('customers').doc(invoice.customerId);
                const custSnap = await customerRef.get();
                if (custSnap.exists) {
                    await customerRef.update({ totalDebt: (custSnap.data().totalDebt || 0) - (invoice.total || 0) });
                }
            }
            await db.collection('sales').doc(id).delete();
            alert('✅ تم حذف الفاتورة');
            loadSales();
        } catch (error) {
            alert('❌ خطأ: ' + error.message);
        }
    };
    
    // ========== تصدير Excel ==========
    window.exportExcel = () => {
        if (allSales.length === 0) return alert('لا توجد بيانات للتصدير');
        let csv = 'رقم الفاتورة,التاريخ,العميل,المبلغ\n';
        allSales.forEach(s => {
            csv += `${s.invoiceNumber || ''},${s.date || ''},${s.customerName || ''},${(s.total || 0).toFixed(2)}\n`;
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `المبيعات_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        alert('✅ تم التصدير');
    };
    
    // ========== البحث ==========
    document.getElementById('searchInput').addEventListener('input', loadSales);
    document.getElementById('paymentFilter').addEventListener('change', loadSales);
</script>
</body>
</html>
