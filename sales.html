<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#0c1445,#1a2a6c);padding:20px;min-height:100vh}
        .container{max-width:1400px;margin:auto;background:white;border-radius:25px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
        h2{color:#0c1445;border-right:4px solid #f39c12;padding-right:15px;margin-bottom:20px;font-size:24px}
        
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px;border:1px solid #e9ecef}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        .form-group label{display:block;font-size:12px;color:#495057;margin-bottom:5px;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #e9ecef;border-radius:10px;font-size:14px}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#667eea}
        
        .cart-item{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #e9ecef;flex-wrap:wrap;gap:10px;align-items:center;background:white;border-radius:8px;margin-bottom:5px}
        
        .table-wrapper{overflow-x:auto;border-radius:15px;border:1px solid #e9ecef}
        table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px}
        th,td{padding:12px 10px;text-align:center;border-bottom:1px solid #e9ecef}
        th{background:#0c1445;color:white;font-weight:600;position:sticky;top:0;z-index:10}
        tr:hover{background:#f8f9fa}
        
        button{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;font-size:14px}
        button:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.2)}
        .btn-success{background:#27ae60;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-primary{background:#667eea;color:white}
        .btn-sm{padding:5px 12px;font-size:11px}
        .btn-purple{background:#9b59b6;color:white}
        
        .badge{padding:4px 12px;border-radius:20px;font-size:11px;display:inline-block}
        .badge-success{background:#d4edda;color:#155724}
        .badge-warning{background:#fff3cd;color:#856404}
        
        .stock-good{color:#27ae60;font-weight:bold}
        .stock-warning{color:#e74c3c;font-weight:bold}
        
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .filter-bar input,.filter-bar select{padding:10px 15px;border:2px solid #e9ecef;border-radius:10px;flex:1;min-width:150px;font-size:14px}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;border-radius:25px;width:95%;max-width:600px;max-height:90vh;overflow-y:auto;padding:30px;animation:slideDown 0.3s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:2px solid #f39c12;padding-bottom:15px}
        .close-modal{cursor:pointer;font-size:28px;color:#999}
        .close-modal:hover{color:#e74c3c}
        
        .total-amount{font-size:22px;color:#27ae60;font-weight:bold}
        .discount-amount{color:#f39c12;font-weight:bold}
        .net-amount{font-size:22px;color:#0c1445;font-weight:bold}
        
        @media(max-width:768px){th,td{font-size:11px;padding:8px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-shopping-cart"></i> نظام المبيعات</h2>
    
    <!-- نموذج فاتورة جديدة -->
    <div class="form-card">
        <h3 id="formTitle"><i class="fas fa-plus-circle" style="color:#27ae60;"></i> فاتورة مبيعات جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>👤 العميل</label>
                <select id="customerId"><option value="">-- اختر عميل --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
            <div class="form-group"><label>💳 طريقة الدفع</label>
                <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
            </div>
        </div>
        <div class="form-grid" style="margin-top:15px;">
            <div class="form-group"><label>🏷️ خصم (%)</label><input type="number" id="discountPercent" value="0" min="0" max="100"></div>
            <div class="form-group"><label>📝 ملاحظات</label><input type="text" id="notes" placeholder="ملاحظات"></div>
        </div>
        <input type="hidden" id="editInvoiceId">
        <button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;background:#e67e22;margin-top:10px;">❌ إلغاء التعديل</button>
    </div>
    
    <!-- إضافة منتج -->
    <div class="form-card">
        <h3><i class="fas fa-box" style="color:#3498db;"></i> إضافة منتج</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر البيع</label><input type="number" id="salePrice" step="0.01"></div>
        </div>
        <div style="margin-top:10px;font-size:14px;"><span id="stockDisplay">📊 المخزون: <span class="stock-good">0</span></span></div>
        <button onclick="addToCart()" style="margin-top:15px;background:#667eea;color:white;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <!-- السلة -->
    <h3>🛒 السلة <span id="cartCount">(0)</span></h3>
    <div id="cart" style="max-height:250px;overflow-y:auto;margin-bottom:15px;border:2px dashed #e9ecef;border-radius:12px;padding:10px;background:#fafafa;"></div>
    <div style="margin:15px 0;padding:15px;background:#f8f9fa;border-radius:12px;display:flex;flex-wrap:wrap;gap:25px;justify-content:space-between;">
        <div><strong>الإجمالي:</strong> <span id="cartTotal" class="total-amount">0.00</span> د.ع</div>
        <div><strong>الخصم:</strong> <span id="cartDiscount" class="discount-amount">0.00</span></div>
        <div><strong>الصافي:</strong> <span id="cartNet" class="net-amount">0.00</span> د.ع</div>
    </div>
    
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
        <button onclick="saveSale()" class="btn-success"><i class="fas fa-save"></i> حفظ</button>
        <button onclick="printInvoice()" class="btn-primary"><i class="fas fa-print"></i> طباعة</button>
        <button onclick="showReturnModal()" class="btn-purple"><i class="fas fa-undo"></i> مرتجع</button>
        <button onclick="showPaymentModal()" class="btn-warning"><i class="fas fa-hand-holding-usd"></i> تحصيل دين</button>
        <button onclick="exportExcel()" class="btn-info"><i class="fas fa-file-excel"></i> Excel</button>
    </div>
    
    <!-- بحث -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث...">
        <select id="paymentFilter"><option value="all">الكل</option><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
    </div>
    
    <!-- سجل المبيعات -->
    <h3>📋 سجل المبيعات</h3>
    <div class="table-wrapper">
        <table>
            <thead><tr><th>#</th><th>التاريخ</th><th>رقم</th><th>العميل</th><th>الإجمالي</th><th>الخصم</th><th>الصافي</th><th>الدفع</th><th>إجراءات</th></tr></thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>
</div>

<!-- نافذة مرتجع -->
<div id="returnModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3><i class="fas fa-undo" style="color:#e74c3c;"></i> مرتجع مبيعات</h3><span class="close-modal" onclick="closeReturnModal()">&times;</span></div>
        <div class="form-group"><label>📞 رقم الفاتورة</label>
            <select id="returnInvoiceId"><option value="">-- اختر فاتورة --</option></select>
        </div>
        <div class="form-group"><label>📝 سبب المرتجع</label><input type="text" id="returnReason" placeholder="سبب المرتجع"></div>
        <button onclick="processReturn()" class="btn-danger" style="width:100%;"><i class="fas fa-undo"></i> تنفيذ المرتجع</button>
    </div>
</div>

<!-- نافذة تحصيل دين -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3><i class="fas fa-hand-holding-usd" style="color:#f39c12;"></i> تحصيل دين</h3><span class="close-modal" onclick="closePaymentModal()">&times;</span></div>
        <div class="form-group"><label>👤 العميل</label>
            <select id="paymentCustomerId"><option value="">-- اختر عميل --</option></select>
        </div>
        <div class="form-group"><label>💰 المبلغ</label><input type="number" id="paymentAmount" step="0.01"></div>
        <div class="form-group"><label>📝 البيان</label><input type="text" id="paymentNote" placeholder="بيان السداد"></div>
        <button onclick="processPayment()" class="btn-success" style="width:100%;"><i class="fas fa-save"></i> تسجيل السداد</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts=[], allCustomers=[], allSales=[];
    let cart=[], editingId=null;
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else {loadAll();}});
    
    async function loadAll(){
        await loadProducts();
        await loadCustomers();
        await loadSales();
        await updateReturnInvoices();
    }
    
    // ===== جلب المنتجات =====
   async function loadProducts() {
    try {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
        
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        
        if (allProducts.length === 0) {
            select.innerHTML = '<option value="">⚠️ لا توجد منتجات</option>';
        } else {
            allProducts.forEach(p => {
                const stock = p.quantity || 0;
                select.innerHTML += `<option value="${p.id}" data-price="${p.sellingPrice||0}" data-stock="${stock}">${p.itemName||p.name} (${stock})</option>`;
            });
        }
    } catch(e) {
        console.error('خطأ:', e);
        alert('خطأ في جلب المنتجات: ' + e.message);
    }
}
    
    // ===== جلب العملاء =====
    async function loadCustomers(){
        const snapshot=await db.collection('customers').get();
        allCustomers=[]; let html='<option value="">-- اختر عميل --</option>';
        snapshot.forEach(d=>{allCustomers.push({id:d.id,...d.data()}); html+=`<option value="${d.id}">${d.data().customerName||d.data().name}</option>`;});
        document.getElementById('customerId').innerHTML=html;
        let ph='<option value="">-- اختر عميل --</option>';
        allCustomers.forEach(c=>ph+=`<option value="${c.id}">${c.customerName||c.name}</option>`);
        document.getElementById('paymentCustomerId').innerHTML=ph;
    }
    
    // ===== إضافة للسلة =====
    window.addToCart=()=>{
        const productId=document.getElementById('productSelect').value;
        const product=allProducts.find(p=>p.id===productId);
        if(!product) return alert('اختر منتجاً');
        const qty=parseInt(document.getElementById('quantity').value);
        const price=parseFloat(document.getElementById('salePrice').value);
        if(!qty||qty<=0) return alert('أدخل كمية');
        if(!price||price<=0) return alert('أدخل سعر');
        const stock=product.quantity||0;
        if(stock===0) return alert('المنتج غير متوفر');
        if(qty>stock) return alert(`المتوفر: ${stock}`);
        const existing=cart.find(i=>i.productId===productId);
        if(existing){
            if(existing.quantity+qty>stock) return alert(`المتوفر: ${stock}`);
            existing.quantity+=qty;
            existing.total=existing.price*existing.quantity;
        }else{
            cart.push({productId,name:product.itemName||product.name,price,quantity:qty,total:price*qty});
        }
        renderCart();
        document.getElementById('quantity').value='1';
    };
    
    function renderCart(){
        const container=document.getElementById('cart');
        let total=0;
        if(cart.length===0){container.innerHTML='<p style="text-align:center;color:#999;padding:20px;">السلة فارغة</p>'; updateCartTotals(0,0,0); return;}
        let html='';
        cart.forEach((item,idx)=>{
            total+=item.total;
            html+=`<div class="cart-item">
                <div><strong>${item.name}</strong> × ${item.quantity}</div>
                <div>${item.price.toFixed(2)} د.ع</div>
                <div style="font-weight:bold;color:#1a2a6c;">${item.total.toFixed(2)} د.ع</div>
                <div>
                    <button onclick="changeQty(${idx},-1)" class="btn-sm" style="background:#3498db;color:white;">-</button>
                    <button onclick="changeQty(${idx},1)" class="btn-sm" style="background:#3498db;color:white;">+</button>
                    <button onclick="removeFromCart(${idx})" class="btn-sm" style="background:#e74c3c;color:white;">✖</button>
                </div>
            </div>`;
        });
        container.innerHTML=html;
        const discount=parseFloat(document.getElementById('discountPercent').value)||0;
        const discAmount=total*(discount/100);
        updateCartTotals(total,discAmount,total-discAmount);
        document.getElementById('cartCount').innerText=`(${cart.length})`;
    }
    
    function updateCartTotals(total,disc,net){
        document.getElementById('cartTotal').innerText=total.toFixed(2);
        document.getElementById('cartDiscount').innerText=disc.toFixed(2);
        document.getElementById('cartNet').innerText=net.toFixed(2);
    }
    
    window.changeQty=(idx,delta)=>{
        const newQty=cart[idx].quantity+delta;
        if(newQty<1){removeFromCart(idx); return;}
        const product=allProducts.find(p=>p.id===cart[idx].productId);
        if(product && newQty>(product.quantity||0)){alert(`المتوفر: ${product.quantity}`); return;}
        cart[idx].quantity=newQty;
        cart[idx].total=cart[idx].price*newQty;
        renderCart();
    };
    window.removeFromCart=(idx)=>{cart.splice(idx,1); renderCart();};
    window.clearCart=()=>{if(confirm('تفريغ السلة؟')){cart=[]; renderCart();}};
    document.getElementById('discountPercent').addEventListener('input',renderCart);
    
    // ===== حفظ الفاتورة =====
    window.saveSale=async()=>{
        const customerId=document.getElementById('customerId').value;
        const customer=allCustomers.find(c=>c.id===customerId);
        if(!customerId) return alert('اختر العميل');
        if(cart.length===0) return alert('لا توجد منتجات');
        const total=cart.reduce((s,i)=>s+i.total,0);
        const discount=parseFloat(document.getElementById('discountPercent').value)||0;
        const discAmount=total*(discount/100);
        const netTotal=total-discAmount;
        try{
            const batch=db.batch();
            for(const item of cart){
                const productRef=db.collection('inventory').doc(item.productId);
                const docSnap=await productRef.get();
                batch.update(productRef,{quantity:(docSnap.data().quantity||0)-item.quantity});
            }
            if(document.getElementById('paymentMethod').value==='أجل'){
                const custRef=db.collection('customers').doc(customerId);
                const custSnap=await custRef.get();
                batch.update(custRef,{totalDebt:(custSnap.data().totalDebt||0)+netTotal});
            }
            const saleRef=editingId?db.collection('sales').doc(editingId):db.collection('sales').doc();
            const data={
                customerId,customerName:customer?.customerName||customer?.name||'',
                invoiceNumber:document.getElementById('invoiceNumber').value||'INV-'+Date.now(),
                date:document.getElementById('invoiceDate').value||new Date().toISOString().split('T')[0],
                paymentMethod:document.getElementById('paymentMethod').value,
                discountPercent:discount,discountAmount:discAmount,total,netTotal,
                items:cart,notes:document.getElementById('notes').value,
                timestamp:new Date()
            };
            if(editingId){await saleRef.update({...data,updatedAt:new Date()}); alert('تم التحديث'); cancelEdit();}
            else{await saleRef.set(data); alert('تم حفظ الفاتورة');}
            cart=[]; renderCart();
            document.getElementById('customerId').value='';
            document.getElementById('invoiceNumber').value='';
            document.getElementById('invoiceDate').value='';
            document.getElementById('notes').value='';
            document.getElementById('discountPercent').value='0';
            await loadProducts(); await loadSales();
        }catch(error){alert('خطأ: '+error.message);}
    };
    
    // ===== طباعة =====
    window.printInvoice=()=>{
        if(cart.length===0) return alert('لا توجد منتجات');
        const total=cart.reduce((s,i)=>s+i.total,0);
        const discount=parseFloat(document.getElementById('discountPercent').value)||0;
        const discAmount=total*(discount/100);
        const netTotal=total-discAmount;
        let html=`<html dir="rtl"><head><title>فاتورة</title>
            <style>body{font-family:'Cairo';padding:30px}table{width:100%;border-collapse:collapse;margin:15px 0}th,td{border:1px solid #ddd;padding:8px;text-align:center}
            .header{text-align:center;margin-bottom:20px}.total{font-weight:bold;font-size:18px;color:#27ae60}</style>
            </head><body><div class="header"><h2>مكتب حاج فاضل</h2><p>فاتورة مبيعات</p>
            <p>رقم: ${document.getElementById('invoiceNumber').value||'INV-'+Date.now()}</p>
            <p>التاريخ: ${document.getElementById('invoiceDate').value||new Date().toLocaleDateString('ar-EG')}</p>
            <p>العميل: ${document.getElementById('customerId').selectedOptions[0]?.text||'-'}</p>
            <p>طريقة الدفع: ${document.getElementById('paymentMethod').value}</p></div>
            <table><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>`;
        cart.forEach(i=>html+=`<tr><td>${i.name}</td><td>${i.quantity}</td><td>${i.price.toFixed(2)}</td><td>${i.total.toFixed(2)}</td></tr>`);
        html+=`</tbody></table>
            <div><strong>الإجمالي:</strong> ${total.toFixed(2)} د.ع</div>
            <div><strong>الخصم:</strong> ${discAmount.toFixed(2)} د.ع</div>
            <div class="total"><strong>الصافي:</strong> ${netTotal.toFixed(2)} د.ع</div>
            <div style="text-align:center;margin-top:20px;">شكراً لتعاملكم معنا</div>
            </body></html>`;
        const win=window.open('','_blank');
        win.document.write(html);
        win.document.close();
        setTimeout(()=>win.print(),500);
    };
    
    // ===== مرتجع =====
    window.showReturnModal=()=>{updateReturnInvoices(); document.getElementById('returnModal').style.display='flex';};
    window.closeReturnModal=()=>{document.getElementById('returnModal').style.display='none';};
    
    async function updateReturnInvoices(){
        const snapshot=await db.collection('sales').orderBy('timestamp','desc').get();
        const select=document.getElementById('returnInvoiceId');
        select.innerHTML='<option value="">-- اختر فاتورة --</option>';
        snapshot.forEach(d=>{
            const s=d.data();
            select.innerHTML+=`<option value="${d.id}">${s.invoiceNumber} - ${s.customerName} (${(s.netTotal||s.total||0).toFixed(2)})</option>`;
        });
    }
    
    window.processReturn=async()=>{
        const invoiceId=document.getElementById('returnInvoiceId').value;
        const reason=document.getElementById('returnReason').value.trim();
        if(!invoiceId) return alert('اختر فاتورة');
        const invoice=allSales.find(s=>s.id===invoiceId);
        if(!invoice) return alert('الفاتورة غير موجودة');
        if(!confirm(`مرتجع فاتورة ${invoice.invoiceNumber}؟`)) return;
        try{
            const batch=db.batch();
            for(const item of invoice.items){
                const productRef=db.collection('inventory').doc(item.productId);
                const docSnap=await productRef.get();
                if(docSnap.exists) batch.update(productRef,{quantity:(docSnap.data().quantity||0)+item.quantity});
            }
            if(invoice.paymentMethod==='أجل' && invoice.customerId){
                const custRef=db.collection('customers').doc(invoice.customerId);
                const custSnap=await custRef.get();
                if(custSnap.exists) batch.update(custRef,{totalDebt:(custSnap.data().totalDebt||0)-(invoice.netTotal||0)});
            }
            const returnRef=db.collection('returns').doc();
            batch.set(returnRef,{invoiceId,invoiceNumber:invoice.invoiceNumber,customerId:invoice.customerId,customerName:invoice.customerName,items:invoice.items,total:invoice.total,reason,date:new Date().toISOString().split('T')[0],timestamp:new Date()});
            await batch.commit();
            alert('تم المرتجع');
            closeReturnModal();
            document.getElementById('returnReason').value='';
            await loadSales();
        }catch(error){alert('خطأ: '+error.message);}
    };
    
    // ===== تحصيل دين =====
    window.showPaymentModal=()=>{document.getElementById('paymentModal').style.display='flex';};
    window.closePaymentModal=()=>{document.getElementById('paymentModal').style.display='none';};
    window.processPayment=async()=>{
        const customerId=document.getElementById('paymentCustomerId').value;
        const amount=parseFloat(document.getElementById('paymentAmount').value);
        const note=document.getElementById('paymentNote').value.trim();
        if(!customerId) return alert('اختر العميل');
        if(!amount||amount<=0) return alert('أدخل مبلغ');
        try{
            const custRef=db.collection('customers').doc(customerId);
            const custSnap=await custRef.get();
            const oldDebt=custSnap.data().totalDebt||0;
            if(amount>oldDebt) return alert(`الدين المطلوب (${oldDebt.toFixed(2)})`);
            await custRef.update({totalDebt:oldDebt-amount});
            await db.collection('payments').add({customerId,customerName:custSnap.data().customerName||'',amount,note,date:new Date().toISOString().split('T')[0],timestamp:new Date()});
            alert('تم السداد');
            closePaymentModal();
            document.getElementById('paymentAmount').value='';
            document.getElementById('paymentNote').value='';
            await loadCustomers();
        }catch(error){alert('خطأ: '+error.message);}
    };
    
    // ===== تحميل المبيعات =====
    async function loadSales(){
        const snapshot=await db.collection('sales').orderBy('timestamp','desc').get();
        allSales=[]; snapshot.forEach(d=>allSales.push({id:d.id,...d.data()}));
        const search=document.getElementById('searchInput').value.toLowerCase();
        const filter=document.getElementById('paymentFilter').value;
        let filtered=allSales;
        if(search) filtered=filtered.filter(s=>(s.invoiceNumber||'').toLowerCase().includes(search)||(s.customerName||'').toLowerCase().includes(search));
        if(filter!=='all') filtered=filtered.filter(s=>s.paymentMethod===filter);
        const tbody=document.getElementById('salesBody');
        if(filtered.length===0){tbody.innerHTML='<tr><td colspan="9">لا توجد مبيعات</td></tr>'; return;}
        let html='';
        filtered.forEach((s,idx)=>{
            html+=`<tr>
                <td>${idx+1}</td>
                <td>${s.date||'-'}</td>
                <td>${s.invoiceNumber||'-'}</td>
                <td>${s.customerName||'-'}</td>
                <td>${(s.total||0).toFixed(2)}</td>
                <td>${(s.discountAmount||0).toFixed(2)}</td>
                <td style="font-weight:bold;color:#0c1445;">${(s.netTotal||s.total||0).toFixed(2)}</td>
                <td><span class="badge ${s.paymentMethod==='نقدي'?'badge-success':'badge-warning'}">${s.paymentMethod||'-'}</span></td>
                <td>
                    <button class="btn-sm btn-warning" onclick="editInvoice('${s.id}')">✏️</button>
                    <button class="btn-sm btn-danger" onclick="deleteInvoice('${s.id}')">🗑️</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML=html;
    }
    
    // ===== تعديل وحذف =====
    window.editInvoice=(id)=>{
        const invoice=allSales.find(s=>s.id===id);
        if(!invoice) return;
        editingId=id;
        document.getElementById('customerId').value=invoice.customerId||'';
        document.getElementById('invoiceNumber').value=invoice.invoiceNumber||'';
        document.getElementById('invoiceDate').value=invoice.date||'';
        document.getElementById('paymentMethod').value=invoice.paymentMethod||'نقدي';
        document.getElementById('discountPercent').value=invoice.discountPercent||0;
        document.getElementById('notes').value=invoice.notes||'';
        cart=invoice.items.map(item=>({...item}));
        renderCart();
        document.getElementById('formTitle').innerHTML='✏️ تعديل فاتورة';
        document.getElementById('cancelEditBtn').style.display='inline-block';
        window.scrollTo({top:0,behavior:'smooth'});
    };
    
    window.cancelEdit=()=>{
        editingId=null; cart=[]; renderCart();
        document.getElementById('formTitle').innerHTML='➕ فاتورة جديدة';
        document.getElementById('cancelEditBtn').style.display='none';
        document.getElementById('customerId').value='';
        document.getElementById('invoiceNumber').value='';
        document.getElementById('invoiceDate').value='';
        document.getElementById('notes').value='';
        document.getElementById('discountPercent').value='0';
    };
    
    window.deleteInvoice=async(id)=>{
        if(!confirm('حذف الفاتورة؟')) return;
        const invoice=allSales.find(s=>s.id===id);
        if(!invoice) return;
        try{
            if(invoice.items){
                for(const item of invoice.items){
                    const productRef=db.collection('inventory').doc(item.productId);
                    const docSnap=await productRef.get();
                    if(docSnap.exists) await productRef.update({quantity:(docSnap.data().quantity||0)+item.quantity});
                }
            }
            if(invoice.paymentMethod==='أجل' && invoice.customerId){
                const custRef=db.collection('customers').doc(invoice.customerId);
                const custSnap=await custRef.get();
                if(custSnap.exists) await custRef.update({totalDebt:(custSnap.data().totalDebt||0)-(invoice.netTotal||0)});
            }
            await db.collection('sales').doc(id).delete();
            alert('تم الحذف');
            await loadSales();
        }catch(error){alert('خطأ: '+error.message);}
    };
