<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#0c1445,#1a2a6c);padding:20px;min-height:100vh}
        .container{max-width:1400px;margin:auto;background:white;border-radius:25px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h2{color:#0c1445;border-right:4px solid #f39c12;padding-right:15px;margin-bottom:20px;font-size:24px}
        
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:25px}
        .stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:18px;border-radius:15px;text-align:center;box-shadow:0 4px 15px rgba(102,126,234,0.3)}
        .stat-card .num{font-size:28px;font-weight:bold}
        .stat-card .label{font-size:12px;opacity:0.9}
        .stat-card.green{background:linear-gradient(135deg,#2ecc71,#27ae60)}
        .stat-card.orange{background:linear-gradient(135deg,#f39c12,#e67e22)}
        
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px;border:1px solid #e9ecef}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        .form-group label{display:block;font-size:12px;color:#495057;margin-bottom:5px;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #e9ecef;border-radius:10px;font-size:14px}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#667eea}
        
        .cart-item{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #e9ecef;flex-wrap:wrap;gap:10px;align-items:center;background:white;border-radius:8px;margin-bottom:5px}
        
        .table-wrapper{overflow-x:auto;border-radius:15px;border:1px solid #e9ecef}
        table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
        th,td{padding:12px 10px;text-align:center;border-bottom:1px solid #e9ecef}
        th{background:#0c1445;color:white;font-weight:600;position:sticky;top:0;z-index:10}
        tr:hover{background:#f8f9fa}
        
        button{padding:10px 25px;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;font-size:14px}
        button:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,0,0,0.15)}
        .btn-success{background:#27ae60;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-primary{background:#667eea;color:white}
        .btn-sm{padding:5px 12px;font-size:11px;border-radius:8px}
        .btn-outline{background:transparent;border:2px solid #667eea;color:#667eea}
        
        .badge{padding:4px 12px;border-radius:20px;font-size:11px;display:inline-block;font-weight:600}
        .badge-success{background:#d4edda;color:#155724}
        .badge-warning{background:#fff3cd;color:#856404}
        .badge-danger{background:#f8d7da;color:#721c24}
        
        .stock-good{color:#27ae60;font-weight:bold}
        .stock-warning{color:#e74c3c;font-weight:bold}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;border-radius:25px;width:95%;max-width:1000px;max-height:90vh;overflow-y:auto;padding:30px;animation:slideDown 0.3s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:2px solid #f39c12;padding-bottom:15px}
        .close-modal{cursor:pointer;font-size:28px;color:#999}
        .close-modal:hover{color:#e74c3c}
        
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .filter-bar input,.filter-bar select{padding:10px 15px;border:2px solid #e9ecef;border-radius:10px;flex:1;min-width:150px;font-size:14px}
        
        @media(max-width:768px){th,td{font-size:11px;padding:8px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-chart-line"></i> المبيعات - نظام إدارة الفواتير</h2>
    
    <!-- إحصائيات -->
    <div class="stats-row">
        <div class="stat-card"><div class="num" id="totalSales">0</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat-card green"><div class="num" id="totalInvoices">0</div><div class="label">عدد الفواتير</div></div>
        <div class="stat-card orange"><div class="num" id="totalItems">0</div><div class="label">المنتجات المباعة</div></div>
    </div>
    
    <!-- نموذج فاتورة جديدة -->
    <div class="form-card">
        <h3 id="formTitle"><i class="fas fa-plus-circle" style="color:#27ae60;"></i> فاتورة مبيعات جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>👤 العميل</label>
                <select id="customerId"><option value="">-- اختر عميل --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
            <div class="form-group"><label>💳 طريقة الدفع</label>
                <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
            </div>
        </div>
        <input type="hidden" id="editInvoiceId">
        <button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;background:#e67e22;margin-top:10px;">❌ إلغاء التعديل</button>
    </div>
    
    <!-- إضافة منتج -->
    <div class="form-card">
        <h3><i class="fas fa-box" style="color:#3498db;"></i> إضافة منتج للفاتورة</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر البيع</label><input type="number" id="salePrice" step="0.01"></div>
        </div>
        <div style="margin-top:10px;font-size:14px;">
            <span id="stockDisplay">📊 المخزون: <span class="stock-good">0</span></span>
            <span style="margin-right:20px;font-weight:bold;color:#667eea;" id="totalDisplay">💰 الإجمالي: 0.00 د.ع</span>
        </div>
        <button onclick="addToCart()" style="margin-top:15px;background:#667eea;color:white;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <!-- سلة المبيعات -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:15px;">
        <h3 style="color:#0c1445;font-size:16px;"><i class="fas fa-shopping-cart" style="color:#f39c12;"></i> سلة المبيعات <span id="cartCount" style="color:#6c757d;font-size:14px;">(0)</span></h3>
        <button onclick="clearCart()" class="btn-sm" style="background:#e74c3c;color:white;"><i class="fas fa-trash"></i> تفريغ</button>
    </div>
    <div id="cart" style="max-height:250px;overflow-y:auto;margin-bottom:15px;border:2px dashed #e9ecef;border-radius:12px;padding:10px;background:#fafafa;"></div>
    <div style="margin:15px 0;padding:15px;background:#f8f9fa;border-radius:12px;display:flex;flex-wrap:wrap;gap:25px;justify-content:space-between;align-items:center;">
        <div><strong>الإجمالي:</strong> <span id="cartTotal" style="font-size:22px;color:#27ae60;font-weight:bold;">0.00</span> د.ع</div>
        <div><strong>عدد القطع:</strong> <span id="totalItems" style="color:#3498db;font-weight:bold;">0</span></div>
    </div>
    
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
        <button onclick="saveSale()" class="btn-success"><i class="fas fa-save"></i> حفظ الفاتورة</button>
        <button onclick="exportExcel()" class="btn-primary"><i class="fas fa-file-excel"></i> تصدير Excel</button>
    </div>
    
    <!-- بحث -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="🔍 بحث برقم الفاتورة أو العميل...">
        <select id="paymentFilter"><option value="all">جميع طرق الدفع</option><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
    </div>
    
    <!-- سجل المبيعات -->
    <h3 style="color:#0c1445;font-size:16px;margin-bottom:15px;"><i class="fas fa-history" style="color:#f39c12;"></i> سجل المبيعات</h3>
    <div class="table-wrapper">
        <table id="salesTable">
            <thead>
                <tr><th>#</th><th>التاريخ</th><th>رقم الفاتورة</th><th>العميل</th><th>الإجمالي</th><th>طريقة الدفع</th><th>إجراءات</th></tr>
            </thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>
</div>

<!-- نافذة تفاصيل الفاتورة -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-invoice" style="color:#f39c12;"></i> تفاصيل الفاتورة</h3>
            <span class="close-modal" onclick="closeDetailModal()">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [], allCustomers = [], allSales = [];
    let cart = [], editingId = null;
    
    auth.onAuthStateChanged(user => {
        if (!user) window.location.href = "login.html";
        else { loadProducts(); loadCustomers(); loadSales(); }
    });
    
    // ========== جلب المنتجات من المخزن ==========
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p => {
            const stock = p.quantity || 0;
            const icon = stock <= 0 ? '🔴' : stock <= 5 ? '🟡' : '🟢';
            select.innerHTML += `<option value="${p.id}" data-price="${p.sellingPrice || 0}" data-stock="${stock}">${icon} ${p.itemName || p.name} (${stock})</option>`;
        });
        document.getElementById('productSelect').onchange = function() {
            const price = this.options[this.selectedIndex]?.getAttribute('data-price') || 0;
            const stock = this.options[this.selectedIndex]?.getAttribute('data-stock') || 0;
            document.getElementById('salePrice').value = price;
            document.getElementById('stockDisplay').innerHTML = `📊 المخزون: <span class="${stock <= 0 ? 'stock-warning' : 'stock-good'}">${stock}</span>`;
            updateTotalDisplay();
        };
        document.getElementById('quantity').addEventListener('input', updateTotalDisplay);
        document.getElementById('salePrice').addEventListener('input', updateTotalDisplay);
    }
    
    function updateTotalDisplay() {
        const qty = parseInt(document.getElementById('quantity').value) || 0;
        const price = parseFloat(document.getElementById('salePrice').value) || 0;
        document.getElementById('totalDisplay').innerHTML = `💰 الإجمالي: ${(qty * price).toFixed(2)} د.ع`;
    }
    
    // ========== جلب العملاء ==========
    async function loadCustomers() {
        const snapshot = await db.collection('customers').get();
        allCustomers = [];
        let html = '<option value="">-- اختر عميل --</option>';
        snapshot.forEach(d => {
            allCustomers.push({ id: d.id, ...d.data() });
            html += `<option value="${d.id}">${d.data().customerName || d.data().name}</option>`;
        });
        document.getElementById('customerId').innerHTML = html;
    }
    
    // ========== إضافة للسلة مع التحقق من المخزون ==========
    window.addToCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return alert('اختر منتجاً');
        
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('salePrice').value);
        
        if (!qty || qty <= 0) return alert('أدخل كمية صحيحة');
        if (!price || price <= 0) return alert('أدخل سعر بيع صحيح');
        
        const currentStock = product.quantity || 0;
        if (currentStock === 0) {
            alert(`❌ المنتج "${product.itemName || product.name}" غير متوفر!`);
            return;
        }
        if (qty > currentStock) {
            alert(`⚠️ الكمية غير متوفرة!\nالمتوفر: ${currentStock}\nالمطلوب: ${qty}`);
            return;
        }
        
        const existing = cart.find(i => i.productId === productId);
        if (existing) {
            const totalQty = existing.quantity + qty;
            if (totalQty > currentStock) {
                alert(`⚠️ الكمية الإجمالية (${totalQty}) أكبر من المتوفرة (${currentStock})`);
                return;
            }
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            cart.push({ productId, name: product.itemName || product.name, price, quantity: qty, total: price * qty });
        }
        renderCart();
        document.getElementById('quantity').value = '1';
        updateTotalDisplay();
    };
    
    function renderCart() {
        const container = document.getElementById('cart');
        let total = 0, totalItems = 0;
        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#adb5bd;padding:20px;">السلة فارغة</p>';
            updateTotals(0, 0);
            return;
        }
        let html = '';
        cart.forEach((item, idx) => {
            total += item.total;
            totalItems += item.quantity;
            html += `<div class="cart-item">
                <div><strong>${item.name}</strong> × ${item.quantity}</div>
                <div>${item.price.toFixed(2)} د.ع</div>
                <div style="font-weight:bold;color:#1a2a6c;">${item.total.toFixed(2)} د.ع</div>
                <div>
                    <button onclick="changeQty(${idx}, -1)" class="btn-sm" style="background:#3498db;color:white;">-</button>
                    <button onclick="changeQty(${idx}, 1)" class="btn-sm" style="background:#3498db;color:white;">+</button>
                    <button onclick="removeFromCart(${idx})" class="btn-sm" style="background:#e74c3c;color:white;">✖</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        updateTotals(total, totalItems);
        document.getElementById('cartCount').innerText = `(${cart.length})`;
    }
    
    function updateTotals(total, items) {
        document.getElementById('cartTotal').innerText = total.toFixed(2);
        document.getElementById('totalItems').innerText = items || 0;
    }
    
    window.changeQty = (idx, delta) => {
        const newQty = cart[idx].quantity + delta;
        if (newQty < 1) { removeFromCart(idx); return; }
        const product = allProducts.find(p => p.id === cart[idx].productId);
        if (product && newQty > (product.quantity || 0)) {
            alert(`⚠️ الكمية غير متوفرة، المتوفر: ${product.quantity}`);
            return;
        }
        cart[idx].quantity = newQty;
        cart[idx].total = cart[idx].price * newQty;
        renderCart();
    };
    
    window.removeFromCart = (idx) => { cart.splice(idx, 1); renderCart(); };
    window.clearCart = () => { if(confirm('تفريغ السلة؟')) { cart = []; renderCart(); } };
    
    // ========== حفظ الفاتورة ==========
    window.saveSale = async () => {
        const customerId = document.getElementById('customerId').value;
        const customer = allCustomers.find(c => c.id === customerId);
        if (!customerId) return alert('اختر العميل');
        if (cart.length === 0) return alert('لا توجد منتجات');
        const total = cart.reduce((s, i) => s + i.total, 0);
        try {
            const batch = db.batch();
            for (const item of cart) {
                const productRef = db.collection('inventory').doc(item.productId);
                const docSnap = await productRef.get();
                const oldQty = docSnap.data().quantity || 0;
                if (oldQty < item.quantity) throw new Error(`المنتج ${item.name} غير متوفر`);
                batch.update(productRef, { quantity: oldQty - item.quantity });
            }
            if (document.getElementById('paymentMethod').value === 'أجل' && customer) {
                const custRef = db.collection('customers').doc(customerId);
                const custSnap = await custRef.get();
                batch.update(custRef, { totalDebt: (custSnap.data().totalDebt || 0) + total });
            }
            const saleRef = editingId ? db.collection('sales').doc(editingId) : db.collection('sales').doc();
            const data = {
                customerId, customerName: customer?.customerName || customer?.name || '',
                invoiceNumber: document.getElementById('invoiceNumber').value || 'INV-' + Date.now(),
                date: document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0],
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart, total, timestamp: new Date()
            };
            if (editingId) {
                await saleRef.update({...data, updatedAt: new Date()});
                alert('✅ تم تحديث الفاتورة');
                cancelEdit();
            } else {
                await saleRef.set(data);
                alert('✅ تم حفظ الفاتورة');
            }
            cart = []; renderCart();
            document.getElementById('customerId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceDate').value = '';
            await loadProducts();
            await loadSales();
        } catch (error) { alert('❌ خطأ: ' + error.message); }
    };
    
    // ========== عرض تفاصيل الفاتورة ==========
    window.showInvoiceDetails = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        let itemsHtml = '';
        invoice.items.forEach(item => {
            itemsHtml += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
                <span><strong>${item.name}</strong> × ${item.quantity}</span>
                <span>${item.price.toFixed(2)} د.ع</span>
                <span style="font-weight:bold;color:#1a2a6c;">${item.total.toFixed(2)} د.ع</span>
            </div>`;
        });
        document.getElementById('detailContent').innerHTML = `
            <div style="background:#0c1445;color:white;padding:15px;border-radius:12px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:15px;justify-content:space-between;">
                <span><strong>رقم الفاتورة:</strong> ${invoice.invoiceNumber || '-'}</span>
                <span><strong>التاريخ:</strong> ${invoice.date || '-'}</span>
                <span><strong>العميل:</strong> ${invoice.customerName || '-'}</span>
                <span><strong>طريقة الدفع:</strong> ${invoice.paymentMethod || '-'}</span>
            </div>
            <h4>المنتجات:</h4>
            ${itemsHtml}
            <div style="font-weight:bold;font-size:20px;color:#1a2a6c;padding:15px 0;text-align:center;background:#f8f9fa;border-radius:10px;margin-top:10px;">
                الإجمالي: ${(invoice.total || 0).toFixed(2)} د.ع
            </div>
            <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
                <button onclick="editInvoice('${invoice.id}')" class="btn-warning"><i class="fas fa-edit"></i> تعديل</button>
                <button onclick="deleteInvoice('${invoice.id}')" class="btn-danger"><i class="fas fa-trash"></i> حذف</button>
                <button onclick="closeDetailModal()" style="background:#6c757d;color:white;">إغلاق</button>
            </div>
        `;
        document.getElementById('detailModal').style.display = 'flex';
    };
    
    window.closeDetailModal = () => { document.getElementById('detailModal').style.display = 'none'; };
    
    // ========== تعديل الفاتورة ==========
    window.editInvoice = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        closeDetailModal();
        editingId = id;
        document.getElementById('customerId').value = invoice.customerId || '';
        document.getElementById('invoiceNumber').value = invoice.invoiceNumber || '';
        document.getElementById('invoiceDate').value = invoice.date || '';
        document.getElementById('paymentMethod').value = invoice.paymentMethod || 'نقدي';
        cart = invoice.items.map(item => ({ ...item }));
        renderCart();
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit" style="color:#e67e22;"></i> تعديل فاتورة مبيعات';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    window.cancelEdit = () => {
        editingId = null;
        cart = []; renderCart();
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle" style="color:#27ae60;"></i> فاتورة مبيعات جديدة';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('customerId').value = '';
        document.getElementById('invoiceNumber').value = '';
        document.getElementById('invoiceDate').value = '';
    };
    
    // ========== حذف الفاتورة ==========
    window.deleteInvoice = async (id) => {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذه الفاتورة؟')) return;
        closeDetailModal();
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        try {
            if (invoice.items) {
                for (const item of invoice.items) {
                    const productRef = db.collection('inventory').doc(item.productId);
                    const docSnap = await productRef.get();
                    if (docSnap.exists) {
                        await productRef.update({ quantity: (docSnap.data().quantity || 0) + item.quantity });
                    }
                }
            }
            if (invoice.paymentMethod === 'أجل' && invoice.customerId) {
                const customerRef = db.collection('customers').doc(invoice.customerId);
                const custSnap = await customerRef.get();
                if (custSnap.exists) {
                    await customerRef.update({ totalDebt: (custSnap.data().totalDebt || 0) - (invoice.total || 0) });
                }
            }
            await db.collection('sales').doc(id).delete();
            alert('تم حذف الفاتورة');
            loadSales();
        } catch (error) { alert('❌ خطأ: ' + error.message); }
    };
    
    // ========== تحميل المبيعات ==========
    async function loadSales() {
        const snapshot = await db.collection('sales').orderBy('timestamp', 'desc').get();
        allSales = [];
        snapshot.forEach(d => allSales.push({ id: d.id, ...d.data() }));
        
        // تحديث الإحصائيات
        let totalSales = 0, totalItems = 0;
        allSales.forEach(s => {
            totalSales += s.total || 0;
            if (s.items) s.items.forEach(i => totalItems += i.quantity || 0);
        });
        document.getElementById('totalSales').innerText = totalSales.toFixed(0);
        document.getElementById('totalInvoices').innerText = allSales.length;
        document.getElementById('totalItems').innerText = totalItems;
        
        const search = document.getElementById('searchInput').value.toLowerCase();
        const paymentFilter = document.getElementById('paymentFilter').value;
        let filtered = allSales;
        if (search) filtered = filtered.filter(s => 
            (s.invoiceNumber || '').toLowerCase().includes(search) || 
            (s.customerName || '').toLowerCase().includes(search)
        );
        if (paymentFilter !== 'all') filtered = filtered.filter(s => s.paymentMethod === paymentFilter);
        
        const tbody = document.getElementById('salesBody');
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7">لا توجد مبيعات</td></tr>'; return; }
        let html = '';
        filtered.forEach((s, idx) => {
            const statusClass = s.paymentMethod === 'نقدي' ? 'badge-success' : 'badge-warning';
            html += `<tr>
                <td>${idx + 1}</td>
                <td>${s.date || '-'}</td>
                <td>${s.invoiceNumber || '-'}</td>
                <td><strong>${s.customerName || '-'}</strong></td>
                <td>${(s.total || 0).toFixed(2)}</td>
                <td><span class="badge ${statusClass}">${s.paymentMethod || '-'}</span></td>
                <td>
                    <button class="btn-sm btn-info" onclick="showInvoiceDetails('${s.id}')"><i class="fas fa-eye"></i></button>
                    <button class="btn-sm btn-warning" onclick="editInvoice('${s.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-sm btn-danger" onclick="deleteInvoice('${s.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    // ========== تصدير Excel ==========
    window.exportExcel = () => {
        let csv = 'رقم الفاتورة,التاريخ,العميل,طريقة الدفع,الإجمالي,المنتجات\n';
        allSales.forEach(s => {
            const items = s.items ? s.items.map(i => `${i.name}(${i.quantity})`).join(' | ') : '';
            csv += `${s.invoiceNumber || ''},${s.date || ''},${s.customerName || ''},${s.paymentMethod || ''},${(s.total || 0).toFixed(2)},${items}\n`;
        });
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `المبيعات_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
        alert('✅ تم تصدير الملف بنجاح');
    };
    
    // ========== البحث والفلترة ==========
    document.getElementById('searchInput').addEventListener('input', loadSales);
    document.getElementById('paymentFilter').addEventListener('change', loadSales);
</script>
</body>
</html>
