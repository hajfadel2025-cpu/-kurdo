<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المبيعات - مكتب حاج فاضل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tahoma', 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        .sales-form, .cart-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-add, .btn-save {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn-save {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            margin-top: 10px;
        }

        .btn-add:hover, .btn-save:hover {
            transform: scale(1.02);
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
        }

        .cart-item-price {
            color: #666;
            font-size: 14px;
        }

        .cart-item-quantity button {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-remove {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-total {
            padding-top: 20px;
            border-top: 2px solid #eee;
            text-align: left;
            font-size: 20px;
            font-weight: bold;
        }

        .commission {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📊 عدد الفواتير</h3>
                <div class="number" id="invoiceCount">0</div>
            </div>
            <div class="stat-card">
                <h3>💰 إجمالي المبيعات</h3>
                <div class="number" id="totalSales">0 د.ع</div>
            </div>
        </div>

        <div class="main-content">
            <div class="sales-form">
                <h2 style="margin-bottom: 20px;">🧾 فاتورة مبيعات جديدة</h2>
                <div id="alert" class="alert"></div>

                <div class="form-group">
                    <label>👤 اختر مندوب</label>
                    <select id="salesmanSelect">
                        <option value="">-- اختر مندوب --</option>
                        <option value="كردو">كردو</option>
                        <option value="علي">علي</option>
                        <option value="حسن">حسن</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>💰 طريقة الدفع</label>
                    <select id="paymentMethod">
                        <option value="نقدي">نقدي</option>
                        <option value="أجل">أجل</option>
                        <option value="شبكة">شبكة</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🏪 الصندوق</label>
                    <select id="cashBox">
                        <option value="عصر نقدي">عصر نقدي - رئيسي</option>
                        <option value="صندوق ثانوي">صندوق ثانوي</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>📦 اختر منتج</label>
                    <select id="productSelect">
                        <option value="">-- اختر منتج --</option>
                        <option value="خبز" data-price="600">خبز - 600 د.ع</option>
                        <option value="حليب" data-price="1200">حليب - 1200 د.ع</option>
                        <option value="سكر" data-price="800">سكر - 800 د.ع</option>
                        <option value="رز" data-price="1500">رز - 1500 د.ع</option>
                        <option value="زيت" data-price="1000">زيت - 1000 د.ع</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🔢 الكمية</label>
                    <input type="number" id="quantity" value="1" min="1">
                </div>

                <button class="btn-add" onclick="addToCart()">➕ إضافة إلى السلة</button>
            </div>

            <div class="cart-section">
                <h2 style="margin-bottom: 20px;">🛒 سلة المشتريات</h2>
                <div id="cartItems" class="cart-items">
                    <p style="text-align: center; color: #999;">السلة فارغة</p>
                </div>
                <div class="cart-total">
                    إجمالي الفاتورة: <span id="cartTotal">0.00</span> د.ع
                </div>
                <div class="commission">
                    💰 العمولة المتوقعة: <span id="commissionAmount">0.00</span> د.ع (1%)
                </div>
                <button class="btn-save" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
            </div>
        </div>
    </div>

    <script>
        // سلة المشتريات
        let cart = [];

        // إضافة منتج إلى السلة
        function addToCart() {
            const productSelect = document.getElementById('productSelect');
            const productName = productSelect.value;
            const selectedOption = productSelect.options[productSelect.selectedIndex];
            const productPrice = parseFloat(selectedOption.dataset.price);
            const quantity = parseInt(document.getElementById('quantity').value);

            if (!productName) {
                showAlert('الرجاء اختيار منتج', 'error');
                return;
            }

            if (quantity < 1) {
                showAlert('الكمية يجب أن تكون أكبر من 0', 'error');
                return;
            }

            // البحث عن المنتج في السلة
            const existingItem = cart.find(item => item.name === productName);
            if (existingItem) {
                existingItem.quantity += quantity;
                existingItem.total = existingItem.quantity * existingItem.price;
            } else {
                cart.push({
                    name: productName,
                    price: productPrice,
                    quantity: quantity,
                    total: productPrice * quantity
                });
            }

            updateCartDisplay();
            document.getElementById('quantity').value = 1;
            showAlert(`تمت إضافة ${quantity} × ${productName}`, 'success');
        }

        // تحديث عرض السلة
        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            const totalSpan = document.getElementById('cartTotal');
            const commissionSpan = document.getElementById('commissionAmount');

            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999;">السلة فارغة</p>';
                totalSpan.innerText = '0.00';
                commissionSpan.innerText = '0.00';
                return;
            }

            let total = 0;
            let html = '';
            cart.forEach((item, index) => {
                total += item.total;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} د.ع × ${item.quantity}</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button onclick="changeQuantity(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="changeQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="cart-item-total">${item.total.toFixed(2)} د.ع</div>
                        <button class="btn-remove" onclick="removeFromCart(${index})">✖</button>
                    </div>
                `;
            });

            container.innerHTML = html;
            totalSpan.innerText = total.toFixed(2);
            const commission = total * 0.01;
            commissionSpan.innerText = commission.toFixed(2);
        }

        // تغيير الكمية
        function changeQuantity(index, delta) {
            const newQuantity = cart[index].quantity + delta;
            if (newQuantity < 1) {
                removeFromCart(index);
                return;
            }
            cart[index].quantity = newQuantity;
            cart[index].total = cart[index].price * newQuantity;
            updateCartDisplay();
        }

        // إزالة منتج من السلة
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartDisplay();
            showAlert('تمت إزالة المنتج', 'success');
        }

        // حفظ الفاتورة
        function saveInvoice() {
            if (cart.length === 0) {
                showAlert('السلة فارغة! أضف منتجات أولاً', 'error');
                return;
            }

            const salesman = document.getElementById('salesmanSelect').value;
            if (!salesman) {
                showAlert('الرجاء اختيار مندوب', 'error');
                return;
            }

            const paymentMethod = document.getElementById('paymentMethod').value;
            const cashBox = document.getElementById('cashBox').value;
            const total = parseFloat(document.getElementById('cartTotal').innerText);
            const commission = parseFloat(document.getElementById('commissionAmount').innerText);
            const invoiceNumber = 'INV-' + Date.now();
            const date = new Date().toLocaleString();

            // عرض معلومات الفاتورة
            const invoiceDetails = `
                🧾 **تم حفظ الفاتورة بنجاح** 🧾
                
                📌 رقم الفاتورة: ${invoiceNumber}
                📅 التاريخ: ${date}
                👤 المندوب: ${salesman}
                💳 طريقة الدفع: ${paymentMethod}
                🏪 الصندوق: ${cashBox}
                
                📦 المنتجات:
                ${cart.map(item => `- ${item.name}: ${item.quantity} × ${item.price} = ${item.total.toFixed(2)} د.ع`).join('\n')}
                
                💰 الإجمالي: ${total.toFixed(2)} د.ع
                🎁 العمولة (1%): ${commission.toFixed(2)} د.ع
                
                شكراً لتعاملكم مع مكتب حاج فاضل
            `;

            alert(invoiceDetails);

            // طباعة الفاتورة
            printInvoice(invoiceNumber, salesman, paymentMethod, cashBox, cart, total, commission, date);

            // تفريغ السلة
            cart = [];
            updateCartDisplay();
            
            // تحديث عدد الفواتير
            updateStatistics();
        }

        // طباعة الفاتورة
        function printInvoice(number, salesman, payment, box, items, total, commission, date) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html dir="rtl">
                <head>
                    <title>فاتورة ${number}</title>
                    <style>
                        body {
                            font-family: 'Tahoma', Arial, sans-serif;
                            padding: 30px;
                            max-width: 800px;
                            margin: 0 auto;
                        }
                        .header {
                            text-align: center;
                            border-bottom: 3px solid #667eea;
                            padding-bottom: 20px;
                            margin-bottom: 20px;
                        }
                        .header h1 {
                            color: #667eea;
                            margin-bottom: 5px;
                        }
                        .info {
                            margin: 20px 0;
                            line-height: 1.8;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin: 20px 0;
                        }
                        th, td {
                            border: 1px solid #ddd;
                            padding: 10px;
                            text-align: center;
                        }
                        th {
                            background: #667eea;
                            color: white;
                        }
                        .total {
                            font-size: 20px;
                            font-weight: bold;
                            text-align: left;
                            margin: 20px 0;
                            padding-top: 10px;
                            border-top: 2px solid #ddd;
                        }
                        .commission {
                            color: #00b09b;
                            font-size: 16px;
                        }
                        .footer {
                            text-align: center;
                            margin-top: 40px;
                            padding-top: 20px;
                            border-top: 1px solid #ddd;
                            font-size: 12px;
                            color: #666;
                        }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>📄 مكتب حاج فاضل</h1>
                        <h2>فاتورة مبيعات</h2>
                        <p>رقم: ${number}</p>
                    </div>
                    
                    <div class="info">
                        <p><strong>📅 التاريخ:</strong> ${date}</p>
                        <p><strong>👤 المندوب:</strong> ${salesman}</p>
                        <p><strong>💳 طريقة الدفع:</strong> ${payment}</p>
                        <p><strong>🏪 الصندوق:</strong> ${box}</p>
                    </div>
                    
                    <table>
                        <thead>
                            <tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th></tr>
                        </thead>
                        <tbody>
                            ${items.map(item => `
                                <tr>
                                    <td>${item.name}</td>
                                    <td>${item.price} د.ع</td>
                                    <td>${item.quantity}</td>
                                    <td>${item.total.toFixed(2)} د.ع</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    
                    <div class="total">
                        💰 الإجمالي: ${total.toFixed(2)} د.ع
                    </div>
                    <div class="commission">
                        🎁 عمولة المندوب (1%): ${commission.toFixed(2)} د.ع
                    </div>
                    
                    <div class="footer">
                        <p>شكراً لتعاملكم مع مكتب حاج فاضل</p>
                        <p>مع تحيات فريق المبيعات</p>
                    </div>
                    
                    <script>window.print();<\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        // تحديث الإحصائيات
        function updateStatistics() {
            const invoiceCountSpan = document.getElementById('invoiceCount');
            let count = parseInt(invoiceCountSpan.innerText) || 0;
            invoiceCountSpan.innerText = count + 1;
        }

        // عرض رسالة
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerText = message;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 2500);
        }

        // عند تحميل الصفحة
        window.onload = function() {
            console.log('✅ صفحة المبيعات جاهزة');
            updateCartDisplay();
        };
    </script>
</body>
</html>
