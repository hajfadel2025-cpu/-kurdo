<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات - نظام المخازن المتكامل</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1400px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #f39c12;padding-right:15px;margin-bottom:20px}
        
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        .form-group label{display:block;font-size:12px;color:#666;margin-bottom:5px}
        .form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        
        .cart-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;flex-wrap:wrap;gap:10px;align-items:center}
        
        .table-wrapper{overflow-x:auto;max-height:500px;overflow-y:auto;border-radius:10px;border:1px solid #ddd}
        table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center;white-space:nowrap}
        th{background:#1e3c72;color:white;position:sticky;top:0;z-index:10}
        tr:hover{background:#f5f5f5}
        
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;transition:0.3s}
        button:hover{transform:translateY(-2px);filter:brightness(1.05)}
        .btn-danger{background:#e74c3c}
        .btn-warning{background:#e67e22}
        .btn-sm{padding:5px 10px;font-size:12px}
        .btn-info{background:#3498db}
        .btn-primary{background:#667eea}
        
        .badge{padding:3px 10px;border-radius:12px;font-size:10px;display:inline-block}
        .badge-green{background:#d4edda;color:#155724}
        .badge-red{background:#f8d7da;color:#721c24}
        .badge-orange{background:#ffeaa7;color:#856404}
        
        .status-paid{background:#d4edda;color:#155724;padding:3px 10px;border-radius:12px}
        .status-credit{background:#ffeaa7;color:#856404;padding:3px 10px;border-radius:12px}
        
        .stock-info{font-size:12px;color:#666;margin-right:10px}
        .stock-warning{color:#e74c3c;font-weight:bold}
        .stock-good{color:#27ae60;font-weight:bold}
        
        /* نافذة التفاصيل */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;border-radius:20px;width:95%;max-width:1000px;max-height:90vh;overflow-y:auto;padding:25px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;border-bottom:2px solid #f39c12;padding-bottom:10px}
        .close-modal{cursor:pointer;font-size:24px;color:#999}
        .close-modal:hover{color:#e74c3c}
        
        .detail-item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee}
        .detail-total{font-weight:bold;font-size:18px;color:#1e3c72;padding:10px 0}
        
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-cart-shopping"></i> المبيعات</h2>
    
    <!-- نموذج فاتورة جديدة -->
    <div class="form-card">
        <h3 id="formTitle">➕ فاتورة مبيعات جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>👤 العميل</label>
                <select id="customerId"><option value="">-- اختر عميل --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
            <div class="form-group"><label>💳 طريقة الدفع</label>
                <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option><option value="شبكة">شبكة</option></select>
            </div>
        </div>
        <input type="hidden" id="editInvoiceId">
        <button onclick="cancelEdit()" id="cancelEditBtn" style="display:none;background:#e67e22;margin-top:10px;">❌ إلغاء التعديل</button>
    </div>
    
    <!-- إضافة منتج -->
    <div class="form-card">
        <h3>➕ إضافة منتج</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر البيع</label><input type="number" id="salePrice" step="0.01"></div>
        </div>
        <div style="margin-top:10px;font-size:14px;color:#666;">
            <span id="stockDisplay">📊 المخزون الحالي: 0</span>
            <span id="totalDisplay" style="margin-right:20px;">💰 الإجمالي: 0.00</span>
        </div>
        <button onclick="addToCart()" style="margin-top:15px;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <!-- سلة المبيعات -->
    <h3>🛒 سلة المبيعات <span id="cartCount" style="font-size:14px;color:#666;">(0)</span></h3>
    <div id="cart" style="max-height:250px;overflow-y:auto;margin-bottom:15px;border:1px solid #eee;border-radius:10px;padding:10px;"></div>
    <div style="margin:15px 0;padding:10px;background:#f0f0f0;border-radius:10px;display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between;">
        <div><strong>الإجمالي:</strong> <span id="cartTotal" style="font-size:20px;color:#27ae60;">0.00</span> د.ع</div>
        <div><strong>عدد القطع:</strong> <span id="totalItems" style="color:#3498db;">0</span></div>
    </div>
    
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;">
        <button onclick="saveSale()" style="background:#27ae60;flex:1;"><i class="fas fa-save"></i> حفظ فاتورة البيع</button>
        <button onclick="clearCart()" style="background:#95a5a6;flex:1;"><i class="fas fa-trash"></i> تفريغ السلة</button>
    </div>
    
    <!-- سجل المبيعات مع تفاصيل -->
    <h3>📋 سجل المبيعات</h3>
    <div class="table-wrapper">
        <table id="salesTable">
            <thead>
                <tr>
                    <th>#</th><th>التاريخ</th><th>رقم الفاتورة</th><th>العميل</th>
                    <th>الإجمالي</th><th>طريقة الدفع</th><th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="salesBody"></tbody>
        </table>
    </div>
</div>

<!-- نافذة تفاصيل الفاتورة -->
<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-file-invoice"></i> تفاصيل الفاتورة</h3>
            <span class="close-modal" onclick="closeDetailModal()">&times;</span>
        </div>
        <div id="detailContent"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [], allCustomers = [], allSales = [];
    let cart = [], editingId = null;
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else {loadProducts(); loadCustomers(); loadSales();}});
    
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p => {
            const stock = p.quantity || 0;
            const stockText = stock <= 0 ? '🔴 نفذت' : stock <= 5 ? '🟡 منخفض' : '🟢 متوفر';
            select.innerHTML += `<option value="${p.id}" data-price="${p.sellingPrice || 0}" data-stock="${stock}">${p.itemName || p.name} (${stockText} - ${stock})</option>`;
        });
        document.getElementById('productSelect').onchange = function() {
            const price = this.options[this.selectedIndex]?.getAttribute('data-price') || 0;
            const stock = this.options[this.selectedIndex]?.getAttribute('data-stock') || 0;
            document.getElementById('salePrice').value = price;
            document.getElementById('stockDisplay').innerHTML = `📊 المخزون الحالي: <span class="${stock <= 0 ? 'stock-warning' : 'stock-good'}">${stock}</span>`;
            updateTotalDisplay();
        };
        document.getElementById('quantity').addEventListener('input', updateTotalDisplay);
        document.getElementById('salePrice').addEventListener('input', updateTotalDisplay);
    }
    
    function updateTotalDisplay() {
        const qty = parseInt(document.getElementById('quantity').value) || 0;
        const price = parseFloat(document.getElementById('salePrice').value) || 0;
        document.getElementById('totalDisplay').innerHTML = `💰 الإجمالي: ${(qty * price).toFixed(2)}`;
    }
    
    async function loadCustomers() {
        const snapshot = await db.collection('customers').get();
        allCustomers = [];
        let html = '<option value="">-- اختر عميل --</option>';
        snapshot.forEach(d => { allCustomers.push({ id: d.id, ...d.data() }); html += `<option value="${d.id}">${d.data().customerName || d.data().name}</option>`; });
        document.getElementById('customerId').innerHTML = html;
    }
    
    window.addToCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return alert('اختر منتجاً');
        
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('salePrice').value);
        
        if (!qty || qty <= 0) return alert('أدخل كمية صحيحة');
        if (!price || price <= 0) return alert('أدخل سعر بيع صحيح');
        
        const currentStock = product.quantity || 0;
        if (currentStock === 0) {
            alert(`❌ المنتج "${product.itemName || product.name}" غير متوفر في المخزن!`);
            return;
        }
        if (qty > currentStock) {
            alert(`⚠️ الكمية غير متوفرة!\nالمتوفر: ${currentStock}\nالمطلوب: ${qty}`);
            return;
        }
        
        const existing = cart.find(i => i.productId === productId);
        if (existing) {
            const totalQty = existing.quantity + qty;
            if (totalQty > currentStock) {
                alert(`⚠️ الكمية الإجمالية (${totalQty}) أكبر من المتوفرة (${currentStock})`);
                return;
            }
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            cart.push({ productId, name: product.itemName || product.name, price: price, quantity: qty, total: price * qty });
        }
        renderCart();
        document.getElementById('quantity').value = '1';
        updateTotalDisplay();
    };
    
    function renderCart() {
        const container = document.getElementById('cart');
        let total = 0, totalItems = 0;
        if (cart.length === 0) { container.innerHTML = '<p style="text-align:center;color:#999;">السلة فارغة</p>'; updateTotals(0, 0); return; }
        let html = '';
        cart.forEach((item, idx) => {
            total += item.total;
            totalItems += item.quantity;
            html += `<div class="cart-item">
                <div><strong>${item.name}</strong><br>${item.price} د.ع × ${item.quantity}</div>
                <div style="font-weight:bold;color:#1e3c72;">${item.total.toFixed(2)} د.ع</div>
                <div>
                    <button onclick="changeQty(${idx}, -1)" class="btn-sm" style="background:#3498db;">-</button>
                    <button onclick="changeQty(${idx}, 1)" class="btn-sm" style="background:#3498db;">+</button>
                    <button onclick="removeFromCart(${idx})" class="btn-sm" style="background:#e74c3c;">✖</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        updateTotals(total, totalItems);
        document.getElementById('cartCount').innerText = `(${cart.length})`;
    }
    
    function updateTotals(total, items) {
        document.getElementById('cartTotal').innerText = total.toFixed(2);
        document.getElementById('totalItems').innerText = items || 0;
    }
    
    window.changeQty = (idx, delta) => {
        const newQty = cart[idx].quantity + delta;
        if (newQty < 1) { removeFromCart(idx); return; }
        const product = allProducts.find(p => p.id === cart[idx].productId);
        if (product && newQty > (product.quantity || 0)) {
            alert(`⚠️ الكمية غير متوفرة، المتوفر: ${product.quantity}`);
            return;
        }
        cart[idx].quantity = newQty;
        cart[idx].total = cart[idx].price * newQty;
        renderCart();
    };
    
    window.removeFromCart = (idx) => { cart.splice(idx, 1); renderCart(); };
    window.clearCart = () => { if(confirm('تفريغ السلة؟')) { cart = []; renderCart(); } };
    
    window.saveSale = async () => {
        const customerId = document.getElementById('customerId').value;
        const customer = allCustomers.find(c => c.id === customerId);
        if (!customerId) return alert('اختر العميل');
        if (cart.length === 0) return alert('لا توجد منتجات');
        const total = cart.reduce((s, i) => s + i.total, 0);
        try {
            const batch = db.batch();
            for (const item of cart) {
                const productRef = db.collection('inventory').doc(item.productId);
                const docSnap = await productRef.get();
                const oldQty = docSnap.data().quantity || 0;
                if (oldQty < item.quantity) throw new Error(`المنتج ${item.name} غير متوفر`);
                batch.update(productRef, { quantity: oldQty - item.quantity });
            }
            if (document.getElementById('paymentMethod').value === 'أجل' && customer) {
                const custRef = db.collection('customers').doc(customerId);
                const custSnap = await custRef.get();
                batch.update(custRef, { totalDebt: (custSnap.data().totalDebt || 0) + total });
            }
            const saleRef = editingId ? db.collection('sales').doc(editingId) : db.collection('sales').doc();
            const data = {
                customerId, customerName: customer?.customerName || customer?.name || '',
                invoiceNumber: document.getElementById('invoiceNumber').value || 'INV-' + Date.now(),
                date: document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0],
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart, total, timestamp: new Date()
            };
            if (editingId) {
                await saleRef.update({...data, updatedAt: new Date()});
                alert('✅ تم تحديث فاتورة البيع');
                cancelEdit();
            } else {
                await saleRef.set(data);
                alert('✅ تم حفظ فاتورة البيع');
            }
            cart = []; renderCart();
            document.getElementById('customerId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceDate').value = '';
            await loadProducts(); await loadSales();
        } catch (error) { alert('❌ خطأ: ' + error.message); }
    };
    
    // ========== عرض تفاصيل الفاتورة ==========
    window.showInvoiceDetails = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        
        let itemsHtml = '';
        let total = 0;
        invoice.items.forEach(item => {
            total += item.total;
            itemsHtml += `<div class="detail-item">
                <span><strong>${item.name}</strong> × ${item.quantity}</span>
                <span>${item.price.toFixed(2)} د.ع</span>
                <span style="font-weight:bold;color:#1e3c72;">${item.total.toFixed(2)} د.ع</span>
            </div>`;
        });
        
        document.getElementById('detailContent').innerHTML = `
            <div style="margin-bottom:20px;">
                <div class="detail-item"><span><strong>رقم الفاتورة:</strong></span><span>${invoice.invoiceNumber || '-'}</span></div>
                <div class="detail-item"><span><strong>التاريخ:</strong></span><span>${invoice.date || '-'}</span></div>
                <div class="detail-item"><span><strong>العميل:</strong></span><span>${invoice.customerName || '-'}</span></div>
                <div class="detail-item"><span><strong>طريقة الدفع:</strong></span><span>${invoice.paymentMethod || '-'}</span></div>
            </div>
            <h4>المنتجات:</h4>
            ${itemsHtml}
            <div class="detail-total">الإجمالي: ${total.toFixed(2)} د.ع</div>
            <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">
                <button onclick="editInvoice('${invoice.id}')" style="background:#e67e22;"><i class="fas fa-edit"></i> تعديل الفاتورة</button>
                <button onclick="deleteInvoice('${invoice.id}')" style="background:#e74c3c;"><i class="fas fa-trash"></i> حذف الفاتورة</button>
                <button onclick="closeDetailModal()" style="background:#95a5a6;">إغلاق</button>
            </div>
        `;
        document.getElementById('detailModal').style.display = 'flex';
    };
    
    window.closeDetailModal = () => { document.getElementById('detailModal').style.display = 'none'; };
    
    // ========== تعديل الفاتورة ==========
    window.editInvoice = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        closeDetailModal();
        editingId = id;
        document.getElementById('customerId').value = invoice.customerId || '';
        document.getElementById('invoiceNumber').value = invoice.invoiceNumber || '';
        document.getElementById('invoiceDate').value = invoice.date || '';
        document.getElementById('paymentMethod').value = invoice.paymentMethod || 'نقدي';
        cart = invoice.items.map(item => ({ ...item }));
        renderCart();
        document.getElementById('formTitle').innerHTML = '✏️ تعديل فاتورة مبيعات';
        document.getElementById('cancelEditBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    window.cancelEdit = () => {
        editingId = null;
        cart = [];
        renderCart();
        document.getElementById('formTitle').innerHTML = '➕ فاتورة مبيعات جديدة';
        document.getElementById('cancelEditBtn').style.display = 'none';
        document.getElementById('customerId').value = '';
        document.getElementById('invoiceNumber').value = '';
        document.getElementById('invoiceDate').value = '';
    };
    
    // ========== حذف الفاتورة ==========
    window.deleteInvoice = async (id) => {
        if (!confirm('⚠️ هل أنت متأكد من حذف هذه الفاتورة؟')) return;
        closeDetailModal();
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        try {
            if (invoice.items) {
                for (const item of invoice.items) {
                    const productRef = db.collection('inventory').doc(item.productId);
                    const docSnap = await productRef.get();
                    if (docSnap.exists) {
                        await productRef.update({ quantity: (docSnap.data().quantity || 0) + item.quantity });
                    }
                }
            }
            if (invoice.paymentMethod === 'أجل' && invoice.customerId) {
                const customerRef = db.collection('customers').doc(invoice.customerId);
                const custSnap = await customerRef.get();
                if (custSnap.exists) {
                    await customerRef.update({ totalDebt: (custSnap.data().totalDebt || 0) - (invoice.total || 0) });
                }
            }
            await db.collection('sales').doc(id).delete();
            alert('تم حذف الفاتورة');
            loadSales();
        } catch (error) { alert('❌ خطأ: ' + error.message); }
    };
    
    async function loadSales() {
        const snapshot = await db.collection('sales').orderBy('timestamp', 'desc').get();
        allSales = [];
        snapshot.forEach(d => allSales.push({ id: d.id, ...d.data() }));
        const tbody = document.getElementById('salesBody');
        if (allSales.length === 0) { tbody.innerHTML = '<tr><td colspan="7">لا توجد مبيعات</td></tr>'; return; }
        let html = '';
        allSales.forEach((s, idx) => {
            const statusClass = s.paymentMethod === 'نقدي' ? 'status-paid' : 'status-credit';
            html += `<tr>
                <td>${idx + 1}</td>
                <td>${s.date || '-'}</td>
                <td>${s.invoiceNumber || '-'}</td>
                <td><strong>${s.customerName || '-'}</strong></td>
                <td>${(s.total || 0).toFixed(2)}</td>
                <td class="${statusClass}">${s.paymentMethod || '-'}</td>
                <td>
                    <button class="btn-sm btn-info" onclick="showInvoiceDetails('${s.id}')"><i class="fas fa-eye"></i></button>
                    <button class="btn-sm btn-warning" onclick="editInvoice('${s.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-sm btn-danger" onclick="deleteInvoice('${s.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
</script>
</body>
</html>
