<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المبيعات</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:#0c1445;padding:20px}
        .container{max-width:1000px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#0c1445;margin-bottom:20px}
        .box{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        label{display:block;font-weight:bold;margin-bottom:5px;font-size:13px}
        select,input{width:100%;padding:10px;border:2px solid #ddd;border-radius:10px;margin-bottom:10px;font-size:14px}
        button{padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
        .btn-success{background:#27ae60;color:white}
        .btn-primary{background:#667eea;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-sm{padding:5px 10px;font-size:12px;margin:2px}
        .cart-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;flex-wrap:wrap}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#0c1445;color:white}
        .badge{padding:3px 10px;border-radius:15px;font-size:12px;display:inline-block}
        .badge-success{background:#d4edda;color:#155724}
        .badge-warning{background:#fff3cd;color:#856404}
        .total{font-size:20px;color:#27ae60;font-weight:bold}
        .filter{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .filter input,.filter select{flex:1;min-width:150px}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-shopping-cart"></i> المبيعات</h2>
    
    <!-- نموذج فاتورة -->
    <div class="box">
        <h3>➕ فاتورة جديدة</h3>
        <label>👤 العميل</label>
        <select id="customerId"><option value="">-- اختر عميل --</option></select>
        
        <label>📞 رقم الفاتورة</label>
        <input type="text" id="invoiceNumber" placeholder="رقم الفاتورة">
        
        <label>📅 التاريخ</label>
        <input type="date" id="invoiceDate">
        
        <label>💳 طريقة الدفع</label>
        <select id="paymentMethod">
            <option value="نقدي">نقدي</option>
            <option value="أجل">أجل</option>
        </select>
        
        <button onclick="cancelEdit()" id="cancelBtn" style="display:none;background:#e67e22;">❌ إلغاء التعديل</button>
    </div>
    
    <!-- إضافة منتج -->
    <div class="box">
        <h3>➕ إضافة منتج</h3>
        <label>📦 المنتج</label>
        <select id="productSelect"><option value="">-- اختر منتج --</option></select>
        
        <label>🔢 الكمية</label>
        <input type="number" id="quantity" value="1" min="1">
        
        <label>💰 سعر البيع</label>
        <input type="number" id="salePrice" step="0.01">
        
        <div style="margin:10px 0;" id="stockDisplay">📊 المخزون: 0</div>
        
        <button onclick="addToCart()" class="btn-primary"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <!-- السلة -->
    <div class="box">
        <h3>🛒 السلة (<span id="cartCount">0</span>)</h3>
        <div id="cart"></div>
        <div style="margin-top:15px;font-size:18px;">
            <strong>الإجمالي: <span id="cartTotal" class="total">0.00</span> د.ع</strong>
        </div>
        <div style="margin-top:15px;">
            <button onclick="saveSale()" class="btn-success"><i class="fas fa-save"></i> حفظ</button>
            <button onclick="clearCart()" class="btn-danger"><i class="fas fa-trash"></i> تفريغ</button>
        </div>
    </div>
    
    <!-- بحث -->
    <div class="filter">
        <input type="text" id="searchInput" placeholder="🔍 بحث...">
        <select id="paymentFilter">
            <option value="all">الكل</option>
            <option value="نقدي">نقدي</option>
            <option value="أجل">أجل</option>
        </select>
        <button onclick="exportExcel()" style="background:#3498db;color:white;"><i class="fas fa-file-excel"></i> Excel</button>
    </div>
    
    <!-- سجل المبيعات -->
    <h3>📋 سجل المبيعات</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>#</th><th>التاريخ</th><th>رقم</th><th>العميل</th><th>المبلغ</th><th>الدفع</th><th>إجراءات</th></tr></thead>
            <tbody id="salesBody"><tr><td colspan="7">جاري التحميل...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [], allCustomers = [], allSales = [];
    let cart = [], editingId = null;
    
    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = "login.html"; }
        else { loadProducts(); loadCustomers(); loadSales(); }
    });
    
    // جلب المنتجات
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(d => allProducts.push({ id: d.id, ...d.data() }));
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p => {
            const stock = p.quantity || 0;
            select.innerHTML += `<option value="${p.id}" data-price="${p.sellingPrice||0}" data-stock="${stock}">${p.itemName||p.name} (${stock})</option>`;
        });
        document.getElementById('productSelect').onchange = function() {
            const price = this.options[this.selectedIndex]?.getAttribute('data-price') || 0;
            const stock = this.options[this.selectedIndex]?.getAttribute('data-stock') || 0;
            document.getElementById('salePrice').value = price;
            document.getElementById('stockDisplay').innerHTML = `📊 المخزون: ${stock}`;
        };
    }
    
    // جلب العملاء
    async function loadCustomers() {
        const snapshot = await db.collection('customers').get();
        allCustomers = [];
        let html = '<option value="">-- اختر عميل --</option>';
        snapshot.forEach(d => {
            allCustomers.push({ id: d.id, ...d.data() });
            html += `<option value="${d.id}">${d.data().customerName || d.data().name}</option>`;
        });
        document.getElementById('customerId').innerHTML = html;
    }
    
    // إضافة للسلة
    window.addToCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) return alert('اختر منتجاً');
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('salePrice').value);
        if (!qty || qty <= 0) return alert('أدخل كمية');
        if (!price || price <= 0) return alert('أدخل سعر');
        const stock = product.quantity || 0;
        if (stock === 0) return alert('المنتج غير متوفر');
        if (qty > stock) return alert(`المتوفر: ${stock}`);
        const existing = cart.find(i => i.productId === productId);
        if (existing) {
            if (existing.quantity + qty > stock) return alert(`المتوفر: ${stock}`);
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            cart.push({ productId, name: product.itemName || product.name, price, quantity: qty, total: price * qty });
        }
        renderCart();
        document.getElementById('quantity').value = '1';
    };
    
    function renderCart() {
        const container = document.getElementById('cart');
        let total = 0;
        if (cart.length === 0) {
            container.innerHTML = '<p style="color:#999;">السلة فارغة</p>';
            document.getElementById('cartTotal').innerText = '0.00';
            document.getElementById('cartCount').innerText = '0';
            return;
        }
        let html = '';
        cart.forEach((item, idx) => {
            total += item.total;
            html += `<div class="cart-item">
                <div><strong>${item.name}</strong> × ${item.quantity}</div>
                <div>${item.price.toFixed(2)} د.ع</div>
                <div style="font-weight:bold;">${item.total.toFixed(2)} د.ع</div>
                <div>
                    <button onclick="changeQty(${idx}, -1)" class="btn-sm" style="background:#3498db;color:white;">-</button>
                    <button onclick="changeQty(${idx}, 1)" class="btn-sm" style="background:#3498db;color:white;">+</button>
                    <button onclick="removeFromCart(${idx})" class="btn-sm" style="background:#e74c3c;color:white;">✖</button>
                </div>
            </div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerText = total.toFixed(2);
        document.getElementById('cartCount').innerText = cart.length;
    }
    
    window.changeQty = (idx, delta) => {
        const newQty = cart[idx].quantity + delta;
        if (newQty < 1) { removeFromCart(idx); return; }
        const product = allProducts.find(p => p.id === cart[idx].productId);
        if (product && newQty > (product.quantity || 0)) {
            alert(`المتوفر: ${product.quantity}`);
            return;
        }
        cart[idx].quantity = newQty;
        cart[idx].total = cart[idx].price * newQty;
        renderCart();
    };
    
    window.removeFromCart = (idx) => { cart.splice(idx, 1); renderCart(); };
    window.clearCart = () => { if(confirm('تفريغ السلة؟')) { cart = []; renderCart(); } };
    
    // حفظ الفاتورة
    window.saveSale = async () => {
        const customerId = document.getElementById('customerId').value;
        const customer = allCustomers.find(c => c.id === customerId);
        if (!customerId) return alert('اختر العميل');
        if (cart.length === 0) return alert('لا توجد منتجات');
        const total = cart.reduce((s, i) => s + i.total, 0);
        try {
            const batch = db.batch();
            for (const item of cart) {
                const productRef = db.collection('inventory').doc(item.productId);
                const docSnap = await productRef.get();
                batch.update(productRef, { quantity: (docSnap.data().quantity || 0) - item.quantity });
            }
            if (document.getElementById('paymentMethod').value === 'أجل') {
                const custRef = db.collection('customers').doc(customerId);
                const custSnap = await custRef.get();
                batch.update(custRef, { totalDebt: (custSnap.data().totalDebt || 0) + total });
            }
            const saleRef = editingId ? db.collection('sales').doc(editingId) : db.collection('sales').doc();
            const data = {
                customerId, customerName: customer?.customerName || customer?.name || '',
                invoiceNumber: document.getElementById('invoiceNumber').value || 'INV-' + Date.now(),
                date: document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0],
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart, total, timestamp: new Date()
            };
            if (editingId) {
                await saleRef.update({...data, updatedAt: new Date()});
                alert('تم التحديث');
                cancelEdit();
            } else {
                await saleRef.set(data);
                alert('تم حفظ الفاتورة');
            }
            cart = [];
            renderCart();
            document.getElementById('customerId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceDate').value = '';
            await loadProducts();
            await loadSales();
        } catch (error) {
            alert('خطأ: ' + error.message);
        }
    };
    
    // تحميل المبيعات
    async function loadSales() {
        const snapshot = await db.collection('sales').orderBy('timestamp', 'desc').get();
        allSales = [];
        snapshot.forEach(d => allSales.push({ id: d.id, ...d.data() }));
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filter = document.getElementById('paymentFilter').value;
        let filtered = allSales;
        if (search) filtered = filtered.filter(s => (s.invoiceNumber||'').toLowerCase().includes(search) || (s.customerName||'').toLowerCase().includes(search));
        if (filter !== 'all') filtered = filtered.filter(s => s.paymentMethod === filter);
        const tbody = document.getElementById('salesBody');
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="7">لا توجد مبيعات</td></tr>'; return; }
        let html = '';
        filtered.forEach((s, idx) => {
            html += `<tr>
                <td>${idx+1}</td>
                <td>${s.date||'-'}</td>
                <td>${s.invoiceNumber||'-'}</td>
                <td>${s.customerName||'-'}</td>
                <td>${(s.total||0).toFixed(2)}</td>
                <td><span class="badge ${s.paymentMethod==='نقدي'?'badge-success':'badge-warning'}">${s.paymentMethod||'-'}</span></td>
                <td>
                    <button class="btn-sm" style="background:#f39c12;color:white;" onclick="editInvoice('${s.id}')">✏️</button>
                    <button class="btn-sm" style="background:#e74c3c;color:white;" onclick="deleteInvoice('${s.id}')">🗑️</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    window.editInvoice = (id) => {
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        editingId = id;
        document.getElementById('customerId').value = invoice.customerId || '';
        document.getElementById('invoiceNumber').value = invoice.invoiceNumber || '';
        document.getElementById('invoiceDate').value = invoice.date || '';
        document.getElementById('paymentMethod').value = invoice.paymentMethod || 'نقدي';
        cart = invoice.items.map(item => ({ ...item }));
        renderCart();
        document.getElementById('cancelBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    
    window.cancelEdit = () => {
        editingId = null;
        cart = [];
        renderCart();
        document.getElementById('cancelBtn').style.display = 'none';
        document.getElementById('customerId').value = '';
        document.getElementById('invoiceNumber').value = '';
        document.getElementById('invoiceDate').value = '';
    };
    
    window.deleteInvoice = async (id) => {
        if (!confirm('حذف الفاتورة؟')) return;
        const invoice = allSales.find(s => s.id === id);
        if (!invoice) return;
        try {
            if (invoice.items) {
                for (const item of invoice.items) {
                    const productRef = db.collection('inventory').doc(item.productId);
                    const docSnap = await productRef.get();
                    if (docSnap.exists) await productRef.update({ quantity: (docSnap.data().quantity||0) + item.quantity });
                }
            }
            if (invoice.paymentMethod === 'أجل') {
                const custRef = db.collection('customers').doc(invoice.customerId);
                const custSnap = await custRef.get();
                if (custSnap.exists) await custRef.update({ totalDebt: (custSnap.data().totalDebt||0) - (invoice.total||0) });
            }
            await db.collection('sales').doc(id).delete();
            alert('تم الحذف');
            loadSales();
        } catch (error) { alert('خطأ: '+error.message); }
    };
    
    window.exportExcel = () => {
        let csv = 'رقم,التاريخ,العميل,المبلغ\n';
        allSales.forEach(s => csv += `${s.invoiceNumber||''},${s.date||''},${s.customerName||''},${(s.total||0).toFixed(2)}\n`);
        const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `المبيعات.csv`;
        link.click();
        alert('تم التصدير');
    };
    
    document.getElementById('searchInput').addEventListener('input', loadSales);
    document.getElementById('paymentFilter').addEventListener('change', loadSales);
</script>
</body>
</html>
