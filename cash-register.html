<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق الكاش - مكتب حاج فاضل</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 25px; }
        h2 { color: #1e3c72; margin-bottom: 20px; border-right: 4px solid #3498db; padding-right: 15px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 20px; text-align: center; }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        .stat-card .label { font-size: 12px; opacity: 0.9; }
        .stat-card.success { background: linear-gradient(135deg, #00b09b, #96c93d); }
        .stat-card.danger { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        .form-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-danger { background: #e74c3c; }
        .btn-warning { background: #e67e22; }
        .btn-info { background: #3498db; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
        .income { color: #27ae60; font-weight: bold; }
        .expense { color: #e74c3c; font-weight: bold; }
        
        .shift-info { background: #e8f4fd; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        
        @media (max-width: 768px) { .container { padding: 15px; } th, td { font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-cash-register"></i> صندوق الكاش</h2>
    
    <!-- حالة الوردية -->
    <div class="shift-info" id="shiftInfo">
        <span><i class="fas fa-info-circle"></i> حالة الصندوق: <strong id="shiftStatus">غير مفتوح</strong></span>
        <span><i class="fas fa-user"></i> المشرف: <strong id="shiftCashier">-</strong></span>
        <span><i class="fas fa-calendar"></i> وقت الفتح: <strong id="shiftOpenTime">-</strong></span>
    </div>
    
    <!-- إحصائيات سريعة -->
    <div class="stats-grid">
        <div class="stat-card"><div class="number" id="currentBalance">0.00</div><div class="label">الرصيد الحالي</div></div>
        <div class="stat-card success"><div class="number" id="todayIncome">0.00</div><div class="label">إيداعات اليوم</div></div>
        <div class="stat-card danger"><div class="number" id="todayExpense">0.00</div><div class="label">مصروفات اليوم</div></div>
    </div>
    
    <!-- نموذج إضافة حركة (يظهر فقط عندما تكون الوردية مفتوحة) -->
    <div class="form-card" id="transactionForm" style="display:none;">
        <h3>➕ إضافة حركة جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>النوع</label>
                <select id="transactionType">
                    <option value="income">💰 إيداع (داخل)</option>
                    <option value="expense">💸 صرف (خارج)</option>
                </select>
            </div>
            <div class="form-group"><label>المبلغ</label><input type="number" id="amount" placeholder="المبلغ" step="0.01"></div>
            <div class="form-group"><label>السبب/البيان</label><input type="text" id="note" placeholder="مثال: شراء بضاعة، سداد فاتورة..."></div>
            <div class="form-group"><label>طريقة الدفع</label>
                <select id="paymentMethod">
                    <option value="cash">نقدي</option>
                    <option value="bank">تحويل بنكي</option>
                </select>
            </div>
        </div>
        <button onclick="addTransaction()"><i class="fas fa-plus"></i> إضافة حركة</button>
    </div>
    
    <!-- أزرار التحكم بالصندوق -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
        <button id="openShiftBtn" onclick="openShift()" style="background:#27ae60"><i class="fas fa-unlock-alt"></i> فتح الوردية</button>
        <button id="closeShiftBtn" onclick="closeShift()" style="background:#e74c3c; display:none;"><i class="fas fa-lock"></i> إغلاق الوردية</button>
        <button onclick="printShiftReport()" style="background:#3498db"><i class="fas fa-print"></i> طباعة تقرير الوردية</button>
    </div>
    
    <!-- جدول الحركات -->
    <h3><i class="fas fa-list"></i> حركات الصندوق</h3>
    <div style="overflow-x: auto;">
        <table id="transactionsTable">
            <thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>البيان</th><th>طريقة الدفع</th><th>المسجل</th></tr></thead>
            <tbody id="transactionsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentShiftId = null;
    let currentUser = null;
    
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await checkActiveShift();
            loadTodayTransactions();
        } else {
            window.location.href = "login.html";
        }
    });
    
    // التحقق من وجود وردية مفتوحة
    async function checkActiveShift() {
        const today = new Date().toDateString();
        const q = await db.collection('cash_registers')
            .where('status', '==', 'open')
            .where('cashierId', '==', currentUser.uid)
            .get();
        
        if (!q.empty) {
            q.forEach(doc => {
                currentShiftId = doc.id;
                const data = doc.data();
                document.getElementById('shiftStatus').innerHTML = '🟢 مفتوحة';
                document.getElementById('shiftCashier').innerText = data.cashierName || currentUser.email;
                document.getElementById('shiftOpenTime').innerText = new Date(data.openTime).toLocaleString('ar-EG');
                document.getElementById('currentBalance').innerText = (data.balance || 0).toFixed(2);
                document.getElementById('transactionForm').style.display = 'block';
                document.getElementById('openShiftBtn').style.display = 'none';
                document.getElementById('closeShiftBtn').style.display = 'inline-block';
            });
        } else {
            document.getElementById('shiftStatus').innerHTML = '🔴 مغلقة';
            document.getElementById('currentBalance').innerText = '0.00';
            document.getElementById('transactionForm').style.display = 'none';
            document.getElementById('openShiftBtn').style.display = 'inline-block';
            document.getElementById('closeShiftBtn').style.display = 'none';
        }
    }
    
    // فتح وردية جديدة
    window.openShift = async function() {
        const startingBalance = parseFloat(prompt('الرصيد الافتتاحي للصندوق:', '0'));
        if (isNaN(startingBalance)) return;
        
        try {
            const shiftRef = await db.collection('cash_registers').add({
                cashierId: currentUser.uid,
                cashierName: currentUser.email,
                openTime: new Date().toISOString(),
                status: 'open',
                startingBalance: startingBalance,
                balance: startingBalance,
                transactions: []
            });
            currentShiftId = shiftRef.id;
            alert('تم فتح الوردية بنجاح!');
            location.reload();
        } catch (error) {
            alert('خطأ: ' + error.message);
        }
    };
    
    // إغلاق الوردية
    window.closeShift = async function() {
        const endBalance = parseFloat(prompt('الرصيد الفعلي في الصندوق:', document.getElementById('currentBalance').innerText));
        if (isNaN(endBalance)) return;
        
        if (confirm('هل أنت متأكد من إغلاق الوردية؟')) {
            try {
                await db.collection('cash_registers').doc(currentShiftId).update({
                    status: 'closed',
                    closeTime: new Date().toISOString(),
                    endBalance: endBalance
                });
                alert('تم إغلاق الوردية بنجاح!');
                location.reload();
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        }
    };
    
    // إضافة حركة (إيداع أو صرف)
    window.addTransaction = async function() {
        if (!currentShiftId) {
            alert('الرجاء فتح الوردية أولاً');
            return;
        }
        
        const type = document.getElementById('transactionType').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const note = document.getElementById('note').value.trim();
        const paymentMethod = document.getElementById('paymentMethod').value;
        
        if (!amount || amount <= 0) {
            alert('الرجاء إدخال مبلغ صحيح');
            return;
        }
        if (!note) {
            alert('الرجاء كتابة سبب الحركة');
            return;
        }
        
        try {
            const shiftRef = db.collection('cash_registers').doc(currentShiftId);
            const shiftDoc = await shiftRef.get();
            const shiftData = shiftDoc.data();
            const newBalance = type === 'income' ? shiftData.balance + amount : shiftData.balance - amount;
            
            const transaction = {
                id: Date.now().toString(),
                type: type,
                amount: amount,
                note: note,
                paymentMethod: paymentMethod,
                date: new Date().toISOString(),
                cashier: currentUser.email
            };
            
            await shiftRef.update({
                balance: newBalance,
                transactions: firebase.firestore.FieldValue.arrayUnion(transaction)
            });
            
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            document.getElementById('currentBalance').innerText = newBalance.toFixed(2);
            loadTodayTransactions();
            showAlert('تمت إضافة الحركة بنجاح', 'success');
        } catch (error) {
            alert('خطأ: ' + error.message);
        }
    };
    
    // تحميل حركات اليوم
    async function loadTodayTransactions() {
        const tbody = document.getElementById('transactionsBody');
        tbody.innerHTML = '<tr><td colspan="6">جاري التحميل...</td></tr>';
        
        try {
            let allTransactions = [];
            let totalIncome = 0, totalExpense = 0;
            
            if (currentShiftId) {
                const shiftDoc = await db.collection('cash_registers').doc(currentShiftId).get();
                const shiftData = shiftDoc.data();
                allTransactions = shiftData.transactions || [];
            } else {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                
                const closedShifts = await db.collection('cash_registers')
                    .where('closeTime', '>=', today.toISOString())
                    .where('closeTime', '<', tomorrow.toISOString())
                    .get();
                
                closedShifts.forEach(doc => {
                    const data = doc.data();
                    if (data.transactions) allTransactions.push(...data.transactions);
                });
            }
            
            if (allTransactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">لا توجد حركات اليوم</td></tr>';
                document.getElementById('todayIncome').innerText = '0.00';
                document.getElementById('todayExpense').innerText = '0.00';
                return;
            }
            
            allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            let html = '';
            allTransactions.forEach(t => {
                const amountClass = t.type === 'income' ? 'income' : 'expense';
                const sign = t.type === 'income' ? '+' : '-';
                totalIncome += t.type === 'income' ? t.amount : 0;
                totalExpense += t.type === 'expense' ? t.amount : 0;
                const dateStr = new Date(t.date).toLocaleString('ar-EG');
                const typeText = t.type === 'income' ? '💰 إيداع' : '💸 صرف';
                
                html += `<tr>
                    <td>${dateStr}</td>
                    <td>${typeText}</td>
                    <td class="${amountClass}">${sign} ${t.amount.toFixed(2)}</td>
                    <td>${t.note}</td>
                    <td>${t.paymentMethod === 'cash' ? 'نقدي' : 'تحويل بنكي'}</td>
                    <td>${t.cashier || '-'}</td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
            document.getElementById('todayIncome').innerText = totalIncome.toFixed(2);
            document.getElementById('todayExpense').innerText = totalExpense.toFixed(2);
            
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="6">خطأ في التحميل</td></tr>';
        }
    }
    
    // طباعة التقرير
    window.printShiftReport = function() {
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html dir="rtl">
            <head><title>تقرير الصندوق</title>
            <style>
                body { font-family: 'Cairo', sans-serif; padding: 20px; }
                table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
                .header { text-align: center; margin-bottom: 30px; }
                .income { color: green; }
                .expense { color: red; }
            </style>
            </head>
            <body>
                <div class="header">
                    <h2>مكتب حاج فاضل</h2>
                    <h3>تقرير حركات الصندوق</h3>
                    <p>التاريخ: ${new Date().toLocaleString('ar-EG')}</p>
                </div>
                <table>
                    <thead><tr><th>التاريخ</th><th>النوع</th><th>المبلغ</th><th>البيان</th><th>طريقة الدفع</th></tr></thead>
                    <tbody>
                        ${Array.from(document.querySelectorAll('#transactionsBody tr')).map(row => {
                            if (row.cells.length > 1) {
                                return `<tr>${Array.from(row.cells).map(cell => `<td>${cell.innerText}</td>`).join('')}</tr>`;
                            }
                            return '';
                        }).join('')}
                    </tbody>
                </table>
                <p><strong>الإيداعات:</strong> ${document.getElementById('todayIncome').innerText}</p>
                <p><strong>المصروفات:</strong> ${document.getElementById('todayExpense').innerText}</p>
                <p><strong>الرصيد الحالي:</strong> ${document.getElementById('currentBalance').innerText}</p>
            </body>
            </html>
        `);
        printWindow.print();
        printWindow.close();
    };
    
    function showAlert(msg, type) {
        const alertDiv = document.createElement('div');
        alertDiv.style.cssText = `position:fixed; top:20px; left:50%; transform:translateX(-50%); background:${type === 'success' ? '#27ae60' : '#e74c3c'}; color:white; padding:12px 24px; border-radius:8px; z-index:9999;`;
        alertDiv.innerText = msg;
        document.body.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), 3000);
    }
</script>
</body>
</html>
