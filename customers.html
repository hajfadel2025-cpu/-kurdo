<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العملاء - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #1abc9c;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        .btn-danger{background:#e74c3c}
        .btn-sm{padding:5px 10px;font-size:12px}
        .badge{padding:3px 10px;border-radius:12px;font-size:11px}
        .badge-danger{background:#f8d7da;color:#721c24}
        .badge-success{background:#d4edda;color:#155724}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-users"></i> إدارة العملاء</h2>
    
    <div class="form-card">
        <h3>➕ إضافة عميل جديد</h3>
        <div class="form-grid">
            <input type="text" id="custName" placeholder="اسم العميل *">
            <input type="text" id="custPhone" placeholder="رقم الهاتف">
            <input type="text" id="custAddress" placeholder="العنوان">
            <input type="text" id="custEmail" placeholder="البريد الإلكتروني">
        </div>
        <button onclick="addCustomer()" style="margin-top:15px;"><i class="fas fa-save"></i> إضافة عميل</button>
    </div>
    
    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>العميل</th><th>الهاتف</th><th>العنوان</th><th>الرصيد</th><th>الحالة</th><th>إجراءات</th></tr></thead>
            <tbody id="customersList"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else loadCustomers();});
    
    async function loadCustomers(){
        const snapshot=await db.collection('customers').get();
        let html='';
        snapshot.forEach(doc=>{
            const c=doc.data();
            const debt=c.totalDebt||0;
            const badge=debt>100?'<span class="badge badge-danger">متأخر</span>':debt>0?'<span class="badge badge-warning">عليه دين</span>':'<span class="badge badge-success">خالص</span>';
            html+=`<tr><td><strong>${c.customerName||c.name}</strong></td><td>${c.phone||'-'}</td><td>${c.address||'-'}</td><td>${debt.toFixed(2)} د.ع</td><td>${badge}</td><td><button class="btn-sm btn-danger" onclick="deleteCustomer('${doc.id}')">حذف</button></td></tr>`;
        });
        document.getElementById('customersList').innerHTML=html||'<tr><td colspan="6">لا يوجد عملاء</td></tr>';
    }
    
    window.addCustomer=async()=>{
        const name=document.getElementById('custName').value.trim();
        if(!name) return alert('اسم العميل مطلوب');
        await db.collection('customers').add({
            customerName:name,name:name,
            phone:document.getElementById('custPhone').value,
            address:document.getElementById('custAddress').value,
            email:document.getElementById('custEmail').value,
            totalDebt:0,
            createdAt:new Date()
        });
        alert('تمت الإضافة');
        document.getElementById('custName').value='';
        document.getElementById('custPhone').value='';
        document.getElementById('custAddress').value='';
        document.getElementById('custEmail').value='';
        loadCustomers();
    };
    
    window.deleteCustomer=async(id)=>{if(confirm('حذف العميل؟')){await db.collection('customers').doc(id).delete(); loadCustomers();}};
</script>
</body>
</html>
