<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشتريات - مكتب حاج فاضل</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 25px; }
        h2 { color: #1e3c72; margin-bottom: 20px; border-right: 4px solid #27ae60; padding-right: 15px; }
        
        .form-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
        
        @media (max-width: 768px) { th, td { font-size: 11px; } }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-truck"></i> فواتير المشتريات (من الموردين)</h2>
    
    <div class="form-card">
        <h3>➕ فاتورة شراء جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>🏪 اسم المورد</label><input type="text" id="supplierName" placeholder="اسم المورد"></div>
            <div class="form-group"><label>📞 رقم المورد</label><input type="text" id="supplierPhone" placeholder="رقم الهاتف"></div>
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر الشراء</label><input type="number" id="purchasePrice" step="0.01"></div>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button onclick="addToPurchaseCart()"><i class="fas fa-plus"></i> إضافة للسلة</button>
            <button onclick="savePurchase()" style="background:#3498db"><i class="fas fa-save"></i> حفظ فاتورة الشراء</button>
        </div>
    </div>
    
    <h3>🛒 سلة المشتريات</h3>
    <div id="purchaseCart" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px;"></div>
    
    <div style="margin: 15px 0;"><strong>الإجمالي: <span id="cartTotal">0.00</span> د.ع</strong></div>
    
    <h3>📋 سجل المشتريات</h3>
    <div style="overflow-x: auto;">
        <table id="purchasesTable">
            <thead><tr><th>التاريخ</th><th>المورد</th><th>المنتجات</th><th>الإجمالي</th></tr></thead>
            <tbody id="purchasesBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [];
    let purchaseCart = [];
    
    auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; else { loadProducts(); loadPurchases(); } });
    
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p => select.innerHTML += `<option value="${p.id}" data-price="${p.costPrice || 0}">${p.itemName || p.name}</option>`);
        
        document.getElementById('productSelect').onchange = function() {
            const price = this.selectedOptions[0]?.getAttribute('data-price') || 0;
            document.getElementById('purchasePrice').value = price;
        };
    }
    
    window.addToPurchaseCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) { alert('اختر منتجاً'); return; }
        
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('purchasePrice').value);
        
        if (!qty || qty <= 0) { alert('أدخل كمية صحيحة'); return; }
        if (!price || price <= 0) { alert('أدخل سعر شراء صحيح'); return; }
        
        const existing = purchaseCart.find(i => i.productId === productId);
        if (existing) {
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            purchaseCart.push({
                productId: productId,
                name: product.itemName || product.name,
                price: price,
                quantity: qty,
                total: price * qty
            });
        }
        renderPurchaseCart();
    };
    
    function renderPurchaseCart() {
        const container = document.getElementById('purchaseCart');
        let total = 0;
        if (purchaseCart.length === 0) { container.innerHTML = '<p>السلة فارغة</p>'; document.getElementById('cartTotal').innerText = '0.00'; return; }
        
        let html = '';
        purchaseCart.forEach((item, idx) => {
            total += item.total;
            html += `<div class="cart-item"><div><strong>${item.name}</strong><br>${item.price} د.ع</div><div>الكمية: ${item.quantity}</div><div>${item.total.toFixed(2)} د.ع</div><div><button onclick="removeFromPurchaseCart(${idx})" style="background:#e74c3c; padding:3px 8px;">✖</button></div></div>`;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerText = total.toFixed(2);
    }
    
    window.removeFromPurchaseCart = (idx) => { purchaseCart.splice(idx, 1); renderPurchaseCart(); };

        const supplierName = document.getElementById('supplierName').value.trim();
        if (!supplierName) { alert('الرجاء إدخال اسم المورد'); return; }
        if (purchaseCart.length === 0) { alert('لا توجد منتجات في فاتورة الشراء'); return; }
        
        const total = purchaseCart.reduce((sum, i) => sum + i.total, 0);
        
        try {
            // إضافة الكميات إلى المخزون وزيادة سعر الشراء (المعدل)

                const productDoc = await
