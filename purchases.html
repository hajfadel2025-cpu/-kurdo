<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشتريات - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px}
        .container{max-width:1400px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #2ecc71;padding-right:15px;margin-bottom:20px}
        .form-card{background:#f8f9fa;padding:20px;border-radius:15px;margin-bottom:20px}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
        .form-group label{display:block;font-size:12px;color:#666;margin-bottom:5px}
        .form-group input,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
        button{padding:10px 20px;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer}
        .cart-item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee;flex-wrap:wrap;gap:10px}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:center}
        th{background:#1e3c72;color:white}
        @media(max-width:768px){th,td{font-size:11px;padding:6px}}
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-truck"></i> المشتريات</h2>
    
    <div class="form-card">
        <h3>➕ فاتورة شراء جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>🏪 المورد</label>
                <select id="supplierId"><option value="">-- اختر مورد --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
        </div>
    </div>
    
    <div class="form-card">
        <h3>➕ إضافة منتج</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر الشراء</label><input type="number" id="purchasePrice" step="0.01"></div>
        </div>
        <button onclick="addToCart()" style="margin-top:15px;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <h3>🛒 سلة المشتريات</h3>
    <div id="cart" style="max-height:250px;overflow-y:auto;margin-bottom:15px;border:1px solid #eee;border-radius:10px;padding:10px;"></div>
    <div style="margin:15px 0;padding:10px;background:#f0f0f0;border-radius:10px;">
        <strong>الإجمالي: <span id="cartTotal" style="font-size:20px;color:#27ae60;">0.00</span> د.ع</strong>
    </div>
    
    <button onclick="savePurchase()" style="width:100%;"><i class="fas fa-save"></i> حفظ فاتورة الشراء</button>
    
    <h3>📋 سجل المشتريات</h3>
    <div style="overflow-x:auto;">
        <table id="purchasesTable">
            <thead><tr><th>التاريخ</th><th>رقم الفاتورة</th><th>المورد</th><th>الإجمالي</th></tr></thead>
            <tbody id="purchasesBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts=[], allSuppliers=[], cart=[];
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"; else {loadProducts(); loadSuppliers(); loadPurchases();}});
    
    async function loadProducts() {
        const snapshot=await db.collection('inventory').get();
        allProducts=[]; snapshot.forEach(d=>allProducts.push({id:d.id,...d.data()}));
        const select=document.getElementById('productSelect');
        select.innerHTML='<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p=>select.innerHTML+=`<option value="${p.id}" data-price="${p.costPrice||0}">${p.itemName||p.name}</option>`);
        document.getElementById('productSelect').onchange=function(){document.getElementById('purchasePrice').value=this.options[this.selectedIndex]?.getAttribute('data-price')||0;};
    }
    
    async function loadSuppliers() {
        const snapshot=await db.collection('suppliers').get();
        allSuppliers=[]; let html='<option value="">-- اختر مورد --</option>';
        snapshot.forEach(d=>{allSuppliers.push({id:d.id,...d.data()}); html+=`<option value="${d.id}">${d.data().name}</option>`;});
        document.getElementById('supplierId').innerHTML=html;
    }
    
    window.addToCart=()=>{
        const productId=document.getElementById('productSelect').value;
        const product=allProducts.find(p=>p.id===productId);
        if(!product) return alert('اختر منتجاً');
        const qty=parseInt(document.getElementById('quantity').value);
        const price=parseFloat(document.getElementById('purchasePrice').value);
        if(!qty||qty<=0) return alert('أدخل كمية صحيحة');
        if(!price||price<=0) return alert('أدخل سعر شراء صحيح');
        const existing=cart.find(i=>i.productId===productId);
        if(existing){existing.quantity+=qty; existing.total=existing.price*existing.quantity;}
        else cart.push({productId,name:product.itemName||product.name,price,quantity:qty,total:price*qty});
        renderCart();
        document.getElementById('quantity').value='1';
    };
    
    function renderCart(){
        const container=document.getElementById('cart');
        let total=0;
        if(cart.length===0){container.innerHTML='<p style="text-align:center;color:#999;">السلة فارغة</p>'; document.getElementById('cartTotal').innerText='0.00'; return;}
        let html='';
        cart.forEach((item,idx)=>{total+=item.total; html+=`<div class="cart-item"><div><strong>${item.name}</strong><br>${item.price} د.ع</div><div>الكمية: ${item.quantity}</div><div>${item.total.toFixed(2)} د.ع</div><div><button onclick="removeFromCart(${idx})" style="background:#e74c3c;padding:3px 8px;border-radius:5px;color:white;">✖</button></div></div>`;});
