<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المشتريات - نظام المخازن</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 25px; }
        h2 { color: #1e3c72; margin-bottom: 20px; border-right: 4px solid #27ae60; padding-right: 15px; }
        
        .form-card { background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-danger { background: #e74c3c; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1e3c72; color: white; }
        
        .badge { padding: 3px 10px; border-radius: 15px; font-size: 11px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #ffeaa7; color: #856404; }
        
        @media (max-width: 768px) { th, td { font-size: 11px; padding: 6px; } }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-truck"></i> فواتير المشتريات</h2>
    
    <div class="form-card">
        <h3>➕ فاتورة شراء جديدة</h3>
        <div class="form-grid">
            <div class="form-group"><label>🏪 المورد</label>
                <select id="supplierId"><option value="">-- اختر مورد --</option></select>
            </div>
            <div class="form-group"><label>📞 رقم الفاتورة</label><input type="text" id="invoiceNumber" placeholder="رقم الفاتورة"></div>
            <div class="form-group"><label>📅 التاريخ</label><input type="date" id="invoiceDate"></div>
            <div class="form-group"><label>💳 طريقة الدفع</label>
                <select id="paymentMethod"><option value="نقدي">نقدي</option><option value="أجل">أجل</option></select>
            </div>
        </div>
    </div>
    
    <div class="form-card">
        <h3>➕ إضافة منتج للفاتورة</h3>
        <div class="form-grid">
            <div class="form-group"><label>📦 المنتج</label>
                <select id="productSelect"><option value="">-- اختر منتج --</option></select>
            </div>
            <div class="form-group"><label>🔢 الكمية</label><input type="number" id="quantity" value="1" min="1"></div>
            <div class="form-group"><label>💰 سعر الشراء</label><input type="number" id="purchasePrice" step="0.01"></div>
        </div>
        <button onclick="addToPurchaseCart()" style="margin-top:15px;"><i class="fas fa-plus"></i> إضافة للسلة</button>
    </div>
    
    <h3>🛒 سلة المشتريات</h3>
    <div id="purchaseCart" style="max-height: 250px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #eee; border-radius: 10px; padding: 10px;"></div>
    
    <div style="margin: 15px 0; padding: 10px; background: #f0f0f0; border-radius: 10px;">
        <strong>الإجمالي: <span id="cartTotal" style="font-size: 20px; color: #27ae60;">0.00</span> د.ع</strong>
    </div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <button onclick="savePurchase()" style="background:#27ae60; flex:1;"><i class="fas fa-save"></i> حفظ فاتورة الشراء</button>
        <button onclick="clearCart()" style="background:#95a5a6; flex:1;"><i class="fas fa-trash"></i> تفريغ السلة</button>
    </div>
    
    <h3>📋 سجل المشتريات</h3>
    <div style="overflow-x: auto;">
        <table id="purchasesTable">
            <thead><tr><th>التاريخ</th><th>رقم الفاتورة</th><th>المورد</th><th>الإجمالي</th><th>طريقة الدفع</th></tr></thead>
            <tbody id="purchasesBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let allProducts = [];
    let allSuppliers = [];
    let purchaseCart = [];
    let editingId = null;
    
    auth.onAuthStateChanged(user => { if (!user) window.location.href = "login.html"; else { loadProducts(); loadSuppliers(); loadPurchases(); } });
    
    async function loadProducts() {
        const snapshot = await db.collection('inventory').get();
        allProducts = [];
        snapshot.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- اختر منتج --</option>';
        allProducts.forEach(p => select.innerHTML += `<option value="${p.id}" data-price="${p.costPrice || 0}">${p.itemName || p.name}</option>`);
        
        document.getElementById('productSelect').onchange = function() {
            const price = this.selectedOptions[0]?.getAttribute('data-price') || 0;
            document.getElementById('purchasePrice').value = price;
        };
    }
    
    async function loadSuppliers() {
        const snapshot = await db.collection('suppliers').get();
        allSuppliers = [];
        let html = '<option value="">-- اختر مورد --</option>';
        snapshot.forEach(doc => {
            allSuppliers.push({ id: doc.id, ...doc.data() });
            html += `<option value="${doc.id}">${doc.data().name}</option>`;
        });
        document.getElementById('supplierId').innerHTML = html;
    }
    
    window.addToPurchaseCart = () => {
        const productId = document.getElementById('productSelect').value;
        const product = allProducts.find(p => p.id === productId);
        if (!product) { alert('اختر منتجاً'); return; }
        
        const qty = parseInt(document.getElementById('quantity').value);
        const price = parseFloat(document.getElementById('purchasePrice').value);
        
        if (!qty || qty <= 0) { alert('أدخل كمية صحيحة'); return; }
        if (!price || price <= 0) { alert('أدخل سعر شراء صحيح'); return; }
        
        const existing = purchaseCart.find(i => i.productId === productId);
        if (existing) {
            existing.quantity += qty;
            existing.total = existing.price * existing.quantity;
        } else {
            purchaseCart.push({
                productId: productId,
                name: product.itemName || product.name,
                price: price,
                quantity: qty,
                total: price * qty
            });
        }
        renderPurchaseCart();
        document.getElementById('quantity').value = '1';
    };
    
    function renderPurchaseCart() {
        const container = document.getElementById('purchaseCart');
        let total = 0;
        if (purchaseCart.length === 0) { 
            container.innerHTML = '<p style="text-align:center; color:#999;">السلة فارغة</p>'; 
            document.getElementById('cartTotal').innerText = '0.00'; 
            return; 
        }
        
        let html = '';
        purchaseCart.forEach((item, idx) => {
            total += item.total;
            html += `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.price} د.ع</div>
                    <div>الكمية: <button onclick="changeQty(${idx}, -1)">-</button> ${item.quantity} <button onclick="changeQty(${idx}, 1)">+</button></div>
                    <div>${item.total.toFixed(2)} د.ع</div>
                    <div><button onclick="removeFromPurchaseCart(${idx})" style="background:#e74c3c; padding:3px 8px; border-radius:5px; color:white;">✖</button></div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById('cartTotal').innerText = total.toFixed(2);
    }
    
    window.changeQty = (idx, delta) => {
        const newQty = purchaseCart[idx].quantity + delta;
        if (newQty < 1) { removeFromPurchaseCart(idx); return; }
        purchaseCart[idx].quantity = newQty;
        purchaseCart[idx].total = purchaseCart[idx].price * newQty;
        renderPurchaseCart();
    };
    
    window.removeFromPurchaseCart = (idx) => { 
        purchaseCart.splice(idx, 1); 
        renderPurchaseCart(); 
    };
    
    window.clearCart = () => {
        if (confirm('هل تريد تفريغ السلة؟')) {
            purchaseCart = [];
            renderPurchaseCart();
        }
    };
    
    window.savePurchase = async () => {
        const supplierId = document.getElementById('supplierId').value;
        const supplier = allSuppliers.find(s => s.id === supplierId);
        const invoiceNumber = document.getElementById('invoiceNumber').value.trim();
        const invoiceDate = document.getElementById('invoiceDate').value || new Date().toISOString().split('T')[0];
        const paymentMethod = document.getElementById('paymentMethod').value;
        
        if (!supplierId) { alert('الرجاء اختيار المورد'); return; }
        if (purchaseCart.length === 0) { alert('لا توجد منتجات في فاتورة الشراء'); return; }
        
        const total = purchaseCart.reduce((sum, i) => sum + i.total, 0);
        
        try {
            const batch = db.batch();
            
            // 1. زيادة الكمية في المخزن
            for (const item of purchaseCart) {
                const productRef = db.collection('inventory').doc(item.productId);
                const productDoc = await productRef.get();
                const oldQty = productDoc.data().quantity || 0;
                batch.update(productRef, { quantity: oldQty + item.quantity });
            }
            
            // 2. تحديث رصيد المورد (إذا كان الدفع أجل)
            if (paymentMethod === 'أجل') {
                const supplierRef = db.collection('suppliers').doc(supplierId);
                const supSnap = await supplierRef.get();
                const oldBalance = supSnap.data().balance || 0;
                batch.update(supplierRef, { balance: oldBalance + total });
            }
            
            // 3. حفظ فاتورة الشراء مع ربطها بالمورد
            const purchaseRef = db.collection('purchases').doc();
            batch.set(purchaseRef, {
                supplierId: supplierId,
                supplierName: supplier?.name || '',
                invoiceNumber: invoiceNumber || 'PU-' + Date.now(),
                date: invoiceDate,
                paymentMethod: paymentMethod,
                items: purchaseCart,
                total: total,
                timestamp: new Date()
            });
            
            await batch.commit();
            alert('✅ تم حفظ فاتورة الشراء وتحديث المخزن والمورد بنجاح');
            
            // 4. تفريغ السلة وإعادة تحميل البيانات
            purchaseCart = [];
            renderPurchaseCart();
            document.getElementById('supplierId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceDate').value = '';
            document.getElementById('paymentMethod').value = 'نقدي';
            await loadProducts();
            await loadPurchases();
            
        } catch (error) {
            console.error("خطأ:", error);
            alert('❌ حدث خطأ: ' + error.message);
        }
    };
    
    async function loadPurchases() {
        const snapshot = await db.collection('purchases').orderBy('timestamp', 'desc').get();
        const tbody = document.getElementById('purchasesBody');
        if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="5">لا توجد مشتريات مسجلة</td></tr>';
            return;
        }
        
        let html = '';
        snapshot.forEach(doc => {
            const p = doc.data();
            html += `<tr>
                <td>${p.date || '-'}</td>
                <td>${p.invoiceNumber || '-'}</td>
                <td><strong>${p.supplierName || '-'}</strong></td>
                <td>${(p.total || 0).toFixed(2)} د.ع</td>
                <td><span class="badge ${p.paymentMethod === 'نقدي' ? 'badge-success' : 'badge-warning'}">${p.paymentMethod || '-'}</span></td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
</script>
</body>
</html>
