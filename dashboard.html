<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h1{color:#1e3c72;margin-bottom:20px;border-right:4px solid #3498db;padding-right:15px}
        .nav-menu{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:25px;background:#f8f9fa;padding:15px;border-radius:15px}
        .nav-item{padding:8px 20px;border-radius:25px;text-decoration:none;font-weight:bold;color:white}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:25px}
        .stat{background:#f8f9fa;padding:20px;border-radius:15px;text-align:center}
        .stat .num{font-size:28px;font-weight:bold;color:#1e3c72}
        .stat .txt{color:#666;font-size:12px}
        .footer{text-align:center;margin-top:20px;color:#666}
        @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-landmark"></i> نظام إدارة المخازن والمبيعات</h1>
    
    <div class="nav-menu">
        <a href="suppliers.html" class="nav-item" style="background:#2ecc71">🏪 الموردين</a>
        <a href="inventory.html" class="nav-item" style="background:#e74c3c">📦 المخزن</a>
        <a href="sales.html" class="nav-item" style="background:#3498db">🛒 المبيعات</a>
        <a href="purchases.html" class="nav-item" style="background:#1abc9c">🚚 المشتريات</a>
        <a href="customers.html" class="nav-item" style="background:#27ae60">👥 العملاء</a>
        <a href="mandubs.html" class="nav-item" style="background:#9b59b6">👤 المندوبين</a>
        <a href="cash-register.html" class="nav-item" style="background:#f39c12">💰 صندوق الكاش</a>
        <a href="invoice-manager.html" class="nav-item" style="background:#8e44ad">📄 فواتير مبيعات</a>
    </div>
    
    <div class="stats">
        <div class="stat"><div class="num" id="productsCount">0</div><div class="txt">المنتجات</div></div>
        <div class="stat"><div class="num" id="customersCount">0</div><div class="txt">العملاء</div></div>
        <div class="stat"><div class="num" id="suppliersCount">0</div><div class="txt">الموردين</div></div>
        <div class="stat"><div class="num" id="salesCount">0</div><div class="txt">المبيعات</div></div>
    </div>
    
    <div class="footer">مرحباً بك في نظام إدارة المخازن</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    auth.onAuthStateChanged(user => { if(!user) window.location.href="login.html"; });
    
    db.collection('inventory').onSnapshot(s=>document.getElementById('productsCount').innerText=s.size);
    db.collection('customers').onSnapshot(s=>document.getElementById('customersCount').innerText=s.size);
    db.collection('suppliers').onSnapshot(s=>document.getElementById('suppliersCount').innerText=s.size);
    db.collection('sales').onSnapshot(s=>document.getElementById('salesCount').innerText=s.size);
</script>
</body>
</html>
