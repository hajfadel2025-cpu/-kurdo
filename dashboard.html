<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتب حاج فاضل - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #7B1FA2; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin: 0; font-size: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 10px; border-right: 5px solid #7B1FA2; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: right; }
        th { background-color: #f8f9fa; color: #333; }
        .btn-logout { background: #D32F2F; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>لوحة تحكم مكتب حاج فاضل للمحاسبة</h1>
    <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
</div>

<div class="stats-grid">
    <div class="card">
        <div>رصيد الصندوق (دينار)</div>
        <h2 id="iqd-balance">0</h2>
    </div>
    <div class="card" style="border-right-color: #ffd600;">
        <div>رصيد الصندوق (دولار)</div>
        <h2 id="usd-balance">0</h2>
    </div>
</div>

<div class="container">
    <h3>آخر الحركات المالية</h3>
    <table>
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>البيان</th>
                <th>العملة</th>
                <th>المبلغ</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="transactions-body">
            <!-- ستظهر البيانات هنا تلقائياً -->
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // التأكد من أن المستخدم سجل دخوله فعلاً
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
        }
    });

    window.logout = () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    };
</script>

</body>
</html>
