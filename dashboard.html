<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - نظام المخازن</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h1{color:#1e3c72;font-size:20px;margin-bottom:20px;border-right:4px solid #3498db;padding-right:15px}
        .nav-menu{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;background:#f8f9fa;padding:10px;border-radius:12px}
        .nav-item{padding:5px 12px;border-radius:20px;text-decoration:none;font-weight:bold;color:white;font-size:12px}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
        .stat{background:#f8f9fa;padding:12px;border-radius:10px;text-align:center}
        .stat i{font-size:20px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;background-clip:text;color:transparent}
        .stat .num{font-size:20px;font-weight:bold;color:#1e3c72}
        .stat .txt{color:#666;font-size:10px}
        .charts-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
        .chart-card{background:#f8f9fa;border-radius:10px;padding:6px 10px}
        .chart-card h3{color:#1e3c72;font-size:10px;margin-bottom:3px;border-right:2px solid #667eea;padding-right:6px}
        .chart-card canvas{max-height:70px !important;height:70px !important;width:100% !important}
        .footer{text-align:center;margin-top:15px;color:#888;font-size:11px}
        @media(max-width:768px){
            .stats{grid-template-columns:repeat(2,1fr)}
            .charts-row{grid-template-columns:1fr}
            .chart-card canvas{max-height:60px !important;height:60px !important}
            .nav-item{font-size:10px;padding:4px 8px}
        }
    </style>
</head>
<body>
<div class="container">
    <h1><i class="fas fa-landmark"></i> نظام إدارة المخازن</h1>
    
    <div class="nav-menu">
        <a href="suppliers.html" class="nav-item" style="background:#2ecc71">الموردين</a>
        <a href="inventory.html" class="nav-item" style="background:#e74c3c">المخزن</a>
        <a href="sales.html" class="nav-item" style="background:#3498db">المبيعات</a>
        <a href="purchases.html" class="nav-item" style="background:#1abc9c">المشتريات</a>
        <a href="customers.html" class="nav-item" style="background:#27ae60">العملاء</a>
        <a href="mandubs.html" class="nav-item" style="background:#9b59b6">المندوبين</a>
        <a href="cash-register.html" class="nav-item" style="background:#f39c12">صندوق الكاش</a>
        <a href="invoice-manager.html" class="nav-item" style="background:#8e44ad">فواتير مبيعات</a>
    </div>
    
    <div class="stats">
        <div class="stat"><i class="fas fa-boxes"></i><div class="num" id="productsCount">0</div><div class="txt">المنتجات</div></div>
        <div class="stat"><i class="fas fa-users"></i><div class="num" id="customersCount">0</div><div class="txt">العملاء</div></div>
        <div class="stat"><i class="fas fa-truck"></i><div class="num" id="suppliersCount">0</div><div class="txt">الموردين</div></div>
        <div class="stat"><i class="fas fa-file-invoice"></i><div class="num" id="salesCount">0</div><div class="txt">المبيعات</div></div>
    </div>
    
    <div class="charts-row">
        <div class="chart-card"><h3>📊 المبيعات خلال 7 أيام</h3><canvas id="salesChart"></canvas></div>
        <div class="chart-card"><h3>📊 المبيعات حسب المندوب</h3><canvas id="mandubChart"></canvas></div>
    </div>
    
    <div class="footer">🔄 تحديث تلقائي</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let salesChart, mandubChart, allSales=[];
    
    auth.onAuthStateChanged(user=>{if(!user)window.location.href="login.html"});
    
    db.collection('inventory').onSnapshot(s=>document.getElementById('productsCount').innerText=s.size);
    db.collection('customers').onSnapshot(s=>document.getElementById('customersCount').innerText=s.size);
    db.collection('suppliers').onSnapshot(s=>document.getElementById('suppliersCount').innerText=s.size);
    db.collection('sales').onSnapshot(s=>{
        document.getElementById('salesCount').innerText=s.size;
        allSales=[]; s.forEach(d=>allSales.push(d.data()));
        updateCharts();
    });
    
    function updateCharts(){
        let days=[], sales={};
        for(let i=6;i>=0;i--){
            let d=new Date(); d.setDate(d.getDate()-i);
            let ds=d.toLocaleDateString('ar-EG');
            days.push(ds);
            sales[ds]=0;
        }
        allSales.forEach(s=>{
            if(s.timestamp){
                let d=new Date(s.timestamp).toLocaleDateString('ar-EG');
                if(sales[d]!==undefined) sales[d]+=s.total||0;
            }
        });
        if(salesChart)salesChart.destroy();
        salesChart = new Chart(document.getElementById('salesChart'), {
            type:'line',
            data:{labels:days,datasets:[{label:'',data:days.map(d=>sales[d]),borderColor:'#667eea',fill:true,tension:0.3}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
        });
        
        let ms={};
        allSales.forEach(s=>{let n=s.mandubName||'غير محدد'; ms[n]=(ms[n]||0)+(s.total||0);});
        if(mandubChart)mandubChart.destroy();
        mandubChart = new Chart(document.getElementById('mandubChart'), {
            type:'doughnut',
            data:{labels:Object.keys(ms),datasets:[{data:Object.values(ms),backgroundColor:['#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a']}]},
            options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:8}}}}
        });
    }
</script>
</body>
</html>
