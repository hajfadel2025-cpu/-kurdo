<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مكتب حاج فاضل v2.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* الألوان الأساسية للمكتب */
        :root { --purple: #800080; --light-grey: #f4f7f6; }
        
        body { 
            background-color: var(--light-grey); 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 0;
        }

        /* تنسيق القائمة الجانبية */
        .sidebar {
            width: 260px; background: var(--purple); color: white;
            height: 100vh; position: fixed; right: 0; top: 0; padding: 20px;
            z-index: 1000;
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 260px; padding: 30px; min-height: 100vh;
        }

        /* كروت العرض */
        .card-custom {
            background: white; border-radius: 15px; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 25px;
        }

        .btn-purple { background: var(--purple); color: white; border-radius: 8px; border: none; padding: 10px 20px; }
        .btn-purple:hover { background: #600060; color: white; }

        .nav-link { color: #eee; padding: 12px; display: block; text-decoration: none; border-radius: 8px; margin-bottom: 5px; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        
        /* البحث العلوي */
        .top-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 class="text-center mb-4">مكتب حاج فاضل</h3>
        <hr>
        <a href="#" class="nav-link"><i class="fas fa-home ms-2"></i> الرئيسية</a>
        <a href="#" class="nav-link"><i class="fas fa-box ms-2"></i> المخزن</a>
        <a href="#" class="nav-link"><i class="fas fa-shopping-cart ms-2"></i> المبيعات</a>
        <a href="#" class="nav-link"><i class="fas fa-user-shield ms-2"></i> الصلاحيات</a>
        <a href="index.html" class="nav-link text-warning mt-5"><i class="fas fa-power-off ms-2"></i> خروج</a>
    </div>

    <div class="main-content">
        <div class="top-bar shadow-sm">
            <input type="text" id="searchInput" class="form-control w-50" placeholder="🔍 ابحث هنا عن أي مادة أو عميل...">
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card-custom text-center">
                    <h6 class="text-muted">المواد المتوفرة</h6>
                    <h2 style="color: var(--purple);">1,420</h2>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card-custom">
                    <h5 class="mb-4" style="color: var(--purple);">إضافة مستخدم وصلاحياته</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control" placeholder="اسم المندوب">
                        </div>
                        <div class="col-md-6">
                            <select class="form-select">
                                <option>مندوب</option>
                                <option>مدير</option>
                            </select>
                        </div>
                        <div class="col-12 mt-3">
                            <label class="d-block mb-2">تحديد الصلاحيات:</label>
                            <input type="checkbox"> رؤية الأرباح | 
                            <input type="checkbox"> تعديل المخزن | 
                            <input type="checkbox"> حذف الفواتير
                        </div>
                        <div class="col-12">
                            <button class="btn btn-purple w-100">حفظ البيانات</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('searchInput').onkeyup = function() {
            console.log("Searching for: " + this.value);
            // سيتم ربط البحث مع Firebase هنا
        };
    </script>
</body>
</html>
