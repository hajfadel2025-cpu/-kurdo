<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - مكتب حاج فاضل</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        body{background:#f0f2f5;padding:20px}
        .container{max-width:1200px;margin:auto;background:white;border-radius:20px;padding:25px}
        h2{color:#1e3c72;border-right:4px solid #f39c12;padding-right:15px;margin-bottom:20px}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:20px}
        .stat{background:#f8f9fa;padding:15px;border-radius:12px;text-align:center}
        .stat .num{font-size:28px;font-weight:bold;color:#1e3c72}
        .stat .label{color:#666;font-size:12px}
        .logout-btn{background:#e74c3c;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;float:left}
        .user-info{background:#1e3c72;color:white;padding:8px 16px;border-radius:8px;display:inline-block}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>📊 مكتب حاج فاضل - الرئيسية</h2>
        <div>
            <span class="user-info" id="userName">👤 مرحباً بك</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat"><div class="num" id="productsCount">0</div><div class="label">المنتجات</div></div>
        <div class="stat"><div class="num" id="customersCount">0</div><div class="label">العملاء</div></div>
        <div class="stat"><div class="num" id="salesCount">0</div><div class="label">المبيعات</div></div>
        <div class="stat"><div class="num" id="totalSales">0</div><div class="label">إجمالي المبيعات</div></div>
        <div class="stat"><div class="num" id="totalDebt">0</div><div class="label">إجمالي الديون</div></div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;">
        <a href="sales.html" style="background:#27ae60;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;">🧾 مبيعات</a>
        <a href="items.html" style="background:#3498db;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;">📦 أصناف</a>
        <a href="customers.html" style="background:#e67e22;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;">👤 عملاء</a>
        <a href="mandubs.html" style="background:#9b59b6;color:white;padding:12px 20px;border-radius:8px;text-decoration:none;">👥 مندوبين</a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if (!user) { window.location.href = "login.html"; }
        else {
            document.getElementById('userName').innerHTML = '👤 ' + user.email;
            loadData();
        }
    });

    window.logout = function() { auth.signOut(); window.location.href = "login.html"; };

    async function loadData() {
        try {
            // جلب المنتجات
            const productsSnap = await db.collection('inventory').get();
            document.getElementById('productsCount').innerText = productsSnap.size;

            // جلب العملاء
            const customersSnap = await db.collection('customers').get();
            document.getElementById('customersCount').innerText = customersSnap.size;

            // جلب المبيعات
            const salesSnap = await db.collection('sales').get();
            document.getElementById('salesCount').innerText = salesSnap.size;

            let totalSales = 0, totalDebt = 0;
            salesSnap.forEach(d => { totalSales += d.data().total || 0; });
            customersSnap.forEach(d => { totalDebt += d.data().totalDebt || 0; });

            document.getElementById('totalSales').innerText = totalSales.toFixed(0);
            document.getElementById('totalDebt').innerText = totalDebt.toFixed(0);

        } catch(e) {
            console.error('خطأ في جلب البيانات:', e);
        }
    }
</script>
</body>
</html>
