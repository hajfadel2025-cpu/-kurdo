<!-- واجهة إضافة مستخدم جديد وتحديد صلاحياته -->
<div class="card p-4 shadow-sm">
    <h4 class="mb-3">إضافة مستخدم جديد وصلاحياته</h4>
    <div class="row g-3">
        <div class="col-md-6">
            <input type="text" id="userName" class="form-control" placeholder="اسم المستخدم">
        </div>
        <div class="col-md-6">
            <select id="userRole" class="form-select">
                <option value="employee">مندوب / موظف</option>
                <option value="admin">مدير نظام</option>
            </select>
        </div>
        
        <!-- قائمة الصلاحيات -->
        <div class="col-12 mt-3">
            <h6>تخصيص الصلاحيات:</h6>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="p_view_profit">
                <label class="form-check-label">رؤية الأرباح والخزنة</label>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="p_edit_stock">
                <label class="form-check-label">تعديل كميات المخزن</label>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="p_delete_invoice">
                <label class="form-check-label">حذف الفواتير</label>
            </div>
        </div>
        
        <div class="col-12 mt-4">
            <button onclick="saveUser()" class="btn btn-primary w-100">حفظ المستخدم وصلاحياته</button>
        </div>
    </div>
</div>
