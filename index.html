<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="حاج فاضل">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- أيقونات للتطبيق -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/landmark.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/color/192/000000/landmark.png">
    
    <title>مكتب حاج فاضل - نظام إدارة المبيعات</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Tahoma', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* شاشة التحميل */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .splash-content {
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }
        
        .splash-logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .splash-logo i {
            font-size: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .splash-title {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .splash-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        .splash-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto 0;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* واجهة تسجيل الدخول */
        .login-container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }
        
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 60px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo h2 { color: #333; margin-top: 10px; }
        .logo p { color: #666; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .input-group { position: relative; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #999; }
        input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .alert { padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .register-link { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .register-link a { color: #667eea; text-decoration: none; }
        
        /* وضع التطبيق */
        @media (display-mode: standalone) {
            body { padding: 0; }
            .login-container { border-radius: 0; min-height: 100vh; }
        }
    </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="splashScreen" class="splash-screen">
    <div class="splash-content">
        <div class="splash-logo">
            <i class="fas fa-landmark"></i>
        </div>
        <div class="splash-title">مكتب حاج فاضل</div>
        <div class="splash-subtitle">نظام إدارة المبيعات والمندوبين</div>
        <div class="splash-spinner"></div>
    </div>
</div>

<!-- واجهة تسجيل الدخول -->
<div id="loginContainer" class="login-container">
    <div class="logo">
        <i class="fas fa-landmark"></i>
        <h2>مكتب حاج فاضل</h2>
        <p>نظام إدارة المبيعات والمندوبين</p>
    </div>
    
    <div id="alert" class="alert"></div>
    
    <form id="loginForm">
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="example@company.com" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>كلمة المرور</label>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="********" required>
            </div>
        </div>
        
        <button type="submit">تسجيل الدخول</button>
    </form>
    
    <div class="register-link">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBYYTuw5bY2RZM27mZynVuvmmWxQNvomKQ",
        authDomain: "haj-fadel-accounting.firebaseapp.com",
        projectId: "haj-fadel-accounting",
        storageBucket: "haj-fadel-accounting.firebasestorage.app",
        messagingSenderId: "449205985318",
        appId: "1:449205985318:web:2dece1e1412165b01f46e7"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // إخفاء شاشة التحميل بعد 1.5 ثانية
    setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        const login = document.getElementById('loginContainer');
        
        splash.style.opacity = '0';
        setTimeout(() => {
            splash.style.display = 'none';
            login.style.display = 'block';
        }, 500);
    }, 1500);
    
    const form = document.getElementById('loginForm');
    const alertDiv = document.getElementById('alert');
    
    function showAlert(message, type) {
        alertDiv.className = `alert alert-${type}`;
        alertDiv.innerText = message;
        alertDiv.style.display = 'block';
        setTimeout(() => alertDiv.style.display = 'none', 5000);
    }
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        try {
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;
            
            const usersRef = db.collection('users');
            const q = usersRef.where('uid', '==', user.uid);
            const querySnapshot = await q.get();
            
            let role = 'مندوب';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                role = data.accountType || data.role || 'مندوب';
            });
            
            if (role === 'مدير' || role === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'sales.html';
            }
            
        } catch (error) {
            console.error(error);
            let message = 'فشل تسجيل الدخول';
            if (error.code === 'auth/user-not-found') message = 'البريد الإلكتروني غير مسجل';
            else if (error.code === 'auth/wrong-password') message = 'كلمة المرور غير صحيحة';
            else if (error.code === 'auth/invalid-email') message = 'البريد الإلكتروني غير صالح';
            showAlert(message, 'error');
        }
    });
    
    // تسجيل Service Worker لتحويل الموقع إلى تطبيق
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker مسجل بنجاح:', reg))
                .catch(err => console.log('خطأ في تسجيل Service Worker:', err));
        });
    }
</script>
</body>
</html>
