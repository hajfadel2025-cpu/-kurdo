<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مكتب حاج فاضل">
    <meta name="theme-color" content="#667eea">
    <title>مكتب حاج فاضل</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        .logo i {
            font-size: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        h2 { color: #333; margin: 20px 0 10px; }
        p { color: #666; margin-bottom: 30px; }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        button {
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-landmark"></i>
        </div>
        <h2>مكتب حاج فاضل</h2>
        <p>نظام إدارة المبيعات والمندوبين</p>
        
        <div class="spinner"></div>
        <div class="message" style="color:#667eea;">جاري تحويلك إلى تسجيل الدخول...</div>
        <div id="errorMsg" class="error-message">
            ⚠️ لم يتم التحويل تلقائياً
        </div>
        <button id="loginBtn" style="display: none;">🔐 الذهاب إلى تسجيل الدخول</button>
    </div>

    <script>
        // إضافة Font Awesome
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';
        document.head.appendChild(link);
        
        // وظيفة التحويل
        function goToLogin() {
            // طريقة مباشرة للتحويل
            window.location.href = "login.html";
        }
        
        // محاولة التحويل فوراً
        try {
            goToLogin();
        } catch(e) {
            console.log("خطأ في التحويل المباشر");
        }
        
        // محاولة ثانية بعد نصف ثانية
        setTimeout(function() {
            try {
                goToLogin();
            } catch(e) {
                showError();
            }
        }, 500);
        
        // محاولة ثالثة بعد 1.5 ثانية
        setTimeout(function() {
            try {
                goToLogin();
            } catch(e) {
                showError();
            }
        }, 1500);
        
        function showError() {
            document.getElementById('errorMsg').style.display = 'block';
            const btn = document.getElementById('loginBtn');
            btn.style.display = 'inline-block';
            btn.onclick = function() {
                window.location.href = "login.html";
            };
        }
    </script>
</body>
</html>
